name: Temporary Chapter 21 Second Reading

on:
  push:
    branches:
      - docs/livre-ii-ch21-economie

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch21-economie
          fetch-depth: 0

      - name: Apply second-reading corrections
        run: python3 .qa/ch21-second-reading.py

      - name: Remove temporary files and commit
        run: |
          rm -f .github/workflows/temp-ch21-second-reading.yml
          rm -f .qa/ch21-second-reading.py
          rm -f .qa/ch21-second-reading.trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(livre-ii): apply chapter 21 second-reading corrections"
          git push origin HEAD:docs/livre-ii-ch21-economie
