name: Temporary Apply GDScript Pedagogy

on:
  pull_request:
    branches: [main]
    paths:
      - "tools/deepen_gdscript_chapter.py"
      - "tools/fix_deepen_gdscript_script.py"
      - ".github/workflows/apply-gdscript-pedagogy.yml"
      - "Livre-II/CHAPITRE-02-Fondamentaux-de-GDScript.md"

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'docs/deepen-gdscript-explanations'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Repair migration anchor
        run: python3 tools/fix_deepen_gdscript_script.py
      - name: Apply pedagogical expansion or record failure
        run: |
          if python3 tools/deepen_gdscript_chapter.py > migration.log 2>&1; then
            cat migration.log
          else
            cat migration.log
            cp migration.log Livre-II/QA/MIGRATION-ERROR.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Livre-II/QA/MIGRATION-ERROR.log
            git commit -m "chore(qa): record GDScript migration failure"
            git push origin HEAD:${{ github.head_ref }}
            exit 1
          fi
      - name: Verify context markers
        run: |
          python3 tools/audit_contextes_utilisation.py --check
          python3 tools/audit_contextes_semantiques.py --check
      - name: Commit result
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Livre-II/CHAPITRE-02-Fondamentaux-de-GDScript.md Livre-II/QA/AUDIT-CHAPITRES-01-02.md
          git commit -m "docs(livre-ii): explain GDScript examples line by line"
          git push origin HEAD:${{ github.head_ref }}
