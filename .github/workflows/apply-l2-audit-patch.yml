name: Apply Livre II Audit Corrections

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/apply-l2-audit-patch.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply audited corrections
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: occurrence attendue 1, reçue {count}")
              return text.replace(old, new, 1)

          def write(path: str, text: str) -> None:
              Path(path).write_text(text, encoding="utf-8", newline="\n")

          # ------------------------------------------------------------------
          # Chapitre 1
          # ------------------------------------------------------------------
          p1 = Path("Livre-II/CHAPITRE-01-Decouvrir-Godot-et-creer-le-projet-fil-rouge.md")
          c1 = p1.read_text(encoding="utf-8")
          c1 = replace_once(
              c1,
              'status: "draft-review"\nversion: "1.0.0"',
              'status: "reviewed"\nversion: "1.1.0"',
              "ch1 statut",
          )
          c1 = replace_once(
              c1,
              'last-verified: "2026-07-18"\nreference-engine:',
              'last-verified: "2026-07-18"\naudit-status: "complete"\naudit-date: "2026-07-18"\naudit-report: "Livre-II/QA/AUDIT-CHAPITRES-01-02.md"\naudit-level: "static-review"\nreference-engine:',
              "ch1 métadonnées audit",
          )
          c1 = replace_once(
              c1,
              '> **Résultat attendu :** installer une version stable et reproductible de Godot, créer le projet fil rouge 3D, comprendre les notions de nœud et de scène, exécuter une première scène et enregistrer une base saine dans Git.\n',
              '> **Résultat attendu :** installer une version stable et reproductible de Godot, créer le projet fil rouge 3D, comprendre les notions de nœud et de scène, exécuter une première scène et enregistrer une base saine dans Git.  \n> **Audit post-création :** terminé — voir `Livre-II/QA/AUDIT-CHAPITRES-01-02.md`.\n',
              "ch1 note audit",
          )
          c1 = replace_once(
              c1,
              '# Cache et imports générés par Godot 4\n.godot/\n',
              '# Cache et imports générés par Godot 4\n.godot/\n*.translation\n',
              "ch1 gitignore translation",
          )
          c1 = replace_once(
              c1,
              '.vscode/*.local.json\n```\n\nGodot peut aussi générer les métadonnées Git lors de la création du projet. Le résultat doit être vérifié et non supposé correct pour tous les besoins du dépôt.\n',
              '.vscode/*.local.json\n```\n\nCréer également `.gitattributes` :\n\n```gitattributes\n# Normaliser les fichiers texte du projet en LF.\n* text=auto eol=lf\n\n*.gd text eol=lf\n*.tscn text eol=lf\n*.tres text eol=lf\n*.godot text eol=lf\n*.json text eol=lf\n*.md text eol=lf\n```\n\nLorsque l’option Git est choisie dans le Project Manager, Godot crée normalement `.gitignore` et `.gitattributes`. Les deux fichiers doivent être relus et versionnés. Sous Windows, cette normalisation évite les changements artificiels dus aux conversions CRLF/LF.\n\nPour un dépôt existant qui ne possède pas ces fichiers, utiliser **Project > Version Control > Generate Version Control Metadata**, puis examiner le diff avant commit.\n',
              "ch1 gitattributes",
          )
          c1 = replace_once(
              c1,
              '### 6.5 Vérifier la version\n',
              '### 6.5 Vérifier la version\n',
              "ch1 ancre licence",
          )
          c1 = replace_once(
              c1,
              '## 7. Rendre la commande accessible\n',
              '### 6.6 Licence et attribution\n\nGodot Engine est distribué sous licence MIT. Le jeu peut utiliser une licence différente, y compris commerciale ou propriétaire, mais la distribution du binaire Godot exige de conserver la notice de copyright et le texte de licence du moteur.\n\nPréparer dès le démarrage :\n\n```text\ndocs/licenses/\n├── GODOT-LICENSE.txt\n└── THIRD-PARTY-NOTICES.md\n```\n\nLes composants tiers inclus dans Godot possèdent également leurs propres notices. La publication finale devra fournir un accès à ces informations dans les crédits, la documentation ou les fichiers accompagnant le jeu.\n\n## 7. Rendre la commande accessible\n',
              "ch1 licence",
          )
          c1 = replace_once(
              c1,
              '.git\\\n.gitignore\n.godot\\\nicon.svg\nicon.svg.import\nproject.godot\nREADME.md',
              '.git\\\n.gitattributes\n.gitignore\n.godot\\\nicon.svg\nicon.svg.import\nproject.godot\nREADME.md',
              "ch1 inventaire initial",
          )
          c1 = c1.replace('--quit-after 2', '--quit-after 5')
          c1 = replace_once(
              c1,
              'if ($LASTEXITCODE -ne 0) {\n    throw "Le test Godot a échoué avec le code $LASTEXITCODE."\n}\n```\n\nLire le journal :',
              'if ($LASTEXITCODE -ne 0) {\n    throw "Le test Godot a échoué avec le code $LASTEXITCODE."\n}\n```\n\n`--quit-after 5` signifie cinq itérations de la boucle principale, et non cinq secondes. Ce nombre laisse la scène entrer dans `_ready()` tout en conservant un test très court.\n\nLire le journal :',
              "ch1 quit-after",
          )
          c1 = replace_once(
              c1,
              '- [ ] Git ignore `.godot/`.\n',
              '- [ ] Git ignore `.godot/` et `*.translation`.\n- [ ] `.gitattributes` normalise les fichiers texte en LF.\n',
              "ch1 checklist vcs",
          )
          c1 = replace_once(
              c1,
              '- [ ] Aucun addon tiers n’est requis.\n',
              '- [ ] Aucun addon tiers n’est requis.\n- [ ] La licence MIT de Godot et les notices tierces sont enregistrées pour la future distribution.\n',
              "ch1 checklist licence",
          )
          c1 = replace_once(
              c1,
              '- [Architecture interne du rendu](https://docs.godotengine.org/en/4.7/engine_details/architecture/internal_rendering_architecture.html)\n',
              '- [Architecture interne du rendu](https://docs.godotengine.org/en/4.7/engine_details/architecture/internal_rendering_architecture.html)\n- [Conformité à la licence Godot](https://docs.godotengine.org/en/4.7/about/complying_with_licenses.html)\n',
              "ch1 source licence",
          )
          c1 = replace_once(
              c1,
              '- une validation graphique et headless ;\n- un premier commit et un tag de référence.\n',
              '- une validation graphique et headless ;\n- des métadonnées Git complètes avec `.gitignore` et `.gitattributes` ;\n- une stratégie d’attribution pour la licence MIT de Godot ;\n- un premier commit et un tag de référence.\n',
              "ch1 résumé",
          )
          write(str(p1), c1)

          # ------------------------------------------------------------------
          # Chapitre 2
          # ------------------------------------------------------------------
          p2 = Path("Livre-II/CHAPITRE-02-Fondamentaux-de-GDScript.md")
          c2 = p2.read_text(encoding="utf-8")
          c2 = replace_once(
              c2,
              'status: "draft-review"\nversion: "1.0.0"',
              'status: "reviewed"\nversion: "1.1.0"',
              "ch2 statut",
          )
          c2 = replace_once(
              c2,
              'last-verified: "2026-07-18"\nreference-engine:',
              'last-verified: "2026-07-18"\naudit-status: "complete"\naudit-date: "2026-07-18"\naudit-report: "Livre-II/QA/AUDIT-CHAPITRES-01-02.md"\naudit-level: "static-review"\nreference-engine:',
              "ch2 métadonnées audit",
          )
          c2 = replace_once(
              c2,
              '> **Résultat attendu :** lire, écrire, tester et corriger un script GDScript typé simple, sans confondre GDScript avec Python et sans introduire prématurément une architecture globale.\n',
              '> **Résultat attendu :** lire, écrire, tester et corriger un script GDScript typé simple, sans confondre GDScript avec Python et sans introduire prématurément une architecture globale.  \n> **Audit post-création :** terminé — voir `Livre-II/QA/AUDIT-CHAPITRES-01-02.md`.\n',
              "ch2 note audit",
          )
          c2 = c2.replace('| `String` | texte mutable par valeur |', '| `String` | chaîne de caractères Unicode |')
          c2 = replace_once(
              c2,
              'Le projet n’exige pas une annotation redondante lorsque l’inférence est parfaitement claire.\n\n## 11. Constantes et variables\n',
              'Le projet n’exige pas une annotation redondante lorsque l’inférence est parfaitement claire.\n\n### 10.6 Vérifier et convertir un type\n\nL’opérateur `is` vérifie un type avant utilisation :\n\n```gdscript\nfunc handle_body(body: Node) -> void:\n\tif body is not CharacterBody3D:\n\t\tpush_warning("Le nœud reçu n’est pas un CharacterBody3D.")\n\t\treturn\n\n\tvar character: CharacterBody3D = body\n\tprint(character.name)\n```\n\nL’opérateur `as` tente une conversion d’objet et renvoie `null` si elle échoue :\n\n```gdscript\nvar character := body as CharacterBody3D\nif character == null:\n\treturn\n```\n\nCette forme est pratique lorsque l’échec est attendu. Elle peut aussi masquer une erreur de conception, car une conversion incompatible échoue silencieusement. Utiliser `is` ou une assertion lorsque le type incorrect représente un défaut.\n\n## 11. Constantes et variables\n',
              "ch2 is as",
          )
          c2 = replace_once(
              c2,
              'actor_names = retained\n```\n\n## 14. Dictionnaires\n',
              'actor_names = retained\n```\n\n### 13.6 PackedArrays\n\nGodot fournit des tableaux compacts spécialisés, notamment :\n\n```text\nPackedByteArray\nPackedInt32Array\nPackedInt64Array\nPackedFloat32Array\nPackedFloat64Array\nPackedStringArray\nPackedVector2Array\nPackedVector3Array\nPackedColorArray\n```\n\nLes PackedArrays réduisent généralement la mémoire et conviennent aux grandes séries homogènes, aux buffers et à certaines API du moteur. Les `Array[Type]` restent préférables pour la plupart des collections métier grâce à leur souplesse et à leurs méthodes de haut niveau.\n\n## 14. Dictionnaires\n',
              "ch2 packed arrays",
          )
          c2 = replace_once(
              c2,
              '### 14.2 Accès sûr\n',
              '### 14.2 Dictionnaire typé\n\nLorsque les clés et valeurs suivent un contrat stable :\n\n```gdscript\nvar metrics: Dictionary[StringName, float] = {\n\t&"marker_height": 1.0,\n\t&"load_time_ms": 12.5,\n}\n```\n\nUne clé ou une valeur d’un autre type provoque une erreur. Utiliser `Variant` comme type de valeur uniquement lorsque la structure est volontairement hétérogène :\n\n```gdscript\nvar metadata: Dictionary[StringName, Variant] = {}\n```\n\nLes dictionnaires, typés ou non, sont passés par référence. Utiliser `duplicate()` lorsqu’une copie indépendante est nécessaire.\n\n### 14.3 Accès sûr\n',
              "ch2 typed dictionary",
          )
          for old, new in [
              ('### 14.3 Tester une clé', '### 14.4 Tester une clé'),
              ('### 14.4 Ajouter ou modifier', '### 14.5 Ajouter ou modifier'),
              ('### 14.5 Retirer', '### 14.6 Retirer'),
              ('### 14.6 Choix entre dictionnaire et classe', '### 14.7 Choix entre dictionnaire et classe'),
          ]:
              c2 = replace_once(c2, old, new, f"ch2 renumérotation {old}")
          c2 = replace_once(
              c2,
              '### 18.5 Fonction récursive\n\nLa récursion est possible, mais une boucle est souvent plus sûre pour les parcours simples. Toute récursion doit posséder un cas terminal clair.\n\n## 19. Classes, héritage et `class_name`\n',
              '### 18.5 Fonction récursive\n\nLa récursion est possible, mais une boucle est souvent plus sûre pour les parcours simples. Toute récursion doit posséder un cas terminal clair.\n\n### 18.6 `await` et fonctions suspendues\n\n`await` suspend la fonction courante jusqu’à la résolution d’un signal ou d’un objet attendu :\n\n```gdscript\nfunc wait_one_frame() -> void:\n\tawait get_tree().process_frame\n\tprint("Image suivante")\n```\n\nUne fonction utilisant `await` rend la suite de son exécution asynchrone. Le code appelant doit éviter de supposer que le résultat est disponible immédiatement. Les signaux, temporisations, annulations et chaînes asynchrones seront approfondis au chapitre 3.\n\n## 19. Classes, héritage et `class_name`\n',
              "ch2 await",
          )
          c2 = replace_once(
              c2,
              '- [ ] Je sais créer et parcourir un `Array` typé.\n- [ ] Je sais accéder prudemment à un `Dictionary`.\n',
              '- [ ] Je sais créer et parcourir un `Array` typé et reconnaître un PackedArray.\n- [ ] Je sais utiliser un `Dictionary` typé et accéder prudemment à ses valeurs.\n- [ ] Je sais vérifier un type avec `is` et utiliser `as` uniquement lorsque l’échec nullable est voulu.\n',
              "ch2 checklist types",
          )
          c2 = replace_once(
              c2,
              '- [ ] Je sais utiliser `preload()` et `load()` dans leurs cas respectifs.\n',
              '- [ ] Je sais utiliser `preload()` et `load()` dans leurs cas respectifs.\n- [ ] Je comprends que `await` suspend la suite d’une fonction.\n',
              "ch2 checklist await",
          )
          for old, new in [
              ('https://docs.godotengine.org/en/stable/tutorials/scripting/gdscript/gdscript_basics.html', 'https://docs.godotengine.org/en/4.7/tutorials/scripting/gdscript/gdscript_basics.html'),
              ('https://docs.godotengine.org/en/stable/tutorials/scripting/gdscript/static_typing.html', 'https://docs.godotengine.org/en/4.7/tutorials/scripting/gdscript/static_typing.html'),
              ('https://docs.godotengine.org/en/stable/tutorials/scripting/gdscript/gdscript_styleguide.html', 'https://docs.godotengine.org/en/4.7/tutorials/scripting/gdscript/gdscript_styleguide.html'),
              ('https://docs.godotengine.org/en/stable/tutorials/scripting/gdscript/gdscript_documentation_comments.html', 'https://docs.godotengine.org/en/4.7/tutorials/scripting/gdscript/gdscript_documentation_comments.html'),
              ('https://docs.godotengine.org/en/stable/tutorials/scripting/gdscript/gdscript_exports.html', 'https://docs.godotengine.org/en/4.7/tutorials/scripting/gdscript/gdscript_exports.html'),
              ('https://docs.godotengine.org/en/stable/tutorials/scripting/gdscript/warning_system.html', 'https://docs.godotengine.org/en/4.7/tutorials/scripting/gdscript/warning_system.html'),
              ('https://docs.godotengine.org/en/stable/tutorials/scripting/script_editor/index.html', 'https://docs.godotengine.org/en/4.7/tutorials/scripting/script_editor/index.html'),
              ('https://docs.godotengine.org/en/stable/tutorials/editor/command_line_tutorial.html', 'https://docs.godotengine.org/en/4.7/tutorials/editor/command_line_tutorial.html'),
              ('https://docs.godotengine.org/en/stable/classes/class_array.html', 'https://docs.godotengine.org/en/4.7/classes/class_array.html'),
              ('https://docs.godotengine.org/en/stable/classes/class_dictionary.html', 'https://docs.godotengine.org/en/4.7/classes/class_dictionary.html'),
              ('https://docs.godotengine.org/en/stable/classes/class_%40gdscript.html', 'https://docs.godotengine.org/en/4.7/classes/class_%40gdscript.html'),
          ]:
              if old not in c2:
                  raise RuntimeError(f"ch2 lien absent: {old}")
              c2 = c2.replace(old, new)
          write(str(p2), c2)

          # ------------------------------------------------------------------
          # Norme QA
          # ------------------------------------------------------------------
          qa = Path("Volume-0/ASSURANCE-QUALITE-DOCUMENTAIRE.md")
          q = qa.read_text(encoding="utf-8")
          q = replace_once(q, 'version: "1.0.0"', 'version: "1.1.0"', "qa version")
          q = replace_once(
              q,
              '- [ ] Compilation vérifiée.\n\n## 14. Critères de clôture du Volume 0\n',
              '- [ ] Compilation vérifiée.\n- [ ] Audit post-création réalisé et rapport enregistré.\n- [ ] Métadonnées `audit-status`, `audit-date`, `audit-report` et `audit-level` présentes lorsque requises.\n\n## 13.1 Porte obligatoire après création d’un chapitre\n\nÀ partir du Livre II, la rédaction et l’audit constituent deux étapes distinctes. Un chapitre ne peut être annoncé comme terminé qu’après :\n\n1. comparaison au sommaire maître ;\n2. recherche des notions fondamentales manquantes ;\n3. relecture technique des commandes et exemples ;\n4. vérification des sources et versions ;\n5. correction des non-conformités ;\n6. mise à jour de l’index, de la roadmap et de `contents.txt` ;\n7. compilation CI réussie ;\n8. enregistrement d’un rapport d’audit.\n\nLe protocole détaillé du Livre II est défini dans `Livre-II/QA/PROTOCOLE-AUDIT-POST-CREATION.md`.\n\n## 14. Critères de clôture du Volume 0\n',
              "qa porte audit",
          )
          write(str(qa), q)

          # ------------------------------------------------------------------
          # Index Livre II
          # ------------------------------------------------------------------
          idx = Path("Livre-II/index.md")
          i = idx.read_text(encoding="utf-8")
          i = replace_once(i, 'version: "0.3.0"', 'version: "0.4.0"', "index version")
          i = replace_once(i, ') — **rédigé**\n2. [Fondamentaux de GDScript]', ') — **rédigé et audité**\n2. [Fondamentaux de GDScript]', "index ch1")
          i = replace_once(i, ') — **rédigé**\n3. Scènes, nœuds', ') — **rédigé et audité**\n3. Scènes, nœuds', "index ch2")
          i = replace_once(
              i,
              '## Principes du Livre II\n',
              '## Audit post-création\n\nChaque chapitre du Livre II fait l’objet d’un audit distinct après rédaction. Le protocole est défini dans [`QA/PROTOCOLE-AUDIT-POST-CREATION.md`](QA/PROTOCOLE-AUDIT-POST-CREATION.md). Les audits des chapitres 1 et 2 sont consignés dans [`QA/AUDIT-CHAPITRES-01-02.md`](QA/AUDIT-CHAPITRES-01-02.md).\n\nLa mention **rédigé et audité** signifie que la complétude et les exemples ont été relus statiquement et que la compilation documentaire a réussi. Elle ne remplace pas un test runtime sur le projet matérialisé.\n\n## Principes du Livre II\n',
              "index audit",
          )
          i = replace_once(i, '**Deux chapitres sur trente** sont rédigés.', '**Deux chapitres sur trente** sont rédigés et audités.', "index statut")
          write(str(idx), i)

          # ------------------------------------------------------------------
          # Roadmap
          # ------------------------------------------------------------------
          roadmap = Path("ROADMAP.md")
          r = roadmap.read_text(encoding="utf-8")
          r = replace_once(r, 'Fondations Godot, GDScript, architecture et données — 2 chapitres sur 9.', 'Fondations Godot, GDScript, architecture et données — 2 chapitres rédigés et audités sur 9.', "roadmap fondations")
          r = replace_once(r, '**Statut M3 : en cours — 2 chapitres rédigés sur 30.**', '**Statut M3 : en cours — 2 chapitres rédigés et audités sur 30.**', "roadmap statut")
          write(str(roadmap), r)

          # ------------------------------------------------------------------
          # Workflow de validation
          # ------------------------------------------------------------------
          wf = Path(".github/workflows/validate-volume0.yml")
          w = wf.read_text(encoding="utf-8")
          w = replace_once(
              w,
              '          expected_livre_i_ids = {\n',
              '          livre_ii_matches = [\n              (entry, re.fullmatch(r"Livre-II/CHAPITRE-(\\d{2})-.+\\.md", entry))\n              for entry in entries\n          ]\n          livre_ii_entries = [entry for entry, match in livre_ii_matches if match]\n\n          expected_livre_i_ids = {\n',
              "workflow count livre ii",
          )
          w = replace_once(
              w,
              '                  if expected_chapter in range(5, 10) and not metadata.get("legacy-chapter"):\n                      errors.append(f"Métadonnée legacy-chapter absente après renumérotation : {rel}")\n\n              for raw_target in markdown_link.findall(text):\n',
              '                  if expected_chapter in range(5, 10) and not metadata.get("legacy-chapter"):\n                      errors.append(f"Métadonnée legacy-chapter absente après renumérotation : {rel}")\n\n              chapter_match_ii = re.fullmatch(r"Livre-II/CHAPITRE-(\\d{2})-.+\\.md", rel)\n              if chapter_match_ii:\n                  expected_chapter = int(chapter_match_ii.group(1))\n                  if metadata.get("book") != "Livre II":\n                      errors.append(f"Métadonnée book incorrecte pour {rel}.")\n                  if metadata.get("chapter") != expected_chapter:\n                      errors.append(\n                          f"Numéro de chapitre incohérent dans {rel} : attendu {expected_chapter}, reçu {metadata.get(\'chapter\')}."\n                      )\n                  if not metadata.get("last-verified"):\n                      errors.append(f"Métadonnée last-verified absente : {rel}")\n                  if metadata.get("audit-status") != "complete":\n                      errors.append(f"Audit post-création incomplet : {rel}")\n                  if not metadata.get("audit-date"):\n                      errors.append(f"Métadonnée audit-date absente : {rel}")\n                  if metadata.get("audit-level") not in {"static-review", "runtime-tested"}:\n                      errors.append(f"Métadonnée audit-level invalide : {rel}")\n                  audit_report = metadata.get("audit-report")\n                  if not audit_report:\n                      errors.append(f"Métadonnée audit-report absente : {rel}")\n                  else:\n                      audit_path = root / str(audit_report)\n                      if not audit_path.is_file():\n                          errors.append(f"Rapport d’audit absent pour {rel} : {audit_report}")\n\n              for raw_target in markdown_link.findall(text):\n',
              "workflow audit livre ii",
          )
          w = replace_once(
              w,
              '              f"- Chapitres du Livre I : **{len(livre_i_entries)}**",\n',
              '              f"- Chapitres du Livre I : **{len(livre_i_entries)}**",\n              f"- Chapitres du Livre II : **{len(livre_ii_entries)}**",\n',
              "workflow rapport livre ii",
          )
          write(str(wf), w)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "Aucune correction restante."
            exit 0
          fi
          git commit -m "docs(livre-ii): audit and correct chapters 1 and 2"
          git push origin "HEAD:${{ github.head_ref }}"
