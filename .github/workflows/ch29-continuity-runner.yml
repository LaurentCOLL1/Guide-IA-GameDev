name: Chapter 29 Continuity Alignment Runner

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: read

jobs:
  align:
    if: github.event.pull_request.head.ref == 'fix/ch29-continuite-gouvernance'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install validator dependency
        run: python3 -m pip install --disable-pip-version-check pyyaml

      - name: Apply and validate continuity alignment
        shell: bash
        run: |
          set -euxo pipefail
          python3 .qa/ch29-continuity/fix.py
          python3 tools/validate_chapters.py --report /tmp/ch29-continuity-QA.md
          python3 tools/check_context_markers.py --check
          python3 tools/audit_contextes_semantiques.py --check
          python3 tools/check_code_explanation_structure.py

      - name: Push permanent continuity correction
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf .qa/ch29-continuity
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(governance): align chapter 29 continuity state"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
