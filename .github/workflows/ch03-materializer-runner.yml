name: Chapter 3 Materializer Runner

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout chapter branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-iii-ch03-references-concept-art-comfyui
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Materialize and validate chapter 3
        shell: bash
        run: |
          set -euo pipefail
          branch='docs/livre-iii-ch03-references-concept-art-comfyui'
          base_head="$(git rev-parse HEAD)"
          cat .qa/ch03/materialize-*.part > .qa/ch03/materialize.py

          set +e
          python3 .qa/ch03/materialize.py > /tmp/ch03-materializer.log 2>&1
          materialize_status=$?
          if [ "$materialize_status" -eq 0 ]; then
            python3 -m pip install --disable-pip-version-check --quiet PyYAML >> /tmp/ch03-materializer.log 2>&1
            python3 tools/validate_chapters.py --report /tmp/QA-CHAPTERS.md >> /tmp/ch03-materializer.log 2>&1
            validation_status=$?
            python3 tools/check_code_explanation_structure.py --check >> /tmp/ch03-materializer.log 2>&1
            explanation_status=$?
            python3 tools/check_context_markers.py --check >> /tmp/ch03-materializer.log 2>&1
            marker_status=$?
            python3 tools/audit_contextes_semantiques.py --check >> /tmp/ch03-materializer.log 2>&1
            semantic_status=$?
          else
            validation_status=1
            explanation_status=1
            marker_status=1
            semantic_status=1
          fi
          set -e

          overall=0
          for status in "$materialize_status" "$validation_status" "$explanation_status" "$marker_status" "$semantic_status"; do
            if [ "$status" -ne 0 ]; then overall=1; fi
          done

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          if [ "$overall" -ne 0 ]; then
            git reset --hard "$base_head"
            {
              printf 'run_id: %s\n' "$GITHUB_RUN_ID"
              printf 'materialize_status: %s\n' "$materialize_status"
              printf 'validation_status: %s\n' "$validation_status"
              printf 'explanation_status: %s\n' "$explanation_status"
              printf 'marker_status: %s\n' "$marker_status"
              printf 'semantic_status: %s\n\n' "$semantic_status"
              cat /tmp/ch03-materializer.log
            } > .qa/ch03/materializer-error.txt
            git add .qa/ch03/materializer-error.txt
            git commit -m 'chore(qa): publier le diagnostic du chapitre 3'
            git push origin "HEAD:$branch"
            exit 1
          fi

          rm -rf .qa/ch03
          git add -A
          git reset -- QA-CHAPTERS.md QA-CONTEXTES.md 2>/dev/null || true
          git commit -m 'docs(livre-iii): matérialiser le chapitre 3'
          git push origin "HEAD:$branch"
