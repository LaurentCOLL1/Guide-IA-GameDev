name: Temporary Chapter 20 Last Fixes

on:
  push:
    branches:
      - docs/livre-ii-ch20-inventaire-reputation

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch20-inventaire-reputation
          fetch-depth: 0

      - name: Apply final code fixes
        shell: bash
        run: |
          python3 .qa/ch20_last_fixes.py
          rm -f .github/workflows/temp-ch20-last-fixes.yml
          rm -f .qa/ch20_last_fixes.py
          rm -f .qa/ch20-last-fixes.trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(livre-ii): complete chapter 20 transfer and equipment flows"
          git push origin HEAD:docs/livre-ii-ch20-inventaire-reputation
