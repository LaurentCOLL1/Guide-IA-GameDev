name: Apply Chapter 7 Follow-up Fixes

on:
  push:
    branches:
      - fix/ch07-examples-and-explanations
    paths:
      - ".qa/ch07-followup-trigger.txt"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/ch07-examples-and-explanations
          fetch-depth: 0

      - name: Apply follow-up corrections
        run: python3 .qa/apply_ch07_followup.py

      - name: Remove temporary files
        run: |
          rm -f .qa/apply_ch07_followup.py
          rm -f .qa/ch07-followup-trigger.txt
          rm -f .github/workflows/apply-ch07-followup.yml

      - name: Commit corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Livre-II/CHAPITRE-07-Donnees-avec-Resources-JSON-et-configurations.md
          git add Livre-II/QA/AUDIT-CHAPITRE-07.md
          git add -A .qa .github/workflows/apply-ch07-followup.yml
          git commit -m "docs(livre-ii): align chapter 7 examples with declared contracts"
          git push origin HEAD:fix/ch07-examples-and-explanations
