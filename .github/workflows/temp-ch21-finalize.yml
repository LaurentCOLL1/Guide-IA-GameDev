name: Temporary Chapter 21 Finalization

on:
  push:
    branches:
      - docs/livre-ii-ch21-economie
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'docs/livre-ii-ch21-economie'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch21-economie
          fetch-depth: 0

      - name: Finalize or record diagnostic
        shell: bash
        run: |
          set +e
          python3 .qa/ch21-finalize.py > /tmp/ch21-finalize.log 2>&1
          code=$?
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          if [ "$code" -ne 0 ]; then
            cp /tmp/ch21-finalize.log .qa/ch21-finalize-error.log
            git add .qa/ch21-finalize-error.log
            git commit -m "chore(qa): record chapter 21 finalization error"
            git push origin HEAD:docs/livre-ii-ch21-economie
            exit 0
          fi
          rm -f .github/workflows/temp-ch21-finalize.yml
          rm -f .qa/ch21-finalize.py
          rm -f .qa/ch21-finalize.trigger
          rm -f .qa/ch21-finalize-error.log
          git add -A
          git commit -m "docs(livre-ii): finalize chapter 21 economy"
          git push origin HEAD:docs/livre-ii-ch21-economie
