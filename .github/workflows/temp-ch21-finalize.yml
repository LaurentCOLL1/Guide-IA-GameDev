name: Temporary Chapter 21 Finalization

on:
  push:
    branches:
      - docs/livre-ii-ch21-economie

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch21-economie
          fetch-depth: 0

      - name: Finalize chapter, QA and governance
        run: python3 .qa/ch21-finalize.py

      - name: Remove temporary files and commit
        run: |
          rm -f .github/workflows/temp-ch21-finalize.yml
          rm -f .qa/ch21-finalize.py
          rm -f .qa/ch21-finalize.trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "docs(livre-ii): finalize chapter 21 economy"
          git push origin HEAD:docs/livre-ii-ch21-economie
