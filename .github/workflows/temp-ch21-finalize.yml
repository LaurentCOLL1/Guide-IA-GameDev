name: Temporary Chapter 21 Finalization

on:
  push:
    branches:
      - docs/livre-ii-ch21-economie
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'docs/livre-ii-ch21-economie'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch21-economie
          fetch-depth: 1
          show-progress: false

      - name: Run finalizer
        id: finalizer
        continue-on-error: true
        shell: bash
        run: python3 .qa/ch21-finalize.py > /tmp/ch21-finalize.log 2>&1

      - name: Upload finalization diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ch21-finalization-diagnostic
          path: /tmp/ch21-finalize.log
          if-no-files-found: error

      - name: Commit successful finalization
        if: steps.finalizer.outcome == 'success'
        shell: bash
        run: |
          rm -f .github/workflows/temp-ch21-finalize.yml
          rm -f .qa/ch21-finalize.py
          rm -f .qa/ch21-finalize.trigger
          rm -f .qa/ch21-finalize-error.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "docs(livre-ii): finalize chapter 21 economy"
          git push origin HEAD:docs/livre-ii-ch21-economie

      - name: Fail on diagnostic error
        if: steps.finalizer.outcome != 'success'
        run: exit 1
