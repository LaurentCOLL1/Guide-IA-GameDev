name: Fix Faulty Git Example Context

on:
  push:
    branches:
      - qa/retrofit-error-examples-ch01-ch06
    paths:
      - tools/fix_faulty_git_example_context.py
      - .github/workflows/fix-faulty-git-example-context.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: qa/retrofit-error-examples-ch01-ch06
          fetch-depth: 0

      - name: Patch context
        run: python tools/fix_faulty_git_example_context.py

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(docs): mark faulty Git commands as literal text" || exit 0
          git push origin HEAD:qa/retrofit-error-examples-ch01-ch06
