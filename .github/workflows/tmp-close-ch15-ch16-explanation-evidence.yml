name: Temporary Close Chapter 15-16 Explanation Evidence

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  close-evidence:
    if: github.head_ref == 'docs/enrich-code-explanations-ch15-ch16' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/enrich-code-explanations-ch15-ch16
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Close explanation evidence
        run: python tools/qa/tmp_close_ch15_ch16_explanation_evidence.py
      - name: Commit closed evidence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Livre-II/QA/VALIDATION-FINALE-CHAPITRE-15.yaml Livre-II/QA/VALIDATION-FINALE-CHAPITRE-16.yaml
          git commit -m "docs(qa): close chapter 15 and 16 explanation evidence"
          git push origin HEAD:docs/enrich-code-explanations-ch15-ch16
