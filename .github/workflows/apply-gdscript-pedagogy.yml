name: Apply GDScript Pedagogy

on:
  push:
    branches:
      - docs/deepen-gdscript-explanations
    paths:
      - "tools/deepen_gdscript_chapter.py"
      - ".github/workflows/apply-gdscript-pedagogy.yml"

permissions:
  contents: write

jobs:
  apply:
    if: "!contains(github.event.head_commit.message, '[skip pedagogy migration]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: docs/deepen-gdscript-explanations
          fetch-depth: 0
      - name: Apply corrections
        run: python3 tools/deepen_gdscript_chapter.py
      - name: Verify context markers
        run: |
          python3 tools/audit_contextes_utilisation.py --check
          python3 tools/audit_contextes_semantiques.py --check
      - name: Commit corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Livre-II/CHAPITRE-02-Fondamentaux-de-GDScript.md Livre-II/QA/AUDIT-CHAPITRES-01-02.md
          git commit -m "docs(livre-ii): explain GDScript examples line by line [skip pedagogy migration]"
          git push origin HEAD:docs/deepen-gdscript-explanations

# Trigger refreshed after enabling the base-branch migration workflow.
