name: Fix Project Asteria summaries

on:
  push:
    branches:
      - fix/livre-iii-syntheses-asteria
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.event_name == 'push' || github.head_ref == 'fix/livre-iii-syntheses-asteria'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/livre-iii-syntheses-asteria
          fetch-depth: 1
          show-progress: false
      - name: Reconstruire et exécuter le correcteur vérifié
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          base64 -d .qa/fix_asteria_summaries.py.gz.b64 | gzip -d > .qa/fix_asteria_summaries.py
          python -m py_compile .qa/fix_asteria_summaries.py
          if ! python .qa/fix_asteria_summaries.py > /tmp/fix-asteria.log 2>&1; then
            tail -n 120 /tmp/fix-asteria.log > .qa/fix-asteria-error.log
            git add .qa/fix-asteria-error.log
            git commit -m "chore: consigner l’erreur du correcteur Asteria" || true
            git push || true
            exit 0
          fi
