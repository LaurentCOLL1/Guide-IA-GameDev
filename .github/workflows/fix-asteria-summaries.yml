name: Fix Project Asteria summaries

on:
  push:
    branches:
      - fix/livre-iii-syntheses-asteria

permissions:
  contents: write

jobs:
  fix-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configurer Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Appliquer ou fermer le correctif
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import datetime as dt
          import hashlib
          import os
          import re
          import subprocess
          import sys

          ROOT = Path('.')
          TEMP_WORKFLOW = Path('.github/workflows/fix-asteria-summaries.yml')
          NOW = dt.datetime.now(dt.timezone(dt.timedelta(hours=2))).replace(microsecond=0)
          ISO = NOW.isoformat()
          DATE = NOW.date().isoformat()
          RUN_ID = os.environ['RUN_ID']

          chapters = {
              17: (
                  Path('Livre-III/CHAPITRE-17-UV-retopologie-et-baking.md'),
                  """Project Asteria retient `AST-BAKE-PILOT-RELAY-001` comme étalon de retopologie, d’UV et de baking. Les sources haute résolution, basse résolution et cage restent séparées et versionnées ; le maillage final possède l’autorité sur la silhouette, la triangulation, les UV, les normales et les tangentes. Les profils statique et déformable sont qualifiés séparément afin qu’une optimisation locale ne dégrade ni les appuis ni les zones de flexion.\n\nLe pipeline Asteria impose une densité de texels mesurée, des marges compatibles avec les mipmaps, des chevauchements explicitement autorisés, un espace tangent MikkTSpace et des normales OpenGL. Chaque bake possède un manifeste reliant sources, paramètres, cartes produites, empreintes et contrôle Blender–Godot. Une modification tardive de topologie, d’UV, de normales ou de triangulation invalide le bake précédent.\n\nLa porte reste bloquée tant que les fichiers high, low et cage, les textures, le GLB, les captures comparatives et le rapport de contrôle ne sont pas matérialisés. Le chapitre fixe donc le contrat opérationnel de Project Asteria sans revendiquer une qualité visuelle, une compatibilité de déformation ou une performance runtime mesurée."""
              ),
              18: (
                  Path('Livre-III/CHAPITRE-18-LOD-imposteurs-et-optimisation-geometrique.md'),
                  """Project Asteria retient `AST-LOD-PILOT-SIGNAL-TOWER-001` comme étalon de réduction géométrique. Le LOD0 approuvé reste la source canonique ; chaque LOD manuel, LOD automatique, HLOD, imposteur ou billboard possède une identité, une plage d’usage, un profil de matériau, une règle d’ombre, une collision éventuelle et une provenance versionnée. Les décisions sont pilotées par la couverture écran et l’importance visuelle ou gameplay, non par un pourcentage de décimation isolé.\n\nLes transitions Asteria utilisent des plages documentées, une hystérésis et, lorsque le renderer le permet, un fondu qualifié. Les silhouettes, masses, ouvertures, haubans et repères de lecture prioritaires sont protégés avant les détails internes. Les proxies de collision, d’occlusion et d’ombre restent indépendants de la représentation visuelle afin qu’un gain graphique ne modifie pas silencieusement le comportement du monde.\n\nLa chaîne n’est acceptée qu’après comparaison dans une scène Godot reproductible avec profils de caméra, captures, données brutes et tableau avant/après. Tant que les meshes simplifiés, textures d’imposteur, scènes et mesures n’existent pas, Project Asteria conserve le statut `static-review` et ne revendique aucun gain de mémoire, de draw calls ou de temps GPU."""
              ),
              19: (
                  Path('Livre-III/CHAPITRE-19-Rigging-et-skinning.md'),
                  """Project Asteria retient `AST-RIG-PILOT-SCOUT-001` comme squelette témoin pour les personnages humanoïdes. Le squelette de déformation exporté, le rig de contrôle Blender, les profils de skinning, la rest pose, les sockets et le `BoneMap` sont versionnés comme contrats distincts. Les contrôleurs, widgets et mécanismes internes ne sont pas exportés lorsqu’ils n’appartiennent pas à la déformation livrée.\n\nLe bind Asteria exige des axes et rolls documentés, des poids normalisés, un budget d’influences mesuré et une grille de poses couvrant repos, amplitudes usuelles et extrêmes. Les correctifs sont justifiés par une déformation observable ; les sockets sont contrôlés avec des accessoires témoins ; toute modification de hiérarchie, de rest pose ou de noms d’os déclenche une nouvelle qualification du retargeting et des animations dépendantes.\n\nLa porte reste bloquée tant que le rig Blender, les poids, la grille de poses, le GLB filtré, l’import `Skeleton3D`, les sockets et le rapport de déformation ne sont pas réellement produits et revus. Le chapitre fixe l’interface du personnage Asteria sans revendiquer un rig opérationnel ni une déformation runtime validée."""
              ),
              20: (
                  Path('Livre-III/CHAPITRE-20-Animation-procedurale-et-animation-par-keyframes.md'),
                  """Project Asteria retient `AST-ANIM-PILOT-SCOUT-001` comme bibliothèque témoin construite sur le rig gelé du chapitre 19. Les Actions Blender canoniques, leur base temporelle, leurs phases, contacts, boucles, vitesses et événements sont versionnés séparément du graphe de lecture Godot. Le root motion, les fenêtres d’action et les pistes de méthode transportent des faits d’animation ; ils ne prennent pas l’autorité sur les règles de gameplay.\n\nLe runtime Asteria organise locomotion, actions ponctuelles, couches additives, masques, blend spaces et machine à états dans un `AnimationTree` documenté. Chaque transition possède une durée, une politique d’interruption, une compatibilité de phase et une revue bidirectionnelle. Le regard, la visée, le placement des pieds et le warping restent des corrections procédurales bornées, comparées en mode activé et désactivé, et ne servent jamais à masquer une mauvaise animation source.\n\nLa porte d’acceptation exige les clips, le manifeste, le GLB, les bibliothèques importées, la matrice de transitions, les captures de contacts et une scène Godot reproductible. Tant que ces éléments ne sont pas exécutés, Project Asteria conserve le niveau `static-review` et ne revendique ni fluidité, ni absence de glissement, ni coût runtime mesuré."""
              ),
          }

          audits = {n: Path(f'Livre-III/QA/AUDIT-CHAPITRE-{n}.md') for n in chapters}
          proofs = {n: Path(f'Livre-III/QA/VALIDATION-FINALE-CHAPITRE-{n}.yaml') for n in chapters}

          def write(path: Path, text: str):
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(text.rstrip() + '\n', encoding='utf-8')

          def bump_patch(text: str) -> str:
              m = re.search(r'(?m)^version: ["\']?(\d+)\.(\d+)\.(\d+)["\']?$', text)
              if not m:
                  return text
              old = m.group(0)
              new = f'version: "{m.group(1)}.{m.group(2)}.{int(m.group(3))+1}"'
              return text.replace(old, new, 1)

          def replace_frontmatter_time(text: str) -> str:
              text = re.sub(r'(?m)^last-verified: .*$', f'last-verified: "{ISO}"', text, count=1)
              text = re.sub(r'(?m)^audit-date: .*$', f'audit-date: "{ISO}"', text, count=1)
              return text

          def next_section_number(text: str) -> int:
              nums = [int(x) for x in re.findall(r'(?m)^##\s+(\d+)\.', text)]
              return max(nums) + 1 if nums else 1

          missing = [n for n, (p, _) in chapters.items() if 'Synthèse opérationnelle pour Project Asteria' not in p.read_text(encoding='utf-8')]

          if missing:
              for n, (path, summary) in chapters.items():
                  text = path.read_text(encoding='utf-8')
                  if 'Synthèse opérationnelle pour Project Asteria' not in text:
                      text = bump_patch(replace_frontmatter_time(text))
                      text = text.rstrip() + f'\n\n## {next_section_number(text)}. Synthèse opérationnelle pour Project Asteria\n\n{summary}\n'
                      write(path, text)

                  audit = audits[n]
                  at = audit.read_text(encoding='utf-8')
                  at = bump_patch(replace_frontmatter_time(at))
                  if 'Correctif transversal — Synthèse opérationnelle Project Asteria' not in at:
                      at += f"\n## Correctif transversal — Synthèse opérationnelle Project Asteria\n\nLa section de clôture propre à Project Asteria a été restaurée dans le chapitre {n}. Elle transforme la conclusion générale en décisions de pipeline, identifiants, dépendances, portes d’acceptation et réserves directement applicables au projet fil rouge. Ce correctif ne modifie pas le périmètre technique ni le niveau de preuve `static-review` ; il restaure une exigence éditoriale transversale et rend sa présence contrôlable automatiquement.\n"
                  write(audit, at)

              continuity = Path('CONTINUITE-PROJET.md')
              ct = continuity.read_text(encoding='utf-8')
              ct = re.sub(r'(?m)^version: "3\.50\.1"$', 'version: "3.51.0"', ct, count=1)
              ct = re.sub(r'(?m)^last-updated: .*$', f'last-updated: "{ISO}"', ct, count=1)
              ct = ct.replace('**En cours : 18 chapitres sur 30.**', '**En cours : 20 chapitres sur 30.**', 1)
              if '19. Rigging et skinning — terminé au niveau `static-review`.' not in ct:
                  ct = ct.replace('18. LOD, imposteurs et optimisation géométrique — terminé au niveau `static-review`.\n', '18. LOD, imposteurs et optimisation géométrique — terminé au niveau `static-review`.\n19. Rigging et skinning — terminé au niveau `static-review`.\n20. Animation procédurale et animation par keyframes — terminé au niveau `static-review`.\n', 1)
              ct = ct.replace('Les chapitres 19 à 30 restent définis', 'Les chapitres 21 à 30 restent définis', 1)
              rule = "\nChaque chapitre du Livre III doit comporter une section finale intitulée **« Synthèse opérationnelle pour Project Asteria »**. Elle doit traduire le contenu en décisions permanentes du projet fil rouge : identifiants retenus, conventions, dépendances, livrables, porte d’acceptation et réserves. Son absence est désormais une erreur QA bloquante pour les chapitres 17 et suivants.\n"
              if 'Son absence est désormais une erreur QA bloquante' not in ct:
                  anchor = 'Cette règle est une porte d’audit bloquante pour les nouveaux chapitres comme pour les corrections rétroactives.'
                  ct = ct.replace(anchor, rule + '\n' + anchor, 1)
              journal = f"\n### {DATE} — Restauration des synthèses opérationnelles Asteria\n\n- chapitres 17 à 20 complétés par une synthèse opérationnelle propre à Project Asteria ;\n- progression autoritative corrigée de 18/30 à 20/30 ;\n- règle de clôture ajoutée au plan maître et à la continuité ;\n- validateur permanent ajouté pour empêcher une nouvelle régression ;\n- audits et preuves QA actualisés sans modifier le niveau `static-review`.\n"
              if 'Restauration des synthèses opérationnelles Asteria' not in ct:
                  ct += journal
              write(continuity, ct)

              plan = Path('plans/LIVRE-III-PLAN-MAITRE.md')
              pt = bump_patch(plan.read_text(encoding='utf-8'))
              rule_plan = """\n## Règle transversale de clôture — Project Asteria\n\nTout chapitre du Livre III doit se terminer par une section intitulée **« Synthèse opérationnelle pour Project Asteria »**. Cette section ne répète pas le résumé pédagogique : elle convertit les apprentissages en décisions applicables au projet fil rouge, en nommant les identifiants pilotes, les conventions retenues, les dépendances amont et aval, les livrables attendus, la porte d’acceptation et les réserves de preuve.\n\nPour les chapitres 17 et suivants, l’absence de cette section, un corps inférieur à deux paragraphes substantiels ou l’absence de référence explicite à Project Asteria constitue une erreur QA bloquante. Les chapitres 17 à 20 ont été corrigés rétroactivement ; les chapitres 21 à 30 doivent intégrer cette section dès leur première version.\n"""
              if 'Règle transversale de clôture — Project Asteria' not in pt:
                  pt += rule_plan
              write(plan, pt)

              validator = Path('scripts/validate_project_asteria_summaries.py')
              validator_text = '''#!/usr/bin/env python3
from pathlib import Path
import re
import sys

HEADING = "Synthèse opérationnelle pour Project Asteria"
errors = []
checked = 0
for path in sorted(Path("Livre-III").glob("CHAPITRE-*.md")):
    match = re.search(r"CHAPITRE-(\\d+)-", path.name)
    if not match or int(match.group(1)) < 17:
        continue
    checked += 1
    text = path.read_text(encoding="utf-8")
    heading_match = re.search(r"(?m)^##(?:\\s+\\d+\\.)?\\s+Synthèse opérationnelle pour Project Asteria\\s*$", text)
    if not heading_match:
        errors.append(f"{path}: section obligatoire absente")
        continue
    body = text[heading_match.end():]
    next_heading = re.search(r"(?m)^##\\s+", body)
    if next_heading:
        body = body[:next_heading.start()]
    paragraphs = [p.strip() for p in re.split(r"\\n\\s*\\n", body) if len(p.strip()) >= 80]
    if len(paragraphs) < 2:
        errors.append(f"{path}: synthèse trop courte, deux paragraphes substantiels minimum")
    if "Project Asteria" not in body:
        errors.append(f"{path}: Project Asteria n’est pas nommé dans le corps de la synthèse")
    if not any(token in body for token in ("porte", "acceptation", "bloquée", "bloque")):
        errors.append(f"{path}: aucune porte d’acceptation ou condition de blocage explicite")

if errors:
    print("Validation des synthèses Asteria : ÉCHEC", file=sys.stderr)
    for error in errors:
        print(f"- {error}", file=sys.stderr)
    sys.exit(1)
print(f"Validation des synthèses Asteria : SUCCÈS ({checked} chapitres contrôlés)")
'''
              write(validator, validator_text)

              permanent = Path('.github/workflows/validate-project-asteria-summaries.yml')
              permanent_text = '''name: Validate Project Asteria summaries

on:
  pull_request:
    paths:
      - "Livre-III/CHAPITRE-*.md"
      - "scripts/validate_project_asteria_summaries.py"
      - ".github/workflows/validate-project-asteria-summaries.yml"
  push:
    branches: [main]
    paths:
      - "Livre-III/CHAPITRE-*.md"
      - "scripts/validate_project_asteria_summaries.py"
      - ".github/workflows/validate-project-asteria-summaries.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Contrôler les synthèses opérationnelles Asteria
        run: python scripts/validate_project_asteria_summaries.py
'''
              write(permanent, permanent_text)

              subprocess.run(['python', str(validator)], check=True)
              subprocess.run(['git', 'add', '.'], check=True)
              subprocess.run(['git', 'commit', '-m', 'docs(livre-iii): restaurer les synthèses opérationnelles Asteria'], check=True)
              subprocess.run(['git', 'push'], check=True)
              sys.exit(0)

          def sha256(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          def metrics(text: str):
              lines = len(text.splitlines())
              headings = len(re.findall(r'(?m)^#{1,6}\s+', text))
              fences = len(re.findall(r'(?m)^```', text)) // 2
              markers = text.count('<!-- qa:code-explanation -->')
              return lines, headings, fences, markers, max(markers - 20, 0)

          need_proof = any('retrofit-validation:' not in p.read_text(encoding='utf-8') for p in proofs.values())
          if need_proof:
              subprocess.run(['python', 'scripts/validate_project_asteria_summaries.py'], check=True)
              head = subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip()
              for n, proof in proofs.items():
                  chapter = chapters[n][0]
                  audit = audits[n]
                  lines, headings, blocks, markers, structured = metrics(chapter.read_text(encoding='utf-8'))
                  text = proof.read_text(encoding='utf-8')
                  text = re.sub(r"(?m)^validation-date:.*$", f"validation-date: '{DATE}'", text, count=1)
                  text = re.sub(r'(?m)^validated-head-commit:.*$', f'validated-head-commit: {head}', text, count=1)
                  text = re.sub(r'(?m)^  version: .*$', '  version: 1.0.1', text, count=1)
                  replacements = {
                      'chapter-lines': lines,
                      'chapter-headings': headings,
                      'chapter-code-and-data-blocks': blocks,
                      'significant-code-and-data-blocks': blocks,
                      'code-explanation-markers': markers,
                      'structured-non-error-code-explanations': structured,
                  }
                  for key, value in replacements.items():
                      text = re.sub(rf'(?m)^  {re.escape(key)}: .*$', f'  {key}: {value}', text, count=1)
                  if 'project-asteria-operational-summary-present:' not in text:
                      text = text.replace('  master-plan-scope-covered: true\n', '  master-plan-scope-covered: true\n  project-asteria-operational-summary-present: true\n', 1)
                  text = re.sub(r'(?m)^  chapter-sha256: .*$', f'  chapter-sha256: {sha256(chapter)}', text, count=1)
                  text = re.sub(r'(?m)^  audit-sha256: .*$', f'  audit-sha256: {sha256(audit)}', text, count=1)
                  marker = '  retrofit-validation:\n    workflow-name: Fix Project Asteria summaries\n    execution: dedicated-validator\n    run-id: ' + RUN_ID + '\n    conclusion: success\n'
                  text = text.replace('  artifact:\n', marker + '  artifact:\n', 1)
                  write(proof, text)
              subprocess.run(['git', 'add', 'Livre-III/QA/VALIDATION-FINALE-CHAPITRE-17.yaml', 'Livre-III/QA/VALIDATION-FINALE-CHAPITRE-18.yaml', 'Livre-III/QA/VALIDATION-FINALE-CHAPITRE-19.yaml', 'Livre-III/QA/VALIDATION-FINALE-CHAPITRE-20.yaml'], check=True)
              subprocess.run(['git', 'commit', '-m', 'qa(livre-iii): actualiser les preuves des synthèses Asteria'], check=True)
              subprocess.run(['git', 'push'], check=True)
              sys.exit(0)

          closure_head = subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip()
          changed = False
          for proof in proofs.values():
              text = proof.read_text(encoding='utf-8')
              new = re.sub(r'(?m)^(evidence-closure:\n  commit:) .*$', rf'\1 {closure_head}', text, count=1)
              if new != text:
                  write(proof, new)
                  changed = True
          if TEMP_WORKFLOW.exists():
              TEMP_WORKFLOW.unlink()
              changed = True
          if changed:
              subprocess.run(['git', 'add', '.'], check=True)
              subprocess.run(['git', 'commit', '-m', 'chore(ci): fermer le correctif des synthèses Asteria'], check=True)
              subprocess.run(['git', 'push'], check=True)
          PY