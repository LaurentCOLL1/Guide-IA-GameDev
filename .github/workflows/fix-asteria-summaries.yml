name: Fix Project Asteria summaries

on:
  push:
    branches:
      - fix/livre-iii-syntheses-asteria
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.event_name == 'push' || github.head_ref == 'fix/livre-iii-syntheses-asteria'
    runs-on: ubuntu-latest
    steps:
      - name: Extraire silencieusement la branche documentaire
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin refs/heads/fix/livre-iii-syntheses-asteria
          git checkout -q -B fix/livre-iii-syntheses-asteria FETCH_HEAD
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Reconstruire et exécuter le correcteur vérifié
        run: |
          set -o pipefail
          base64 -d .qa/fix_asteria_summaries.py.gz.b64 | gzip -d > .qa/fix_asteria_summaries.py
          python -m py_compile .qa/fix_asteria_summaries.py
          if ! python .qa/fix_asteria_summaries.py > /tmp/fix-asteria.log 2>&1; then
            cat /tmp/fix-asteria.log
            exit 1
          fi
