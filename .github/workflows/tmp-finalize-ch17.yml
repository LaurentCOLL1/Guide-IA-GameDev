name: Temporary Finalize Chapter 17

on:
  push:
    branches:
      - docs/livre-ii-ch17-agents-ia-comportements-autonomes

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch17-agents-ia-comportements-autonomes
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply post-creation corrections
        run: python tools/qa/tmp_finalize_ch17.py
      - name: Re-audit corrected chapter
        run: python tools/qa/tmp_audit_ch17.py
      - name: Commit audited chapter
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Livre-II/CHAPITRE-17-Agents-IA-et-comportements-autonomes.md \
            Livre-II/QA/AUDIT-CHAPITRE-17.md \
            Livre-II/QA/VALIDATION-FINALE-CHAPITRE-17.yaml \
            Livre-II/index.md ROADMAP.md CONTINUITE-PROJET.md \
            tmp_ch17_audit_report.md
          git commit -m "docs(livre-ii): audit and complete chapter 17"
          git push origin HEAD:docs/livre-ii-ch17-agents-ia-comportements-autonomes
