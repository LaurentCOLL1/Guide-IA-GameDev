name: Chapter 5 Context Result File

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ch05-context-result-file.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  validate-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Chapter 5 branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-iii-ch05-provenance-licences
          fetch-depth: 0

      - name: Record validated document head
        run: echo "DOCUMENT_HEAD=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Validate contexts
        run: |
          mkdir -p dist
          set -o pipefail
          python3 tools/check_context_markers.py --check \
            | tee dist/QA-CONTEXTES.log
          python3 tools/audit_contextes_semantiques.py --check \
            | tee dist/QA-CONTEXTES-SEMANTIQUES.log
          python3 tools/report_contextes_utilisation.py \
            | tee dist/QA-CONTEXTES-COUVERTURE.md

      - name: Compute hashes
        run: |
          sha256sum \
            Livre-III/CHAPITRE-05-Provenance-licences-et-validation-des-assets.md \
            Livre-III/QA/AUDIT-CHAPITRE-05.md \
            | tee dist/CH05-SHA256.txt

      - name: Upload context audit
        uses: actions/upload-artifact@v4
        with:
          name: usage-context-audit
          if-no-files-found: error
          retention-days: 30
          path: |
            dist/QA-CONTEXTES.log
            dist/QA-CONTEXTES-SEMANTIQUES.log
            dist/QA-CONTEXTES-COUVERTURE.md
            dist/CH05-SHA256.txt

      - name: Write result file
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          artifact_json=''
          for attempt in 1 2 3 4 5; do
            artifact_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts")"
            count="$(jq '[.artifacts[] | select(.name == "usage-context-audit")] | length' <<<"$artifact_json")"
            if [ "$count" -ge 1 ]; then break; fi
            sleep 2
          done
          artifact_id="$(jq -r '.artifacts[] | select(.name == "usage-context-audit") | .id' <<<"$artifact_json" | head -1)"
          artifact_digest="$(jq -r '.artifacts[] | select(.name == "usage-context-audit") | .digest' <<<"$artifact_json" | head -1 | sed 's/^sha256://')"
          chapter_sha="$(awk '/CHAPITRE-05-Provenance/{print $1}' dist/CH05-SHA256.txt)"
          audit_sha="$(awk '/AUDIT-CHAPITRE-05/{print $1}' dist/CH05-SHA256.txt)"
          mkdir -p .qa
          jq -n \
            --arg document_head "$DOCUMENT_HEAD" \
            --argjson run_id "$GITHUB_RUN_ID" \
            --argjson artifact_id "$artifact_id" \
            --arg artifact_digest "$artifact_digest" \
            --arg chapter_sha256 "$chapter_sha" \
            --arg audit_sha256 "$audit_sha" \
            '{document_head:$document_head,context_run_id:$run_id,context_artifact_id:$artifact_id,context_artifact_digest:$artifact_digest,chapter_sha256:$chapter_sha256,audit_sha256:$audit_sha256,conclusion:"success"}' \
            > .qa/ch05-context-result.json

      - name: Commit result to Chapter 5 branch
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .qa/ch05-context-result.json
          git commit -m 'ci(ch05): enregistrer les coordonnées de validation des contextes'
          git push origin HEAD:docs/livre-iii-ch05-provenance-licences
