name: Temporary Cleanup Chapter 12

on:
  push:
    branches:
      - docs/livre-ii-ch12-http-websocket-tasks

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch12-http-websocket-tasks
      - name: Remove temporary finalization files
        run: |
          rm -rf tools/tmp_ch12_parts
          rm -f tools/tmp_finalize_ch12.py
          rm -f .github/workflows/tmp-finalize-ch12.yml
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "chore: remove temporary chapter 12 finalizer"
          git push origin HEAD:docs/livre-ii-ch12-http-websocket-tasks
