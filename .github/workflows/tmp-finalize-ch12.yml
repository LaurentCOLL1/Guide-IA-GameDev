name: Temporary Finalize Chapter 12

on:
  push:
    branches:
      - docs/livre-ii-ch12-http-websocket-tasks

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch12-http-websocket-tasks
      - name: Apply audited chapter and continuity
        run: python tools/tmp_finalize_ch12.py
      - name: Commit final chapter files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Livre-II/CHAPITRE-12-HTTP-WebSocket-API-compatibles-OpenAI-et-files-de-taches.md CONTINUITE-PROJET.md
          git diff --cached --quiet && exit 0
          git commit -m "docs(livre-ii): apply chapter 12 audit corrections"
          git push origin HEAD:docs/livre-ii-ch12-http-websocket-tasks
