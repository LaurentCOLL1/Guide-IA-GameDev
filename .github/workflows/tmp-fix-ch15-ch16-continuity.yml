name: Temporary Fix Chapter 15-16 Continuity

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-continuity:
    if: github.head_ref == 'docs/fix-continuity-ch15-ch16-explanations' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/fix-continuity-ch15-ch16-explanations
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Correct continuity values
        run: python tools/qa/tmp_fix_ch15_ch16_continuity.py
      - name: Commit continuity correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CONTINUITE-PROJET.md
          git commit -m "docs(project): correct chapter 15 and 16 continuity metrics"
          git push origin HEAD:docs/fix-continuity-ch15-ch16-explanations
