name: Temporary Fix Chapter 12 QA Label

on:
  push:
    branches:
      - docs/livre-ii-ch12-http-websocket-tasks

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch12-http-websocket-tasks
      - name: Correct semantic QA label and remove workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('Livre-II/CHAPITRE-12-HTTP-WebSocket-API-compatibles-OpenAI-et-files-de-taches.md')
          text = path.read_text(encoding='utf-8')
          old = '> **[LECTURE] Choix corrigé — Référence.**'
          new = '> **[LECTURE] Exemple corrigé — Référence.**'
          if old not in text:
              raise SystemExit('Libellé attendu absent')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          rm -f .github/workflows/tmp-fix-ch12-label.yml
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(qa): fix chapter 12 corrected-example label"
          git push origin HEAD:docs/livre-ii-ch12-http-websocket-tasks
