name: Chapter 28 Finalizer Runner

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: read

jobs:
  finalize:
    if: github.event.pull_request.head.ref == 'docs/livre-ii-ch28-journalisation-diagnostic'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout chapter branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install validator dependency
        run: python3 -m pip install --disable-pip-version-check pyyaml

      - name: Finalize governance and validate
        shell: bash
        run: |
          set -euxo pipefail
          python3 .qa/ch28/finalize.py
          python3 tools/validate_chapters.py --report /tmp/ch28-QA.md
          python3 tools/check_context_markers.py --check
          python3 tools/audit_contextes_semantiques.py --check
          python3 tools/check_code_explanation_structure.py

      - name: Push permanent chapter files
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf .qa/ch28
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(livre-ii): finalize chapter 28 governance"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
