name: CH04 Fix Validation Labels

on:
  push:
    branches:
      - docs/livre-iii-ch04-pipeline-blender
    paths:
      - .github/workflows/ch04-fix-validation.yml

permissions:
  contents: write

jobs:
  fix-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-iii-ch04-pipeline-blender
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validator dependency
        run: python -m pip install --disable-pip-version-check PyYAML

      - name: Normalize corrected-example labels
        shell: python
        run: |
          from pathlib import Path

          chapter_path = Path("Livre-III/CHAPITRE-04-Pipeline-Blender-et-organisation-des-fichiers.md")
          chapter = chapter_path.read_text(encoding="utf-8")
          labels = (
              "Réglage corrigé",
              "Hiérarchie corrigée",
              "Action corrigée",
              "Collection corrigée",
              "Procédure corrigée",
              "Contrat corrigé",
              "Décision corrigée",
          )
          changed = 0
          for label in labels:
              marker = f"**{label}**"
              count = chapter.count(marker)
              if count != 1:
                  raise RuntimeError(f"{marker}: attendu une fois, trouvé {count}")
              chapter = chapter.replace(marker, "**Exemple corrigé**", 1)
              changed += 1
          chapter_path.write_text(chapter, encoding="utf-8")
          print(f"Libellés normalisés : {changed}")

          continuity_path = Path("CONTINUITE-PROJET.md")
          continuity = continuity_path.read_text(encoding="utf-8")
          continuity = continuity.replace(
              "Il ne fournira pas d’avis juridique personnalisé.\n## 27. Journal",
              "Il ne fournira pas d’avis juridique personnalisé.\n\n## 27. Journal",
              1,
          )
          continuity_path.write_text(continuity, encoding="utf-8")

      - name: Validate chapters without PDF
        run: python tools/validate_chapters.py --root . --report dist/QA-CHAPTERS.md

      - name: Validate usage contexts
        run: python tools/check_context_markers.py --check

      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          rm -f .github/workflows/ch04-fix-validation.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs(livre-iii): normaliser les corrections du chapitre 4'
          git push origin HEAD:docs/livre-iii-ch04-pipeline-blender
