name: Temporary Apply Chapter 15 Audit

on:
  push:
    branches:
      - docs/livre-ii-ch15-relations-sociales
    paths:
      - .github/workflows/temp-apply-ch15-audit.yml

permissions:
  contents: write

jobs:
  apply-audit-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch15-relations-sociales
          fetch-depth: 0

      - name: Apply audited chapter patch
        shell: bash
        run: |
          set -euo pipefail
          git apply --check tmp/ch15-audit.patch
          git apply tmp/ch15-audit.patch
          rm tmp/ch15-audit.patch
          rm .github/workflows/temp-apply-ch15-audit.yml

      - name: Commit audited chapter
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(livre-ii): finalize audited chapter 15"
          git push
