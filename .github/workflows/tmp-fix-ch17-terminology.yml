name: Temporary Fix Chapter 17 Terminology

on:
  push:
    branches:
      - docs/clarify-ch17-error-terminology

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/clarify-ch17-error-terminology
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply correction and assertions
        run: python tools/qa/tmp_fix_ch17_terminology.py
      - name: Commit permanent corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Livre-II/CHAPITRE-17-Agents-IA-et-comportements-autonomes.md \
            Livre-II/QA/PROTOCOLE-AUDIT-POST-CREATION.md \
            Livre-II/QA/AUDIT-CHAPITRE-17.md \
            Livre-II/QA/VALIDATION-FINALE-CHAPITRE-17.yaml \
            Livre-II/index.md ROADMAP.md CONTINUITE-PROJET.md
          git commit -m "docs(livre-ii): clarify chapter 17 results and scheduling"
          git push origin HEAD:docs/clarify-ch17-error-terminology
