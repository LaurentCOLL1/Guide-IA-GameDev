name: CH05 Apply Governance

on:
  push:
    branches:
      - docs/livre-iii-ch05-provenance-licences
    paths:
      - .github/workflows/ch05-apply-governance.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout chapter branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-iii-ch05-provenance-licences
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validator dependency
        run: python -m pip install --disable-pip-version-check --quiet PyYAML

      - name: Apply governance update
        run: python tools/apply_ch05_batch.py

      - name: Validate chapters without PDF
        run: python tools/validate_chapters.py --root . --report dist/QA-CHAPTERS.md

      - name: Validate structured explanations
        run: python tools/check_code_explanation_structure.py --check

      - name: Validate usage contexts
        run: |
          python tools/check_context_markers.py --check
          python tools/audit_contextes_semantiques.py --check
          python tools/report_contextes_utilisation.py > dist/QA-CONTEXTES-COUVERTURE.md

      - name: Assert no PDF was produced
        shell: bash
        run: |
          if find . -type f -name '*.pdf' -not -path './.git/*' -print -quit | grep -q .; then
            echo 'Un PDF a été produit pendant la validation légère.' >&2
            exit 1
          fi

      - name: Remove temporary tooling and commit permanent lot
        shell: bash
        run: |
          rm -rf dist
          rm -f tools/apply_ch05_batch.py
          rm -f .github/workflows/ch05-apply-governance.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A CONTINUITE-PROJET.md Livre-III ROADMAP.md contents.txt plans/LIVRE-III-PLAN-MAITRE.md tools/apply_ch05_batch.py .github/workflows/ch05-apply-governance.yml
          git commit -m 'docs(livre-iii): intégrer le chapitre 5 à la gouvernance'
          git push origin HEAD:docs/livre-iii-ch05-provenance-licences
