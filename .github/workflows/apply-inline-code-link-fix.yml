name: Apply Inline Code Link Fix

on:
  push:
    branches:
      - fix/ch07-examples-and-explanations
    paths:
      - ".qa/inline-code-link-trigger.txt"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/ch07-examples-and-explanations
          fetch-depth: 0

      - name: Apply validator correction
        run: python3 .qa/apply_inline_code_link_fix.py

      - name: Remove temporary files
        run: |
          rm -f .qa/apply_inline_code_link_fix.py
          rm -f .qa/inline-code-link-trigger.txt
          rm -f .qa/ch07-review-note.md
          rm -f .github/workflows/apply-inline-code-link-fix.yml

      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/validate_chapters.py
          git add Livre-II/QA/AUDIT-CHAPITRE-07.md
          git add CONTINUITE-PROJET.md
          git add -A .qa .github/workflows/apply-inline-code-link-fix.yml
          git commit -m "qa: ignore inline code during Markdown link validation"
          git push origin HEAD:fix/ch07-examples-and-explanations
