name: Chapter 2 Continuity Closure

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  close-continuity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout chapter branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-iii-ch02-direction-artistique
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Record final QA closure in continuity
        run: python3 .github/scripts/ch02_close_continuity.py

      - name: Commit continuity closure
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Continuity already closed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CONTINUITE-PROJET.md
          git commit -m "docs(continuité): fermer la validation du chapitre 2"
          git push origin HEAD:docs/livre-iii-ch02-direction-artistique
