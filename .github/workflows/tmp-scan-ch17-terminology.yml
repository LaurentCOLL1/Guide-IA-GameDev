name: Temporary Scan Chapter 17 Terminology

on:
  push:
    branches:
      - docs/clarify-ch17-error-terminology

permissions:
  contents: write

jobs:
  scan:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/clarify-ch17-error-terminology
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Scan terminology
        run: python tools/qa/tmp_scan_ch17_terms.py
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f tmp_ch17_terminology_report.md
          git commit -m "chore(qa): record chapter 17 terminology scan"
          git push origin HEAD:docs/clarify-ch17-error-terminology
