name: CH04 Fix Error Cases

on:
  push:
    branches:
      - docs/livre-iii-ch04-pipeline-blender
    paths:
      - .github/workflows/ch04-fix-error-cases.yml

permissions:
  contents: write

jobs:
  fix-validate-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-iii-ch04-pipeline-blender
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Correct the seven pedagogical labels
        shell: python
        run: |
          from pathlib import Path

          chapter_path = Path("Livre-III/CHAPITRE-04-Pipeline-Blender-et-organisation-des-fichiers.md")
          audit_path = Path("Livre-III/QA/AUDIT-CHAPITRE-04.md")
          chapter = chapter_path.read_text(encoding="utf-8")

          replacements = {
              "**Réglage corrigé**": "**Exemple corrigé — réglage**",
              "**Hiérarchie corrigée**": "**Exemple corrigé — hiérarchie**",
              "**Action corrigée**": "**Exemple corrigé — action**",
              "**Collection corrigée**": "**Exemple corrigé — collection**",
              "**Procédure corrigée**": "**Exemple corrigé — procédure**",
              "**Contrat corrigé**": "**Exemple corrigé — contrat**",
              "**Décision corrigée**": "**Exemple corrigé — décision**",
          }
          for old, new in replacements.items():
              count = chapter.count(old)
              if count != 1:
                  raise RuntimeError(f"{old!r}: attendu une fois, trouvé {count}")
              chapter = chapter.replace(old, new, 1)

          timestamp_old = "2026-07-22T22:37:42+02:00"
          timestamp_new = "2026-07-22T22:57:37+02:00"
          if chapter.count(timestamp_old) != 2:
              raise RuntimeError("horodatages chapitre inattendus")
          chapter = chapter.replace(timestamp_old, timestamp_new)
          chapter_path.write_text(chapter, encoding="utf-8")

          audit = audit_path.read_text(encoding="utf-8")
          if audit.count(timestamp_old) != 2:
              raise RuntimeError("horodatages audit inattendus")
          audit_path.write_text(audit.replace(timestamp_old, timestamp_new), encoding="utf-8")

      - name: Install lightweight dependency
        run: python -m pip install --disable-pip-version-check PyYAML

      - name: Validate chapter structure
        run: python tools/validate_chapters.py --root . --report dist/QA-CHAPTERS.md

      - name: Validate usage contexts
        run: python tools/check_context_markers.py --check

      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          rm -f .github/workflows/ch04-fix-error-cases.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs(livre-iii): corriger les cas pédagogiques du chapitre 4'
          git push origin HEAD:docs/livre-iii-ch04-pipeline-blender
