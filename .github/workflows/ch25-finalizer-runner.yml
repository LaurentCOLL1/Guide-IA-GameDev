name: Chapter 25 Finalizer Runner

on:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  pull-requests: read

jobs:
  finalize:
    if: >-
      github.event.issue.pull_request &&
      github.event.issue.number == 60 &&
      github.event.comment.user.login == 'LaurentCOLL1' &&
      github.event.comment.body == '/finalize-ch25'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout chapter branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch25-narration-quetes-codex
          fetch-depth: 0

      - name: Finalize chapter and governance
        run: |
          python3 .qa/ch25_finalize.py
          python3 tools/validate_chapters.py --report /tmp/QA-CHAPTERS.md
          python3 tools/check_context_markers.py --check
          python3 tools/audit_contextes_semantiques.py --check
          test ! -e .qa/ch25_finalize.py

      - name: Commit finalized lot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No finalization changes."
            exit 0
          fi
          git commit -m "docs(livre-ii): finalize chapter 25 narrative system"
          git push origin HEAD:docs/livre-ii-ch25-narration-quetes-codex
