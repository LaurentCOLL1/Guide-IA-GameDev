name: Restore clickable technical reference links

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write

jobs:
  materialize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'docs/restore-clickable-reference-links'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Restore clickable reference links
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if [[ ! -f .qa/restore_clickable_reference_links.py ]]; then
            echo "No reference-link restorer found; nothing to do."
            exit 0
          fi

          python3 .qa/restore_clickable_reference_links.py
          rm -f .qa/restore_clickable_reference_links.py

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: restaurer les références techniques cliquables"
          git push origin "HEAD:${HEAD_BRANCH}"
