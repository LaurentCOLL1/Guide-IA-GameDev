name: Chapter 24 Generator

on:
  push:
    branches:
      - docs/livre-ii-ch24-domaines-construction
    paths:
      - .qa/generate_ch24.py
      - .github/workflows/ch24-generator.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout chapter branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch24-domaines-construction
          fetch-depth: 0

      - name: Generate, validate and commit chapter 24
        run: python3 .qa/generate_ch24.py
