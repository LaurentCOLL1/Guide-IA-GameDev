name: Temporary Chapter 20 Finalizer

on:
  push:
    branches:
      - docs/livre-ii-ch20-inventaire-reputation

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch20-inventaire-reputation
          fetch-depth: 0

      - name: Apply final corrections and governance
        shell: bash
        run: |
          python3 .qa/ch20_finalize.py
          rm -f .github/workflows/temp-ch20-finalize.yml
          rm -f .qa/ch20_finalize.py
          rm -f .qa/ch20-finalize.trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "docs(livre-ii): audit and govern chapter 20"
          git push origin HEAD:docs/livre-ii-ch20-inventaire-reputation
