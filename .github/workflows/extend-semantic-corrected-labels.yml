name: Extend Semantic Corrected Labels

on:
  push:
    branches:
      - docs/livre-ii-ch08-sqlite-migrations
    paths:
      - tools/extend_semantic_corrected_labels.py
      - .github/workflows/extend-semantic-corrected-labels.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch08-sqlite-migrations
          fetch-depth: 0

      - name: Extend semantic labels
        run: python tools/extend_semantic_corrected_labels.py

      - name: Commit validator update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(qa): accept architecture and flow corrections"
          git push origin HEAD:docs/livre-ii-ch08-sqlite-migrations
