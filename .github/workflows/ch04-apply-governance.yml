name: CH04 Validate And Clean

on:
  push:
    branches:
      - docs/livre-iii-ch04-pipeline-blender
    paths:
      - .github/workflows/ch04-apply-governance.yml

permissions:
  contents: write

jobs:
  validate-and-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-iii-ch04-pipeline-blender
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validator dependency
        run: python -m pip install --disable-pip-version-check PyYAML

      - name: Validate chapters without PDF
        run: python tools/validate_chapters.py --root . --report dist/QA-CHAPTERS.md

      - name: Validate usage contexts
        run: python tools/check_context_markers.py --check

      - name: Remove temporary Chapter 4 tooling
        shell: bash
        run: |
          rm -rf .qa/ch04
          rmdir .qa 2>/dev/null || true
          rm -f tools/apply_ch04_batch.py
          rm -f .github/workflows/apply-ch04-batch.yml
          rm -f .github/workflows/ch04-apply-governance.yml

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore(ci): supprimer les outils temporaires du chapitre 4'
          git push origin HEAD:docs/livre-iii-ch04-pipeline-blender
