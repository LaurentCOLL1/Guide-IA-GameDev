name: CH04 Apply Governance

on:
  push:
    branches:
      - docs/livre-iii-ch04-pipeline-blender

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validator dependency
        run: python -m pip install --disable-pip-version-check PyYAML

      - name: Apply governance update and remove temporary files
        run: python tools/apply_ch04_batch.py

      - name: Validate chapters without PDF
        run: python tools/validate_chapters.py --root . --report dist/QA-CHAPTERS.md

      - name: Validate usage contexts
        run: python tools/check_context_markers.py --check

      - name: Assert no PDF was produced
        shell: bash
        run: |
          if find . -type f -iname '*.pdf' -not -path './.git/*' | grep -q .; then
            echo 'A PDF exists in the working tree.' >&2
            exit 1
          fi

      - name: Commit permanent chapter lot
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs(livre-iii): intégrer le chapitre 4 à la gouvernance'
          git push origin HEAD:docs/livre-iii-ch04-pipeline-blender
