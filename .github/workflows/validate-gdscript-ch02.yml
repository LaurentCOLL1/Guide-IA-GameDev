name: Validate GDScript Chapter 2

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "Livre-II/CHAPITRE-02-Fondamentaux-de-GDScript.md"
      - "Livre-II/QA/AUDIT-CHAPITRES-01-02.md"
      - "tools/audit_gdscript_ch02.py"
      - ".github/workflows/validate-gdscript-ch02.yml"

permissions:
  contents: read

jobs:
  audit:
    name: Audit duplicates and beginner explanations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run chapter 2 audit
        run: |
          mkdir -p dist
          python3 tools/audit_gdscript_ch02.py

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gdscript-chapter-2-audit
          if-no-files-found: error
          retention-days: 14
          path: dist/AUDIT-GDSCRIPT-CH02.md
