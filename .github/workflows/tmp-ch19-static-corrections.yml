name: Temporary Chapter 19 Continuity Finalizer

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'docs/livre-ii-ch19-competences-pouvoirs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch19-competences-pouvoirs
          fetch-depth: 0
      - name: Update continuity without rewriting history
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('CONTINUITE-PROJET.md')
          text = path.read_text(encoding='utf-8')

          replacements = {
              'version: "3.18.0"': 'version: "3.19.0"',
              'last-updated: "2026-07-20T14:18:58+02:00"': 'last-updated: "2026-07-20T15:27:31+02:00"',
              '**En cours : 18 chapitres sur 30.**': '**En cours : 19 chapitres sur 30.**',
              '18. Combat — terminé au niveau `static-review`.\n19. Compétences et pouvoirs.': '18. Combat — terminé au niveau `static-review`.\n19. Compétences et pouvoirs — terminé au niveau `static-review`.',
              'Chapitres 3 à 18 : **Élevée**.': 'Chapitres 3 à 19 : **Élevée**.',
              '- progression : 18 chapitres sur 30 ;': '- progression : 19 chapitres sur 30 ;',
              '- chapitre 18 : version `1.0.0` ;\n- Starter Kit non matérialisé ;': '- chapitre 18 : version `1.0.0` ;\n- chapitre 19 : version `1.0.0` ;\n- Starter Kit non matérialisé ;',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'passage introuvable: {old}')
              text = text.replace(old, new, 1)

          architecture_anchor = '''### 11.13 Combat

- `CombatService` constitue l’autorité des commandes de combat ;
- les joueurs, agents et scénarios soumettent des commandes typées sans imposer le résultat ;
- santé, endurance et état de vie restent dans `CharacterRuntimeState` ;
- initiative, côté, garde et états temporaires restent dans `CombatantState` ;
- les côtés sont explicites et le tir allié dépend d’une règle de conception ;
- l’initiative utilise des entiers bornés et un départage lexical stable, jamais `hash()` ;
- portée logique et ligne de vue sont validées séparément ;
- les mutations sont calculées sur des copies détachées puis committées comme un lot validé ;
- l’historique candidat est écrit avant commit et les événements ne sont émis qu’après succès ;
- les commandes sont corrélées, idempotentes, bornées et ordonnées ;
- le codec de sauvegarde est strict et encode le RNG 64 bits sans perte par deux mots de 32 bits ;
- file de commandes, raycasts, caches et présentation sont exclus de la persistance ;
- compétences, objets, économie, politique et narration restent dans leurs systèmes propres.
'''
          ability_section = architecture_anchor + '''
### 11.14 Compétences et pouvoirs

- `AbilityDefinition` constitue une `Resource` de conception partagée et immuable ;
- progression et état runtime sont séparés de la définition et liés au `CharacterId` ;
- rang, expérience, charges, prochain tick de recharge et séquence d’utilisation sont persistés ;
- les coûts sont décrits par identifiants de ressources et préparés sans mutation active ;
- les ciblages sur soi, personnage, point et zone sont déclaratifs, bornés et revalidés par l’autorité propriétaire ;
- les effets sont composables, ordonnés, copiés et limités à des types explicitement autorisés ;
- dégâts et états temporaires restent sous l’autorité du combat ;
- santé et endurance restent sous les règles des personnages ;
- `AbilityMutationUnitOfWork` reçoit réservation, candidats d’effets, progression, runtime et révisions dans un même commit ;
- un effet requis absent bloque le lot avant commit ;
- un résultat partiel est une utilisation consommée et ne déclenche pas un retry gratuit ;
- les recharges utilisent des ticks logiques, jamais un `Timer` autoritaire ;
- plans, réservations, candidats, cibles dérivées, caches et présentation sont exclus de la persistance ;
- l’inventaire peut accorder une compétence sans devenir propriétaire de ses règles.
'''
          if '### 11.14 Compétences et pouvoirs' not in text:
              if architecture_anchor not in text:
                  raise SystemExit('ancre architecture combat introuvable')
              text = text.replace(architecture_anchor, ability_section, 1)

          error_anchor = '- ne pas placer la prochaine étape, le chemin ou le niveau du chapitre suivant dans le chapitre publié ;'
          ability_errors = '''- ne pas écrire directement dégâts, santé ou états depuis une définition de compétence ;
- ne pas stocker charges ou recharge dans une `Resource` de conception partagée ;
- ne pas utiliser un `Timer` ou l’heure système comme recharge autoritaire ;
- ne pas consommer un coût avant la validation et la préparation de tous les effets requis ;
- ne pas committer séparément coût, effets et état de compétence ;
- ne pas charger un script, une classe ou une méthode depuis une définition externe ;
- ne pas traiter une prévisualisation comme validation autoritaire ;
- ne pas persister plans, réservations, candidats, cibles dérivées ou caches ;
- ne pas utiliser un nom affiché comme identité de compétence ;
- ne pas retenter automatiquement une utilisation partiellement résolue ;
'''
          if ability_errors.strip() not in text:
              if error_anchor not in text:
                  raise SystemExit('ancre erreurs introuvable')
              text = text.replace(error_anchor, ability_errors + error_anchor, 1)

          old_next = '''Le chapitre 18 est terminé au niveau `static-review`. Le combat reçoit des commandes typées, valide leurs cibles et applique des mutations préparées sans transférer son autorité aux agents, à la physique ou à la présentation.

Chapitre suivant :

> **[LECTURE] Chemin et niveau prévisionnels — Ne pas saisir.**

```text
Livre-II/CHAPITRE-19-Competences-et-pouvoirs.md
Niveau GPT-5.6 Sol recommandé : Élevée
```

Périmètre attendu : définitions de compétences et pouvoirs, coûts, temps de recharge, ciblage spécialisé, effets composables et progression, en réutilisant les contrats de combat sans déplacer les règles de portée, défense, dégâts ou commit hors du système propriétaire.
'''
          new_next = '''Le chapitre 19 est terminé au niveau `static-review`. Les compétences séparent définitions, progression et état runtime, préparent coûts et effets derrière leurs autorités propriétaires et exigent un commit commun avant tout événement.

Chapitre suivant :

> **[LECTURE] Chemin et niveau prévisionnels — Ne pas saisir.**

```text
Livre-II/CHAPITRE-20-Inventaire-et-reputation-des-objets.md
Niveau GPT-5.6 Sol recommandé : Élevée
```

Périmètre attendu : définitions et instances d’objets, conteneurs d’inventaire, empilement, équipement, durabilité, propriété, provenance et réputation des objets, en réutilisant les contrats des personnages, du combat et des compétences sans déplacer leurs autorités.
'''
          if old_next not in text:
              raise SystemExit('bloc prochaine action introuvable')
          text = text.replace(old_next, new_next, 1)

          journal_anchor = '### 2026-07-20T14:18:58+02:00 — version 3.18.0'
          journal_entry = '''### 2026-07-20T15:27:31+02:00 — version 3.19.0

- chapitre 19 créé, corrigé et audité au niveau `static-review` ;
- définitions, coûts, ciblages, effets composables, progression, charges et recharges documentés ;
- commit séquentiel corrigé au profit d’une unité de travail commune ;
- ports de combat, personnage, ressources et contexte séparés ;
- sauvegarde limitée aux données durables et restauration préparée ;
- index, roadmap, `contents.txt`, audit et preuve QA mis à jour ;
- prochaine action déplacée vers le chapitre 20 — Inventaire et réputation des objets, niveau Élevée ;
- aucun PDF construit et aucun test runtime revendiqué.

'''
          if journal_entry.strip() not in text:
              if journal_anchor not in text:
                  raise SystemExit('ancre journal introuvable')
              text = text.replace(journal_anchor, journal_entry + journal_anchor, 1)

          path.write_text(text, encoding='utf-8')
          PY
          git rm .github/workflows/tmp-ch19-static-corrections.yml
      - name: Commit continuity finalization
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add CONTINUITE-PROJET.md .github/workflows/tmp-ch19-static-corrections.yml
          git commit -m "docs(continuity): record chapter 19 completion"
          git push origin HEAD:docs/livre-ii-ch19-competences-pouvoirs
