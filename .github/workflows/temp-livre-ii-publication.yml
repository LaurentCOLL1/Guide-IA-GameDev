name: Temporary Livre II Publication Validation

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  validate-and-build:
    if: github.head_ref == 'release/livre-ii-publication'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout publication branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install Pandoc XeLaTeX and PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc texlive-xetex texlive-latex-extra texlive-fonts-recommended \
            fonts-dejavu-core poppler-utils qpdf python3-pil

      - name: Validate Livre II transversally
        run: |
          mkdir -p dist/qa-livre-ii
          set -o pipefail
          python3 tools/validate_chapters.py --report dist/qa-livre-ii/QA-CHAPTERS.md | tee dist/qa-livre-ii/validate-chapters.log
          python3 tools/check_context_markers.py --check | tee dist/qa-livre-ii/context-markers.log
          python3 tools/audit_contextes_semantiques.py --check | tee dist/qa-livre-ii/context-semantics.log
          python3 tools/report_contextes_utilisation.py | tee dist/qa-livre-ii/context-coverage.md
          python3 - <<'PY' | tee dist/qa-livre-ii/transverse-livre-ii.txt
          from pathlib import Path
          import re

          root = Path('.')
          book = root / 'Livre-II'
          chapters = sorted(book.glob('CHAPITRE-*.md'))
          audits = sorted((book / 'QA').glob('AUDIT-CHAPITRE-*.md'))
          proofs = sorted((book / 'QA').glob('VALIDATION-FINALE-CHAPITRE-*.yaml'))
          errors = []

          if len(chapters) != 30:
              errors.append(f'Nombre de chapitres: {len(chapters)} au lieu de 30')

          chapter_ids = []
          for chapter in chapters:
              text = chapter.read_text(encoding='utf-8')
              match = re.search(r'^id:\s*["\x27]?([^"\x27\n]+)', text, re.M)
              if not match:
                  errors.append(f'{chapter}: identifiant absent')
              else:
                  chapter_ids.append(match.group(1).strip())
              for expected in ('audit-status: "complete"', 'audit-level: "static-review"'):
                  if expected not in text[:2500]:
                      errors.append(f'{chapter}: métadonnée absente: {expected}')
              if 'recommended-reasoning:' in text or 'Niveau de raisonnement conseillé' in text:
                  errors.append(f'{chapter}: métadonnée de processus interdite')

          if len(chapter_ids) != len(set(chapter_ids)):
              errors.append('Identifiants de chapitres dupliqués')
          if len(audits) < 30:
              errors.append(f'Audits individuels: {len(audits)} au lieu d’au moins 30')
          if len(proofs) < 30:
              errors.append(f'Preuves individuelles: {len(proofs)} au lieu d’au moins 30')

          for proof in proofs:
              text = proof.read_text(encoding='utf-8')
              if re.search(r'^status:\s*(pending|null)\s*$', text, re.M):
                  errors.append(f'{proof}: preuve encore en attente')

          contents = (root / 'contents.txt').read_text(encoding='utf-8').splitlines()
          declared = [line.strip() for line in contents if line.strip().startswith('Livre-II/CHAPITRE-')]
          if len(declared) != 30:
              errors.append(f'Chapitres Livre II dans contents.txt: {len(declared)} au lieu de 30')

          print(f'Chapitres: {len(chapters)}')
          print(f'Audits: {len(audits)}')
          print(f'Preuves: {len(proofs)}')
          print(f'Chapitres déclarés dans contents.txt: {len(declared)}')
          print(f'Erreurs transversales: {len(errors)}')
          for error in errors:
              print(f'- {error}')
          raise SystemExit(1 if errors else 0)
          PY

      - name: Build complete PDF with Pandoc and XeLaTeX
        run: |
          chmod +x build.sh
          set -o pipefail
          ./build.sh 2>&1 | tee dist/qa-livre-ii/pandoc-xelatex.log

      - name: Preflight PDF
        run: |
          PDF=dist/Guide-IA-GameDev.pdf
          pdfinfo "$PDF" | tee dist/qa-livre-ii/PDF-INFO.txt
          pdffonts "$PDF" | tee dist/qa-livre-ii/PDF-FONTS.txt
          qpdf --check "$PDF" 2>&1 | tee dist/qa-livre-ii/PDF-QPDF.txt
          pdftotext -layout "$PDF" dist/qa-livre-ii/Guide-IA-GameDev.txt
          test -s dist/qa-livre-ii/Guide-IA-GameDev.txt
          sha256sum "$PDF" | tee dist/qa-livre-ii/PDF-SHA256.txt

      - name: Render representative pages
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import subprocess

          info = Path('dist/qa-livre-ii/PDF-INFO.txt').read_text(encoding='utf-8', errors='replace')
          pages = int(re.search(r'^Pages:\s+(\d+)', info, re.M).group(1))
          candidates = {1, 2, 3, 4, 5, 10, 20, pages // 4, pages // 2, (3 * pages) // 4, pages - 4, pages - 3, pages - 2, pages - 1, pages}
          selected = sorted(page for page in candidates if 1 <= page <= pages)
          out = Path('dist/qa-livre-ii/rendered')
          out.mkdir(parents=True, exist_ok=True)
          for page in selected:
              subprocess.run([
                  'pdftoppm', '-f', str(page), '-l', str(page), '-r', '130', '-png', '-singlefile',
                  'dist/Guide-IA-GameDev.pdf', str(out / f'page-{page:04d}')
              ], check=True)
          Path('dist/qa-livre-ii/rendered-pages.txt').write_text('\n'.join(map(str, selected)) + '\n', encoding='utf-8')
          PY

      - name: Upload publication candidate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: livre-ii-publication-candidate
          retention-days: 14
          if-no-files-found: warn
          path: |
            dist/Guide-IA-GameDev.pdf
            dist/qa-livre-ii/**
