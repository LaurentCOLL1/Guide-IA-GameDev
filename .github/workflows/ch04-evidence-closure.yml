name: Chapter 4 Evidence Closure

on:
  push:
    branches:
      - docs/livre-iii-ch04-pipeline-blender
    paths:
      - .qa/ch04-evidence-command.json

permissions:
  contents: write

jobs:
  close-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Chapter 4 branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-iii-ch04-pipeline-blender
          fetch-depth: 0

      - name: Install validator dependency
        run: python3 -m pip install --disable-pip-version-check --quiet PyYAML

      - name: Apply evidence command
        shell: python
        run: |
          from __future__ import annotations

          import hashlib
          import json
          import re
          from pathlib import Path

          import yaml

          command_path = Path('.qa/ch04-evidence-command.json')
          command = json.loads(command_path.read_text(encoding='utf-8'))
          mode = command['mode']
          timestamp = command['timestamp']

          chapter_path = Path('Livre-III/CHAPITRE-04-Pipeline-Blender-et-organisation-des-fichiers.md')
          audit_path = Path('Livre-III/QA/AUDIT-CHAPITRE-04.md')
          proof_path = Path('Livre-III/QA/VALIDATION-FINALE-CHAPITRE-04.yaml')
          continuity_path = Path('CONTINUITE-PROJET.md')

          def sha256(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          proof = yaml.safe_load(proof_path.read_text(encoding='utf-8'))

          if mode == 'prepare':
              audit = audit_path.read_text(encoding='utf-8')
              audit = re.sub(r'audit-date: "[^"]+"', f'audit-date: "{timestamp}"', audit, count=1)
              audit = re.sub(r'last-verified: "[^"]+"', f'last-verified: "{timestamp}"', audit, count=1)
              old = (
                  'Le chapitre 4 du Livre III est **accepté au niveau `static-review` sous réserve de réussite des validations documentaires permanentes**. '
                  'Il installe l’environnement Blender, les conventions de fichiers, les formats d’échange, l’asset test et les portes de contrôle exigés, '
                  'tout en maintenant ouvertes la matérialisation du template, l’exécution Blender, l’import Godot, l’ouverture sur une seconde machine et la publication de fin de Livre.'
              )
              new = (
                  'Le chapitre 4 du Livre III est **accepté au niveau `static-review`**. Les validations documentaires permanentes ont confirmé la structure, '
                  'les métadonnées, les liens, l’absence de doublons bloquants, les explications de code et les contextes d’utilisation. Restent ouvertes la '
                  'matérialisation du template, l’exécution Blender, l’import Godot, l’ouverture sur une seconde machine et la publication de fin de Livre.'
              )
              if audit.count(old) != 1:
                  raise RuntimeError('Décision d’audit attendue une fois.')
              audit_path.write_text(audit.replace(old, new, 1), encoding='utf-8')

              proof['status'] = 'pending_ci'
              proof['validated-head-commit'] = None
              proof['results'].update({
                  'blocking-errors': 0,
                  'warnings': 1,
                  'significant-code-and-data-blocks': 30,
                  'duplicate-headings': 0,
                  'duplicate-blocks': 0,
                  'duplicate-paragraphs': 0,
              })
              proof['integrity']['chapter-sha256'] = sha256(chapter_path)
              proof['integrity']['audit-sha256'] = sha256(audit_path)
              proof['ci']['validate-chapters-without-pdf'] = {'run-id': None, 'conclusion': 'pending'}
              proof['ci']['validate-usage-contexts'] = {'run-id': None, 'conclusion': 'pending'}
              proof['ci']['artifact'] = {
                  'id': None,
                  'name': 'chapter-validation-without-pdf',
                  'digest': None,
              }
              proof['ci']['context-artifact'] = {
                  'id': None,
                  'name': 'usage-context-audit',
                  'digest': None,
              }
              proof['evidence-closure'] = {'commit': None, 'conclusion': 'pending'}

          elif mode == 'close':
              proof['status'] = 'complete'
              proof['validated-head-commit'] = command['validated_head_commit']
              proof['ci']['validate-chapters-without-pdf'] = {
                  'run-id': command['chapter_run_id'],
                  'conclusion': 'success',
              }
              proof['ci']['validate-usage-contexts'] = {
                  'run-id': command['context_run_id'],
                  'conclusion': 'success',
              }
              proof['ci']['artifact'] = {
                  'id': command['chapter_artifact_id'],
                  'name': 'chapter-validation-without-pdf',
                  'digest': command['chapter_artifact_digest'],
              }
              proof['ci']['context-artifact'] = {
                  'id': command['context_artifact_id'],
                  'name': 'usage-context-audit',
                  'digest': command['context_artifact_digest'],
              }
              proof['evidence-closure'] = {'commit': None, 'conclusion': 'pending'}

              continuity = continuity_path.read_text(encoding='utf-8')
              if 'version: "3.34.0"' not in continuity:
                  raise RuntimeError('Version de continuité 3.34.0 attendue.')
              continuity = continuity.replace('version: "3.34.0"', 'version: "3.34.1"', 1)
              continuity = re.sub(r'last-updated: "[^"]+"', f'last-updated: "{timestamp}"', continuity, count=1)
              journal = f'''### {timestamp} — version 3.34.1

- preuve finale du chapitre 4 fermée au niveau `static-review` ;
- commit validé : `{command['validated_head_commit']}` ;
- validation documentaire approuvée : run `{command['chapter_run_id']}`, artefact `{command['chapter_artifact_id']}` ;
- validation des contextes approuvée : run `{command['context_run_id']}`, artefact `{command['context_artifact_id']}` ;
- métriques finales : 1 578 lignes, 52 titres, 30 blocs significatifs, 0 doublon et 0 erreur bloquante ;
- empreintes SHA-256 du chapitre et de l’audit enregistrées dans la preuve ;
- aucun runtime Blender ou Godot exécuté et aucun PDF du Livre III construit ;
- prochaine action inchangée : chapitre 5 — Provenance, licences et validation des assets, niveau Élevée.

'''
              marker = '## 27. Journal\n\n'
              if marker not in continuity:
                  raise RuntimeError('Journal de continuité introuvable.')
              continuity_path.write_text(continuity.replace(marker, marker + journal, 1), encoding='utf-8')
          else:
              raise RuntimeError(f'Mode inconnu: {mode}')

          proof_path.write_text(
              yaml.safe_dump(proof, sort_keys=False, allow_unicode=True, width=120),
              encoding='utf-8',
          )

      - name: Validate final documentary state
        run: |
          python3 tools/validate_chapters.py --root . --report dist/QA-CHAPTERS.md
          python3 tools/check_context_markers.py --check

      - name: Remove command and commit
        shell: bash
        run: |
          rm -f .qa/ch04-evidence-command.json
          rmdir .qa 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if [ "$(git diff --cached --name-only | wc -l)" -eq 0 ]; then
            echo 'Aucune modification à enregistrer.' >&2
            exit 1
          fi
          mode="$(python3 -c "import json; print(json.load(open('/tmp/ch04-command.json'))['mode'])" 2>/dev/null || true)"
          git commit -m 'qa(livre-iii): actualiser la preuve du chapitre 4'
          git push origin HEAD:docs/livre-iii-ch04-pipeline-blender
