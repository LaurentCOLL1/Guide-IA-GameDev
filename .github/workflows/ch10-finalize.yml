name: Chapter 10 Finalizer Runner

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write

jobs:
  finalize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'docs/livre-iii-ch10-visages-peau-yeux-cheveux-pilosite'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Prepare Chapter 10 stage
        id: prepare
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          if [[ -f .qa/ch10-governance.py ]]; then
            python3 .qa/ch10-governance.py
            rm -f .qa/ch10-governance.py
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "docs(livre-iii): intégrer le chapitre 10 et sa gouvernance"
            git push origin HEAD:"$HEAD_BRANCH"
            echo "stage=governance" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -f .qa/ch10-close.py ]] &&
             grep -q '^status: pending_ci$' Livre-III/QA/VALIDATION-FINALE-CHAPITRE-10.yaml; then
            python3 -m pip install --disable-pip-version-check --quiet PyYAML
            mkdir -p dist
            python3 tools/validate_chapters.py --report dist/QA-CHAPTERS.md
            python3 tools/check_code_explanation_structure.py --check
            python3 tools/check_context_markers.py --check \
              | tee dist/QA-CONTEXTES.log
            python3 tools/audit_contextes_semantiques.py --check \
              | tee dist/QA-CONTEXTES-SEMANTIQUES.log
            python3 tools/report_contextes_utilisation.py \
              | tee dist/QA-CONTEXTES-COUVERTURE.md
            sha256sum \
              Livre-III/CHAPITRE-10-Visages-peau-yeux-cheveux-et-pilosite.md \
              Livre-III/QA/AUDIT-CHAPITRE-10.md \
              | tee dist/CH10-SHA256.txt
            echo "stage=validate" >> "$GITHUB_OUTPUT"
            echo "document_head=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -f Livre-III/QA/VALIDATION-FINALE-CHAPITRE-10.yaml ]] &&
             grep -q '^status: complete$' Livre-III/QA/VALIDATION-FINALE-CHAPITRE-10.yaml &&
             grep -q '^  commit: null$' Livre-III/QA/VALIDATION-FINALE-CHAPITRE-10.yaml; then
            CLOSURE_COMMIT="$(git rev-parse HEAD)" python3 - <<'PY'
          import os
          from pathlib import Path

          proof_path = Path("Livre-III/QA/VALIDATION-FINALE-CHAPITRE-10.yaml")
          proof = proof_path.read_text(encoding="utf-8")
          old = "evidence-closure:\n  commit: null\n  conclusion: pending\n"
          new = (
              "evidence-closure:\n"
              f"  commit: {os.environ['CLOSURE_COMMIT']}\n"
              "  conclusion: success\n"
          )
          if old not in proof:
              raise RuntimeError("Section de clôture en attente introuvable.")
          proof_path.write_text(proof.replace(old, new, 1), encoding="utf-8")
          PY
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Livre-III/QA/VALIDATION-FINALE-CHAPITRE-10.yaml
            git commit -m "docs(qa): enregistrer le commit de clôture du chapitre 10"
            git push origin HEAD:"$HEAD_BRANCH"
            echo "stage=recorded" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No Chapter 10 action required."
          echo "stage=none" >> "$GITHUB_OUTPUT"

      - name: Upload Chapter 10 validation evidence
        if: steps.prepare.outputs.stage == 'validate'
        id: upload_ch10_main
        uses: actions/upload-artifact@v4
        with:
          name: chapter-validation-without-pdf
          if-no-files-found: error
          retention-days: 30
          path: |
            dist/QA-CHAPTERS.md
            dist/QA-CONTEXTES-COUVERTURE.md

      - name: Upload Chapter 10 context evidence
        if: steps.prepare.outputs.stage == 'validate'
        id: upload_ch10_context
        uses: actions/upload-artifact@v4
        with:
          name: usage-context-audit
          if-no-files-found: error
          retention-days: 30
          path: |
            dist/QA-CONTEXTES.log
            dist/QA-CONTEXTES-SEMANTIQUES.log
            dist/QA-CONTEXTES-COUVERTURE.md
            dist/CH10-SHA256.txt

      - name: Close Chapter 10 evidence
        if: steps.prepare.outputs.stage == 'validate'
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
          DOCUMENT_HEAD: ${{ steps.prepare.outputs.document_head }}
          VALIDATION_RUN_ID: ${{ github.run_id }}
          MAIN_ARTIFACT_ID: ${{ steps.upload_ch10_main.outputs.artifact-id }}
          MAIN_ARTIFACT_DIGEST: ${{ steps.upload_ch10_main.outputs.artifact-digest }}
          CONTEXT_ARTIFACT_ID: ${{ steps.upload_ch10_context.outputs.artifact-id }}
          CONTEXT_ARTIFACT_DIGEST: ${{ steps.upload_ch10_context.outputs.artifact-digest }}
        run: |
          set -euo pipefail
          python3 .qa/ch10-close.py
          rm -f .qa/ch10-close.py
          rmdir .qa 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(qa): fermer la preuve du chapitre 10"
          git push origin HEAD:"$HEAD_BRANCH"
