name: Apply Context Audit Cleanup

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'docs/audit-volume0-livre1-contextes' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Refine semantic audit and correct explicit paths
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str, label: str) -> None:
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if new in text:
                  return
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{label}: occurrence attendue 1, reçue {count}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')

          # A path marker must look like a path or filename, not arbitrary inline code.
          p = Path('tools/audit_contextes_semantiques.py')
          text = p.read_text(encoding='utf-8')
          text = text.replace(
              'PATH_RE = re.compile(r"`([^`]+)`")',
              '''PATH_RE = re.compile(\n    r"`([^`\\n]*(?:[\\\\/]|\\.(?:json|ya?ml|toml|ini|cfg|conf|env|md|txt|py|ps1|sh|bat|cmd|sql|gd|tscn|tres|godot|dockerfile|gitignore|gitattributes))[^`\\n]*)`",\n    re.IGNORECASE,\n)''',
              1,
          )
          old_context = '''def context(lines: list[str], index: int, count: int = 8) -> str:\n    values: list[str] = []\n    i = index - 1\n    while i >= 0 and len(values) < count:\n        if lines[i].strip():\n            values.append(lines[i].strip())\n        i -= 1\n    return " ".join(reversed(values)).lower()\n'''
          new_context = '''def context(lines: list[str], index: int, count: int = 8) -> str:\n    values: list[str] = []\n    i = index - 1\n    while i >= 0 and len(values) < count:\n        value = lines[i].strip()\n        if not value:\n            i -= 1\n            continue\n        if values and (value.startswith("#") or value.startswith("```") or value.startswith("~~~")):\n            break\n        values.append(value)\n        i -= 1\n    return " ".join(reversed(values)).lower()\n'''
          if old_context in text:
              text = text.replace(old_context, new_context, 1)
          p.write_text(text, encoding='utf-8', newline='\n')

          # The utility installation is a normal PowerShell command, not a post-reopen check.
          replace_once(
              'Livre-I/CHAPITRE-02-Terminal-PowerShell-et-outils-Windows.md',
              '''### 3.3 Installer les utilitaires communs\n\n> **[PS] PowerShell 7 - Vérifier après réouverture :** fermer PowerShell, ouvrir une nouvelle fenêtre, puis exécuter les commandes.''',
              '''### 3.3 Installer les utilitaires communs\n\n> **[PS] PowerShell 7 - Exécuter :** utiliser PowerShell sur l’hôte Windows.''',
              'chapitre 2 - utilitaires',
          )

          # These YAML fragments modify compose.yaml.
          replace_once(
              'Livre-I/CHAPITRE-05-Docker-et-Docker-Compose.md',
              '''Créer des réseaux fonctionnels lorsque l’architecture le justifie :\n\n> **[VSC] Visual Studio Code - Créer ou modifier :** `yaml ports: - "8080:8080" `.''',
              '''Créer ou modifier les réseaux dans `compose.yaml` lorsque l’architecture le justifie :\n\n> **[VSC] Visual Studio Code - Modifier :** `compose.yaml` dans le dossier du déploiement.''',
              'chapitre 5 - réseaux compose',
          )
          replace_once(
              'Livre-I/CHAPITRE-06-Open-WebUI-Open-Terminal-et-Vane.md',
              '''Créer un volume distinct :\n\n> **[VSC] Visual Studio Code - Créer ou modifier :** `text open-webui:dev open-webui:main open-webui:vx.y.z `.''',
              '''Déclarer un volume distinct dans `compose.yaml` :\n\n> **[VSC] Visual Studio Code - Modifier :** `compose.yaml` dans le dossier `Guide-IA-Services`.''',
              'chapitre 6 - volume compose',
          )

          # Give the preparation sheet a concrete recommended path.
          replace_once(
              'Volume-0/CHAPITRE-10-Production-validation-et-publication.md',
              '''Avant la rédaction, l’auteur doit créer une fiche de préparation minimale.\n\n> **[VSC] Visual Studio Code - Créer ou modifier :** `fichier indiqué dans l’étape`.''',
              '''Avant la rédaction, l’auteur doit créer une fiche de préparation minimale dans `docs/qa/preparation/<ID-DOCUMENT>.yaml`.\n\n> **[VSC] Visual Studio Code - Créer :** `docs/qa/preparation/<ID-DOCUMENT>.yaml`, en remplaçant le placeholder par l’identifiant réel.''',
              'Volume 0 chapitre 10 - fiche préparation',
          )
          PY

          python3 tools/audit_contextes_semantiques.py --apply
          python3 tools/audit_contextes_utilisation.py --check
          python3 tools/audit_contextes_semantiques.py --check

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Volume-0 Livre-I tools
          if ! git diff --cached --quiet; then
            git commit -m "docs(qa): resolve context audit false positives"
            git push origin "HEAD:${{ github.head_ref }}"
          fi
