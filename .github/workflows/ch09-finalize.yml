name: Chapter 9 Finalizer Runner

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write

jobs:
  finalize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'docs/livre-iii-ch09-creation-creatures'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Prepare Chapter 9 stage
        id: prepare
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          if [[ -f .qa/ch09-governance.py ]]; then
            python3 .qa/ch09-governance.py
            rm -f .qa/ch09-governance.py
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "docs(livre-iii): intégrer le chapitre 9 et sa gouvernance"
            git push origin HEAD:"$HEAD_BRANCH"
            echo "stage=governance" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -f .qa/ch09-close.py ]] &&
             grep -q '^status: pending_ci$' Livre-III/QA/VALIDATION-FINALE-CHAPITRE-09.yaml; then
            python3 -m pip install --disable-pip-version-check --quiet PyYAML
            mkdir -p dist
            python3 tools/validate_chapters.py --report dist/QA-CHAPTERS.md
            python3 tools/check_code_explanation_structure.py --check
            python3 tools/check_context_markers.py --check \
              | tee dist/QA-CONTEXTES.log
            python3 tools/audit_contextes_semantiques.py --check \
              | tee dist/QA-CONTEXTES-SEMANTIQUES.log
            python3 tools/report_contextes_utilisation.py \
              | tee dist/QA-CONTEXTES-COUVERTURE.md
            sha256sum \
              Livre-III/CHAPITRE-09-Creation-des-creatures.md \
              Livre-III/QA/AUDIT-CHAPITRE-09.md \
              | tee dist/CH09-SHA256.txt
            echo "stage=validate" >> "$GITHUB_OUTPUT"
            echo "document_head=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No Chapter 9 action required."
          echo "stage=none" >> "$GITHUB_OUTPUT"

      - name: Upload Chapter 9 validation evidence
        if: steps.prepare.outputs.stage == 'validate'
        id: upload_ch09_main
        uses: actions/upload-artifact@v4
        with:
          name: chapter-validation-without-pdf
          if-no-files-found: error
          retention-days: 30
          path: |
            dist/QA-CHAPTERS.md
            dist/QA-CONTEXTES-COUVERTURE.md

      - name: Upload Chapter 9 context evidence
        if: steps.prepare.outputs.stage == 'validate'
        id: upload_ch09_context
        uses: actions/upload-artifact@v4
        with:
          name: usage-context-audit
          if-no-files-found: error
          retention-days: 30
          path: |
            dist/QA-CONTEXTES.log
            dist/QA-CONTEXTES-SEMANTIQUES.log
            dist/QA-CONTEXTES-COUVERTURE.md
            dist/CH09-SHA256.txt

      - name: Close Chapter 9 evidence
        if: steps.prepare.outputs.stage == 'validate'
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
          DOCUMENT_HEAD: ${{ steps.prepare.outputs.document_head }}
          VALIDATION_RUN_ID: ${{ github.run_id }}
          MAIN_ARTIFACT_ID: ${{ steps.upload_ch09_main.outputs.artifact-id }}
          MAIN_ARTIFACT_DIGEST: ${{ steps.upload_ch09_main.outputs.artifact-digest }}
          CONTEXT_ARTIFACT_ID: ${{ steps.upload_ch09_context.outputs.artifact-id }}
          CONTEXT_ARTIFACT_DIGEST: ${{ steps.upload_ch09_context.outputs.artifact-digest }}
        run: |
          set -euo pipefail
          python3 .qa/ch09-close.py
          rm -f .qa/ch09-close.py
          rmdir .qa 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(qa): fermer la preuve du chapitre 9"
          git push origin HEAD:"$HEAD_BRANCH"
