name: Chapter 22 Authority Runner

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'docs/livre-ii-ch22-monde-vivant'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply final static correction
        shell: bash
        run: |
          python3 .qa/ch22-authority-fix.py
          python3 tools/validate_chapters.py
          python3 tools/check_context_markers.py --check

      - name: Remove temporary head files and commit
        shell: bash
        run: |
          rm -f .qa/ch22-authority-fix.py
          rm -f .github/workflows/ch22-authority-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(livre-ii): restore chapter 22 ecology access contract"
          git push origin HEAD:${{ github.head_ref }}
