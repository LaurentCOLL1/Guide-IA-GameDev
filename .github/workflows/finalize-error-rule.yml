name: Finalize Error Rule

on:
  push:
    branches:
      - qa/retrofit-error-examples-ch01-ch06
    paths:
      - tools/finalize_error_rule.py
      - .github/workflows/finalize-error-rule.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: qa/retrofit-error-examples-ch01-ch06
          fetch-depth: 0

      - name: Apply final semantic-rule patch
        run: python tools/finalize_error_rule.py

      - name: Commit final patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(qa): finalize semantic error-section validation" || exit 0
          git push origin HEAD:qa/retrofit-error-examples-ch01-ch06
