name: Update Chapter 8 Continuity

on:
  push:
    branches:
      - docs/livre-ii-ch08-sqlite-migrations
    paths:
      - tools/update_continuity_ch08.py
      - .github/workflows/update-continuity-ch08.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch08-sqlite-migrations
          fetch-depth: 0

      - name: Update continuity
        run: python tools/update_continuity_ch08.py

      - name: Remove temporary files
        run: |
          rm tools/update_continuity_ch08.py
          rm .github/workflows/update-continuity-ch08.yml

      - name: Commit continuity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(project): advance continuity to chapter 9"
          git push origin HEAD:docs/livre-ii-ch08-sqlite-migrations
