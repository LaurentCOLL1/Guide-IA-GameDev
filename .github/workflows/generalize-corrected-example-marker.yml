name: Generalize Corrected Example Marker

on:
  push:
    branches:
      - qa/retrofit-error-examples-ch01-ch06
    paths:
      - tools/generalize_corrected_example_marker.py
      - .github/workflows/generalize-corrected-example-marker.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: qa/retrofit-error-examples-ch01-ch06
          fetch-depth: 0

      - name: Apply semantic corrected-example patch
        run: python tools/generalize_corrected_example_marker.py

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(qa): accept semantic corrected-example labels" || exit 0
          git push origin HEAD:qa/retrofit-error-examples-ch01-ch06
