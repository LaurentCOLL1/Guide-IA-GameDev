name: Chapter 25 Branch Finalizer

on:
  push:
    branches:
      - docs/livre-ii-ch25-narration-quetes-codex
    paths:
      - ".github/workflows/ch25-branch-finalizer.yml"

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout chapter branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch25-narration-quetes-codex
          fetch-depth: 0

      - name: Finalize chapter and governance
        run: |
          python3 .qa/ch25_finalize.py
          rm -f .github/workflows/ch25-branch-finalizer.yml
          python3 tools/validate_chapters.py --report /tmp/QA-CHAPTERS.md
          python3 tools/check_context_markers.py --check
          python3 tools/audit_contextes_semantiques.py --check
          test ! -e .qa/ch25_finalize.py
          test ! -e .github/workflows/ch25-branch-finalizer.yml

      - name: Commit finalized lot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(livre-ii): finalize chapter 25 narrative system"
          git push origin HEAD:docs/livre-ii-ch25-narration-quetes-codex
