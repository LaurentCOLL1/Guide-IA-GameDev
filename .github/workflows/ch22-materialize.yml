name: Chapter 22 Materializer

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write

jobs:
  materialize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'docs/livre-iii-chapitre-22-cinematics-staging'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Materialize Chapter 22 lot
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if [[ ! -f .qa/ch22-materialize.py ]]; then
            echo "No Chapter 22 materializer found; nothing to do."
            exit 0
          fi

          python3 .qa/ch22-materialize.py
          rm -f .qa/ch22-materialize.py .qa/ch22-payload-*.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(livre-iii): intégrer le chapitre 22 et sa gouvernance"
          git push origin "HEAD:${HEAD_BRANCH}"
