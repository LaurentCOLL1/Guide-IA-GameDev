name: Temporary Materialize Chapter 18

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/tmp-materialize-ch18.yml"

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout chapter branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch18-combat
      - name: Decode draft chapter
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64, gzip, hashlib
          parts = [Path(f"tools/qa/tmp_ch18_payload.part{i}").read_text(encoding="utf-8") for i in range(1, 6)]
          payload = "".join(parts)
          data = gzip.decompress(base64.b64decode(payload))
          expected = "65d0e2186c21532038877fe1b9fcd57741594ae42b869438ef0e4d4e2df07d80"
          actual = hashlib.sha256(data).hexdigest()
          if actual != expected:
              raise SystemExit(f"chapter digest mismatch: {actual}")
          Path("Livre-II/CHAPITRE-18-Combat.md").write_bytes(data)
          PY
      - name: Commit draft gate
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Livre-II/CHAPITRE-18-Combat.md
          git commit -m "docs(livre-ii): draft chapter 18 combat"
          git push origin HEAD:docs/livre-ii-ch18-combat
