name: Temporary Chapter 20 Second Reading

on:
  push:
    branches:
      - docs/livre-ii-ch20-inventaire-reputation

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch20-inventaire-reputation
          fetch-depth: 0

      - name: Apply second-reading corrections
        shell: bash
        run: |
          python3 .qa/ch20_second_reading.py
          rm -f .github/workflows/temp-ch20-second-reading.yml
          rm -f .qa/ch20-second-reading.trigger
          rm -f .qa/ch20_second_reading.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(livre-ii): apply chapter 20 second-reading corrections"
          git push origin HEAD:docs/livre-ii-ch20-inventaire-reputation
