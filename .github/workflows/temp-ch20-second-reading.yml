          ))

          replacements.append((
              "\tif not StableId.is_valid(container_id) or not StableId.is_valid(lot_id):\n\t\treturn ERR_INVALID_DATA\n",
              "\tif not StableId.is_valid(container_id) or not StableId.is_valid(lot_id):\n\t\treturn ERR_INVALID_DATA\n\tif not StableId.is_valid(origin_cause_id):\n\t\treturn ERR_INVALID_DATA\n\tif not StableId.is_valid(origin_source_system_id) or created_tick < 0:\n\t\treturn ERR_INVALID_DATA\n",
          ))

          replacements.append((
              "\tcopy.lot_id = lot_id\n\tcopy.quantity = quantity\n",
              "\tcopy.lot_id = lot_id\n\tcopy.origin_cause_id = origin_cause_id\n\tcopy.origin_source_system_id = origin_source_system_id\n\tcopy.created_tick = created_tick\n\tcopy.quantity = quantity\n",
          ))

          replacements.append((
              "- `lot_id` conserve une origine commune sans prétendre suivre chaque unité.\n",
              "- `lot_id`, la cause, le système source et le tick conservent l’origine commune sans prétendre suivre chaque unité.\n",
          ))

          reputation_marker = "\twhile recent_cause_ids.size() > MAX_RECENT_CAUSES:\n\t\trecent_cause_ids.pop_front()\n\treturn OK\n```\n"
          reputation_replacement = "\twhile recent_cause_ids.size() > MAX_RECENT_CAUSES:\n\t\trecent_cause_ids.pop_front()\n\treturn OK\n\nfunc duplicate_detached() -> ItemReputationState:\n\tvar copy := ItemReputationState.new()\n\tcopy.instance_id = instance_id\n\tcopy.renown = renown\n\tcopy.significant_event_count = significant_event_count\n\tcopy.last_event_tick = last_event_tick\n\tcopy.recent_cause_ids.assign(recent_cause_ids)\n\tcopy.revision = revision\n\treturn copy\n```\n"
          replacements.append((reputation_marker, reputation_replacement))

          loadout_marker = "func validate(\n\tinstances: Dictionary[StringName, ItemInstanceState],\n\tcatalog: ItemCatalog,\n) -> Error:\n\tif not CharacterId.is_valid(character_id) or revision < 0:\n\t\treturn ERR_INVALID_DATA\n"
          loadout_replacement = "func validate_shape() -> Error:\n\tif not CharacterId.is_valid(character_id) or revision < 0:\n\t\treturn ERR_INVALID_DATA\n\tif slots.size() > 64:\n\t\treturn ERR_OUT_OF_MEMORY\n\tvar used_instances: Dictionary[StringName, bool] = {}\n\tfor slot_id: StringName in slots:\n\t\tvar instance_id: StringName = slots[slot_id]\n\t\tif not StableId.is_valid(slot_id) or not StableId.is_valid(instance_id):\n\t\t\treturn ERR_INVALID_DATA\n\t\tif used_instances.has(instance_id):\n\t\t\treturn ERR_ALREADY_EXISTS\n\t\tused_instances[instance_id] = true\n\treturn OK\n\nfunc validate(\n\tinstances: Dictionary[StringName, ItemInstanceState],\n\tcatalog: ItemCatalog,\n) -> Error:\n\tif validate_shape() != OK:\n\t\treturn ERR_INVALID_DATA\n"
          replacements.append((loadout_marker, loadout_replacement))

          replacements.append((
              "\tvar used_instances: Dictionary[StringName, bool] = {}\n\tfor slot_id: StringName in slots:\n",
              "\tvar used_instances: Dictionary[StringName, bool] = {}\n\tfor slot_id: StringName in slots:\n",
          ))

          catalog_anchor = "## 18. Commande de transfert\n"
          factory_section = """### 17.1 Fabrique d’instances et de lots

> **[VSC] Visual Studio Code — Créer : `res://src/features/inventory/application/item_factory.gd`.**

```gdscript
class_name ItemFactory
extends RefCounted

func create_instance(
	definition: ItemDefinition,
	instance_id: StringName,
	container_id: StringName,
	owner: ItemOwnerRef,
) -> ItemInstanceState:
	if definition == null or definition.validate() != OK:
		return null
	if definition.is_stackable():
		return null
	var state := ItemInstanceState.new()
	state.instance_id = instance_id
	state.definition_id = definition.item_id
	state.container_id = container_id
	state.owner = owner.duplicate_detached() if owner != null else null
	state.current_durability = definition.maximum_durability
	return state if state.validate(definition) == OK else null

func create_stack(
	definition: ItemDefinition,
	stack_id: StringName,
	container_id: StringName,
	owner: ItemOwnerRef,
	lot_id: StringName,
	quantity: int,
	origin_cause_id: StringName,
	origin_source_system_id: StringName,
	created_tick: int,
) -> ItemStackState:
	if definition == null or not definition.is_stackable():
		return null
	var state := ItemStackState.new()
	state.stack_id = stack_id
	state.definition_id = definition.item_id
	state.container_id = container_id
	state.owner = owner.duplicate_detached() if owner != null else null
	state.lot_id = lot_id
	state.origin_cause_id = origin_cause_id
	state.origin_source_system_id = origin_source_system_id
	state.created_tick = created_tick
	state.quantity = quantity
	return state if state.validate(definition) == OK else null
```

<!-- qa:code-explanation -->

**Explication détaillée du bloc :**

- La fabrique choisit explicitement entre instance et lot.
- Une définition fongible ne peut devenir une instance individualisée sans une conversion métier distincte.
- La durabilité initiale d’une instance prend le maximum de la définition.
- Le lot reçoit immédiatement son origine et son tick logique.
- Chaque état est validé avant d’être renvoyé au service créateur.

"""
          if catalog_anchor not in text:
              raise SystemExit("factory anchor missing")
          text = text.replace(catalog_anchor, factory_section + catalog_anchor, 1)

          candidate_old = """\tfor instance: ItemInstanceState in instances.values():
\t\tvar definition := catalog.get_definition(instance.definition_id)
\t\tif instance == null or instance.validate(definition) != OK:
\t\t\treturn ERR_INVALID_DATA
\tfor stack: ItemStackState in stacks.values():
\t\tvar definition := catalog.get_definition(stack.definition_id)
\t\tif stack == null or stack.validate(definition) != OK:
\t\t\treturn ERR_INVALID_DATA
\tfor record: ItemProvenanceRecord in provenance_records:
"""
          candidate_new = """\tfor instance: ItemInstanceState in instances.values():
\t\tif instance == null:
\t\t\treturn ERR_INVALID_DATA
\t\tvar definition := catalog.get_definition(instance.definition_id)
\t\tif instance.validate(definition) != OK:
\t\t\treturn ERR_INVALID_DATA
\tfor stack: ItemStackState in stacks.values():
\t\tif stack == null:
\t\t\treturn ERR_INVALID_DATA
\t\tvar definition := catalog.get_definition(stack.definition_id)
\t\tif stack.validate(definition) != OK:
\t\t\treturn ERR_INVALID_DATA
\tfor loadout: EquipmentLoadoutState in loadouts.values():
\t\tif loadout == null or loadout.validate_shape() != OK:
\t\t\treturn ERR_INVALID_DATA
\tfor reputation: ItemReputationState in reputations.values():
\t\tif reputation == null or not instances.has(reputation.instance_id):
\t\t\treturn ERR_INVALID_DATA
\t\tvar instance := instances[reputation.instance_id]
\t\tvar definition := catalog.get_definition(instance.definition_id)
\t\tif reputation.validate(definition) != OK:
\t\t\treturn ERR_INVALID_DATA
\tfor record: ItemProvenanceRecord in provenance_records:
"""
          replacements.append((candidate_old, candidate_new))

          replacements.append((
              "\tvar candidate := state.duplicate(true) as ItemReputationState\n",
              "\tvar candidate := state.duplicate_detached()\n",
          ))

          equip_old = """\tvar definition := _catalog.get_definition(instance.definition_id)
\tif definition == null or slot_id not in definition.equipment_slot_ids:
\t\treturn {}
\tif instance.is_broken(definition):
"""
          equip_new = """\tvar definition := _catalog.get_definition(instance.definition_id)
\tif definition == null or slot_id not in definition.equipment_slot_ids:
\t\treturn {}
\tif instance.owner == null:
\t\treturn {}
\tif instance.owner.kind != ItemOwnerRef.Kind.CHARACTER:
\t\treturn {}
\tif instance.owner.owner_id != character_id:
\t\treturn {}
\tif not instance.equipped_by_character_id.is_empty():
\t\treturn {}
\tif instance.is_broken(definition):
"""
          replacements.append((equip_old, equip_new))

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f"replacement missing: {old[:80]!r}")
              text = text.replace(old, new, 1)

          text = text.replace(
              "- La définition déclare les emplacements compatibles.\n",
              "- La forme du loadout est validée séparément avant les références croisées.\n- La définition déclare les emplacements compatibles.\n",
              1,
