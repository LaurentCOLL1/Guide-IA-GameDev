name: Temporary Build Chapter 17 Draft

on:
  push:
    branches:
      - docs/livre-ii-ch17-agents-ia-comportements-autonomes

permissions:
  contents: write

jobs:
  build-draft:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch17-agents-ia-comportements-autonomes
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build chapter and draft gate
        run: python tools/qa/tmp_build_ch17_draft.py
      - name: Commit draft gate
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Livre-II/CHAPITRE-17-Agents-IA-et-comportements-autonomes.md \
            Livre-II/QA/AUDIT-CHAPITRE-17.md \
            Livre-II/QA/VALIDATION-FINALE-CHAPITRE-17.yaml \
            Livre-II/index.md ROADMAP.md contents.txt CONTINUITE-PROJET.md
          git commit -m "docs(livre-ii): add chapter 17 draft gate"
          git push origin HEAD:docs/livre-ii-ch17-agents-ia-comportements-autonomes
