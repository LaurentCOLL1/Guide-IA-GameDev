name: Temporary Refine Chapter 15-16 Explanation Style

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'docs/refine-code-explanations-ch15-ch16' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/refine-code-explanations-ch15-ch16
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Capture polish assertion
        run: python tools/qa/tmp_polish_error_explanations_ch15_ch16.py > tmp_explanation_polish_error.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: explanation-polish-diagnostic
          path: tmp_explanation_polish_error.txt
          if-no-files-found: error
