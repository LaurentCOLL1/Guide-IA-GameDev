name: Apply Livre II Context Migration

on:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: >-
      github.event.issue.pull_request &&
      github.event.issue.number == 8 &&
      github.event.comment.body == '/apply-l2-contexts' &&
      github.actor == 'LaurentCOLL1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: docs/audit-contextes-livre-ii
          fetch-depth: 0

      - name: Apply deterministic migration
        run: python3 tools/audit_contextes_utilisation.py --apply

      - name: Commit migrated documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Livre-II
          if git diff --cached --quiet; then
            echo "No migration changes to commit."
          else
            git commit -m "docs(livre-ii): apply usage-context markers"
            git push origin HEAD:docs/audit-contextes-livre-ii
          fi
