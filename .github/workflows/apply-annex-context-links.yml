name: Apply Annex Context Links

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'docs/audit-volume0-livre1-contextes' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Correct annex links and migration logic
        run: |
          python3 - <<'PY'
          from pathlib import Path

          for path in Path('Volume-0/annexes').glob('*.md'):
              text = path.read_text(encoding='utf-8')
              text = text.replace(
                  '(annexes/CONVENTION-OUTILS-ET-CONTEXTES.md)',
                  '(CONVENTION-OUTILS-ET-CONTEXTES.md)',
              )
              path.write_text(text, encoding='utf-8', newline='\n')

          path = Path('tools/audit_contextes_utilisation.py')
          text = path.read_text(encoding='utf-8')
          old = '''    note = USAGE_NOTE_VOLUME0 if relative(path).startswith("Volume-0/") else USAGE_NOTE_LIVRE1\n'''
          new = '''    rel = relative(path)\n    if rel.startswith("Volume-0/annexes/"):\n        note = USAGE_NOTE_VOLUME0.replace(\n            "annexes/CONVENTION-OUTILS-ET-CONTEXTES.md",\n            "CONVENTION-OUTILS-ET-CONTEXTES.md",\n        )\n    elif rel.startswith("Volume-0/QA/"):\n        note = USAGE_NOTE_VOLUME0.replace(\n            "annexes/CONVENTION-OUTILS-ET-CONTEXTES.md",\n            "../annexes/CONVENTION-OUTILS-ET-CONTEXTES.md",\n        )\n    elif rel.startswith("Volume-0/"):\n        note = USAGE_NOTE_VOLUME0\n    else:\n        note = USAGE_NOTE_LIVRE1\n'''
          if new not in text:
              if old not in text:
                  raise RuntimeError('ancre de sélection du lien absente')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8', newline='\n')
          PY

          python3 tools/audit_contextes_utilisation.py --check
          python3 tools/audit_contextes_semantiques.py --check

      - name: Commit link corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Volume-0/annexes tools/audit_contextes_utilisation.py
          if ! git diff --cached --quiet; then
            git commit -m "docs(qa): correct context convention links in annexes"
            git push origin "HEAD:${{ github.head_ref }}"
          fi
