name: Validate Chapters Without PDF

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "Livre-II/**/*.md"
      - "Livre-II/index.md"
      - "contents.txt"
      - "ROADMAP.md"
      - "CONTINUITE-PROJET.md"
      - "REPRISE-NOUVELLE-CONVERSATION.md"
      - "tools/validate_chapters.py"
      - "tools/check_code_explanation_structure.py"
      - "tools/check_context_markers.py"
      - "tools/audit_contextes_semantiques.py"
      - "tools/report_contextes_utilisation.py"
      - ".github/workflows/validate-chapters.yml"
      - ".qa/**"

permissions:
  contents: read

jobs:
  validate-chapters:
    name: Diagnose refinement logic
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout explanation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Run refinement and capture traceback
        id: refine
        shell: bash
        run: |
          set +e
          python3 .qa/refine_explanations_ch17_ch26.py > /tmp/refine-output.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 30 /tmp/refine-output.log
          exit 0

      - name: Upload traceback
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: explanation-refinement-logic-traceback
          if-no-files-found: error
          retention-days: 7
          path: /tmp/refine-output.log

      - name: Fail when refinement failed
        if: steps.refine.outputs.status != '0'
        run: exit 1
