name: Validate Chapters Without PDF

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/validate-chapters.yml"
      - ".qa/reclassify_explanations_17_24.py"

permissions:
  contents: write

jobs:
  reclassify:
    name: Reclassify and validate historical explanations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout explanation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install lightweight dependencies
        run: python3 -m pip install --disable-pip-version-check --quiet PyYAML

      - name: Reclassify from main without loss
        run: python3 .qa/reclassify_explanations_17_24.py

      - name: Validate complete documentation
        run: |
          mkdir -p dist
          python3 tools/validate_chapters.py --report dist/QA-CHAPTERS.md
          python3 tools/check_code_explanation_structure.py --check
          python3 tools/check_context_markers.py --check
          python3 tools/audit_contextes_semantiques.py --check
          python3 tools/report_contextes_utilisation.py > dist/QA-CONTEXTES-COUVERTURE.md
          test -z "$(find . -type f -name '*.pdf' -print -quit)"

      - name: Commit faithful reclassification
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git restore --source=HEAD -- .github/workflows/validate-chapters.yml
          git add -A
          git commit -m "docs(livre-ii): faithfully classify historical explanations"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}