name: Validate Chapters Without PDF

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "Livre-II/**/*.md"
      - "Livre-II/index.md"
      - "contents.txt"
      - "ROADMAP.md"
      - "CONTINUITE-PROJET.md"
      - "REPRISE-NOUVELLE-CONVERSATION.md"
      - "tools/validate_chapters.py"
      - "tools/check_context_markers.py"
      - "tools/audit_contextes_semantiques.py"
      - "tools/report_contextes_utilisation.py"
      - ".github/workflows/validate-chapters.yml"
      - ".qa/**"

permissions:
  contents: write

jobs:
  validate-chapters:
    name: Validate chapters without PDF
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout chapter branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch26-outils-edition-pipelines
          fetch-depth: 0

      - name: Install lightweight dependencies
        run: |
          python3 -m pip install --disable-pip-version-check --quiet PyYAML

      - name: Materialize chapter 26 lot
        run: |
          cat .qa/ch26-payload/part-* | base64 --decode > /tmp/ch26-core.tgz
          tar -xzf /tmp/ch26-core.tgz
          python3 .qa/ch26_finalize.py
          rm -rf .qa/ch26-payload
          test ! -e .qa/ch26_finalize.py
          test ! -e .qa/ch26-payload

      - name: Validate structure, metadata, links and duplicates
        run: |
          mkdir -p dist
          set -o pipefail
          python3 tools/validate_chapters.py --report dist/QA-CHAPTERS.md \
            | tee dist/QA-CHAPTERS.log

      - name: Audit usage marker presence
        run: |
          set -o pipefail
          python3 tools/check_context_markers.py --check \
            | tee dist/QA-CONTEXTES.log

      - name: Audit semantic marker consistency
        run: |
          set -o pipefail
          python3 tools/audit_contextes_semantiques.py --check \
            | tee dist/QA-CONTEXTES-SEMANTIQUES.log

      - name: Measure context coverage
        run: |
          set -o pipefail
          python3 tools/report_contextes_utilisation.py \
            | tee dist/QA-CONTEXTES-COUVERTURE.md

      - name: Commit finalized chapter lot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- \
            CONTINUITE-PROJET.md \
            Livre-II/CHAPITRE-26-Outils-d-edition-internes-et-pipelines-de-contenu.md \
            Livre-II/QA/AUDIT-CHAPITRE-26.md \
            Livre-II/QA/VALIDATION-FINALE-CHAPITRE-26.yaml \
            Livre-II/index.md \
            ROADMAP.md \
            contents.txt \
            .qa/ch26_finalize.py \
            .qa/ch26-payload
          git commit -m "docs(livre-ii): finalize chapter 26 editor pipelines"
          git push origin HEAD:docs/livre-ii-ch26-outils-edition-pipelines

      - name: Assert that no PDF was produced
        run: |
          if find . -type f -name '*.pdf' -print -quit | grep -q .; then
            echo "Un PDF a été produit pendant une validation légère." >&2
            exit 1
          fi

      - name: Upload lightweight QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chapter-validation-without-pdf
          if-no-files-found: error
          retention-days: 30
          path: |
            dist/QA-CHAPTERS.md
            dist/QA-CHAPTERS.log
            dist/QA-CONTEXTES.log
            dist/QA-CONTEXTES-SEMANTIQUES.log
            dist/QA-CONTEXTES-COUVERTURE.md
