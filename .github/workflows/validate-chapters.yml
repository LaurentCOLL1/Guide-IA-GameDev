name: Validate Chapters Without PDF

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/validate-chapters.yml"

permissions:
  contents: write

jobs:
  materialize-refinement-source:
    name: Materialize refinement source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout explanation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Decode readable source
        run: |
          python3 - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          root = Path('.qa')
          payload = ''.join(
              (root / f'refine_payload_{index}.txt').read_text(encoding='utf-8').strip()
              for index in range(1, 4)
          )
          source = gzip.decompress(base64.b64decode(payload)).decode('utf-8')
          (root / 'refine_source.py').write_text(source, encoding='utf-8')
          PY

      - name: Commit readable source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git restore --source=HEAD -- .github/workflows/validate-chapters.yml
          git add .qa/refine_source.py
          git commit -m "chore(qa): materialize explanation refinement source"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
