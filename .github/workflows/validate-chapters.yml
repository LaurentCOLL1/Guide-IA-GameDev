name: Validate Chapters Without PDF

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "Livre-II/**/*.md"
      - "Livre-II/index.md"
      - "contents.txt"
      - "ROADMAP.md"
      - "CONTINUITE-PROJET.md"
      - "REPRISE-NOUVELLE-CONVERSATION.md"
      - "tools/validate_chapters.py"
      - "tools/check_code_explanation_structure.py"
      - "tools/check_context_markers.py"
      - "tools/audit_contextes_semantiques.py"
      - "tools/report_contextes_utilisation.py"
      - ".github/workflows/validate-chapters.yml"
      - ".qa/**"

permissions:
  contents: read

jobs:
  validate-chapters:
    name: Diagnose transformed explanation structure
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout explanation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Refine explanations
        shell: bash
        run: |
          python3 .qa/refine_explanations_ch17_ch26.py > /tmp/refine-output.log 2>&1
          cat /tmp/refine-output.log

      - name: Run structured explanation validator
        shell: bash
        run: |
          set +e
          python3 tools/check_code_explanation_structure.py --check > /tmp/explanation-validator.log 2>&1
          cat /tmp/explanation-validator.log
          exit 0

      - name: Upload transformed sample
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transformed-explanation-sample
          if-no-files-found: error
          retention-days: 7
          path: |
            /tmp/refine-output.log
            /tmp/explanation-validator.log
            Livre-II/CHAPITRE-17-Agents-IA-et-comportements-autonomes.md
            Livre-II/CHAPITRE-25-Narration-quetes-codex-et-connaissances.md
            tools/check_code_explanation_structure.py
