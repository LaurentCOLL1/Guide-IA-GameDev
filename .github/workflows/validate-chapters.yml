name: Validate Chapters Without PDF

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "Livre-II/**/*.md"
      - "Livre-II/index.md"
      - "contents.txt"
      - "ROADMAP.md"
      - "CONTINUITE-PROJET.md"
      - "REPRISE-NOUVELLE-CONVERSATION.md"
      - "tools/validate_chapters.py"
      - "tools/check_context_markers.py"
      - "tools/audit_contextes_semantiques.py"
      - "tools/report_contextes_utilisation.py"
      - ".github/workflows/validate-chapters.yml"
      - ".qa/**"

permissions:
  contents: write

jobs:
  diagnose-ch17-closure-fix:
    if: github.event_name == 'pull_request' && github.head_ref == 'docs/fix-ch17-project-asteria-closure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/fix-ch17-project-asteria-closure
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Capture transformation diagnostic
        run: |
          python tools/qa/tmp_fix_ch17_closure.py > tmp_ch17_closure.log 2>&1 || true
      - name: Commit diagnostic only
        run: |
          git restore CONTINUITE-PROJET.md Livre-II/CHAPITRE-17-Agents-IA-et-comportements-autonomes.md Livre-II/QA/AUDIT-CHAPITRE-17.md Livre-II/QA/PROTOCOLE-AUDIT-POST-CREATION.md Livre-II/QA/VALIDATION-FINALE-CHAPITRE-17.yaml Livre-II/index.md ROADMAP.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f tmp_ch17_closure.log
          git commit -m "chore(qa): record chapter 17 closure diagnostic"
          git push origin HEAD:docs/fix-ch17-project-asteria-closure

  validate-chapters:
    name: Validate chapters without PDF
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lightweight dependencies
        run: |
          python3 -m pip install --disable-pip-version-check --quiet PyYAML

      - name: Validate structure, metadata, links and duplicates
        run: |
          mkdir -p dist
          set -o pipefail
          python3 tools/validate_chapters.py --report dist/QA-CHAPTERS.md \
            | tee dist/QA-CHAPTERS.log

      - name: Audit usage marker presence
        run: |
          set -o pipefail
          python3 tools/check_context_markers.py --check \
            | tee dist/QA-CONTEXTES.log

      - name: Audit semantic marker consistency
        run: |
          set -o pipefail
          python3 tools/audit_contextes_semantiques.py --check \
            | tee dist/QA-CONTEXTES-SEMANTIQUES.log

      - name: Measure context coverage
        run: |
          set -o pipefail
          python3 tools/report_contextes_utilisation.py \
            | tee dist/QA-CONTEXTES-COUVERTURE.md

      - name: Assert that no PDF was produced
        run: |
          if find . -type f -name '*.pdf' -print -quit | grep -q .; then
            echo "Un PDF a été produit pendant une validation légère." >&2
            exit 1
          fi

      - name: Upload lightweight QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chapter-validation-without-pdf
          if-no-files-found: error
          retention-days: 30
          path: |
            dist/QA-CHAPTERS.md
            dist/QA-CHAPTERS.log
            dist/QA-CONTEXTES.log
            dist/QA-CONTEXTES-SEMANTIQUES.log
            dist/QA-CONTEXTES-COUVERTURE.md
