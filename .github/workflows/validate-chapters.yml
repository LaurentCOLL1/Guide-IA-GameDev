name: Validate Chapters Without PDF

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "Livre-II/**/*.md"
      - "Livre-II/index.md"
      - "contents.txt"
      - "ROADMAP.md"
      - "CONTINUITE-PROJET.md"
      - "REPRISE-NOUVELLE-CONVERSATION.md"
      - "tools/validate_chapters.py"
      - "tools/check_code_explanation_structure.py"
      - "tools/check_context_markers.py"
      - "tools/audit_contextes_semantiques.py"
      - "tools/report_contextes_utilisation.py"
      - ".github/workflows/validate-chapters.yml"
      - ".qa/**"

permissions:
  contents: write

jobs:
  validate-chapters:
    name: Diagnose explanation refinement
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout explanation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Run refinement and capture traceback
        shell: bash
        run: |
          set +e
          python3 .qa/refine_explanations_ch17_ch26.py > /tmp/refine-output.log 2>&1
          status=$?
          cat /tmp/refine-output.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/refine-output.log .qa/refine-failure.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git restore --source=HEAD -- .github/workflows/validate-chapters.yml
            git add .qa/refine-failure.log
            git commit -m "chore(qa): record explanation refinement failure"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
            exit "$status"
          fi
