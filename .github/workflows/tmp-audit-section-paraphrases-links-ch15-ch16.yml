name: Temporary Fix Section Paraphrases and Links

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'docs/fix-section-paraphrases-and-links-ch15-ch16' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/fix-section-paraphrases-and-links-ch15-ch16
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Capture assertion
        run: |
          python tools/qa/tmp_fix_ch15_ch16_section_references.py > tmp_chapter_section_reference_error.txt 2>&1 || true
          git checkout -- \
            Livre-II/CHAPITRE-15-Relations-sociales.md \
            Livre-II/CHAPITRE-16-Famille-et-generations.md
          rm -f tmp_precise_section_references_metrics.txt
      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f tmp_chapter_section_reference_error.txt
          git commit -m "chore(qa): capture section-reference assertion"
          git push origin HEAD:docs/fix-section-paraphrases-and-links-ch15-ch16
