name: Temporary Close Section Reference Evidence

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  close-evidence:
    if: github.head_ref == 'docs/fix-section-paraphrases-and-links-ch15-ch16' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/fix-section-paraphrases-and-links-ch15-ch16
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Close evidence
        run: python tools/qa/tmp_close_section_reference_evidence.py
      - name: Commit evidence closure
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Livre-II/QA/VALIDATION-FINALE-CHAPITRE-15.yaml \
            Livre-II/QA/VALIDATION-FINALE-CHAPITRE-16.yaml
          git commit -m "docs(qa): close precise section-reference evidence"
          git push origin HEAD:docs/fix-section-paraphrases-and-links-ch15-ch16
