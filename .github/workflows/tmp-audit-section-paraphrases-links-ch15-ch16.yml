name: Temporary Audit Section Paraphrases and Links

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  audit:
    if: github.head_ref == 'docs/fix-section-paraphrases-and-links-ch15-ch16' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/fix-section-paraphrases-and-links-ch15-ch16
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Audit section paraphrases and reread links
        run: python tools/qa/tmp_audit_section_paraphrases_links_ch15_ch16.py
      - name: Commit temporary audit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f tmp_section_paraphrases_links_audit.txt
          git commit -m "chore(qa): record section paraphrase and link audit"
          git push origin HEAD:docs/fix-section-paraphrases-and-links-ch15-ch16
