name: Chapter 7 Materialization Runner

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

jobs:
  materialize:
    if: github.head_ref == 'docs/livre-iii-ch07-creation-humanoides'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Capture Chapter 7 materialization diagnostic
        shell: bash
        run: |
          set +e
          log=.qa/ch07-materialize-debug.log
          {
            echo "STEP files"
            wc -c .qa/ch07-package-*.b64

            echo "STEP fragment-digests"
            sha256sum .qa/ch07-package-*.b64

            echo "STEP decode"
            cat .qa/ch07-package-*.b64 | base64 --decode > /tmp/ch07-package.tar.gz
            echo "decode_rc=$?"

            echo "STEP digest"
            sha256sum /tmp/ch07-package.tar.gz
            echo "0f7dbb241289de9b67444c3d31448a271d07d174da56620f151cba4a87b21740  /tmp/ch07-package.tar.gz" \
              | sha256sum --check --strict
            echo "digest_rc=$?"

            echo "STEP archive-list"
            tar -tzf /tmp/ch07-package.tar.gz
            echo "list_rc=$?"

            echo "STEP extract"
            tar -xzf /tmp/ch07-package.tar.gz
            echo "extract_rc=$?"

            echo "STEP governance"
            python3 .qa/ch07-governance.py
            echo "governance_rc=$?"
          } > "$log" 2>&1
          exit 0

      - name: Upload Chapter 7 materialization diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: ch07-materialization-diagnostic
          if-no-files-found: error
          retention-days: 7
          path: .qa/ch07-materialize-debug.log
