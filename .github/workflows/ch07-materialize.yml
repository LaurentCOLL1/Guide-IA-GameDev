name: Chapter 7 Context Fix Runner

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write

jobs:
  fix-contexts:
    if: github.head_ref == 'docs/livre-iii-ch07-creation-humanoides'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply and validate Chapter 7 context fix
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if [[ ! -f .qa/ch07-context-fix.py ]]; then
            echo "No Chapter 7 context fix to apply."
            exit 0
          fi

          python3 .qa/ch07-context-fix.py
          python3 -m pip install --disable-pip-version-check --quiet PyYAML
          mkdir -p dist
          python3 tools/validate_chapters.py --report dist/QA-CHAPTERS.md
          python3 tools/check_code_explanation_structure.py --check
          python3 tools/check_context_markers.py --check
          python3 tools/audit_contextes_semantiques.py --check
          python3 tools/report_contextes_utilisation.py > dist/QA-CONTEXTES-COUVERTURE.md

          rm -f .qa/ch07-context-fix.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(livre-iii): corriger les repères des diagnostics du chapitre 7"
          git push origin HEAD:"$HEAD_BRANCH"
