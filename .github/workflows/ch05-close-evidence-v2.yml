name: Chapter 5 Close Evidence V2

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ch05-close-evidence-v2.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  close-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Chapter 5 branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-iii-ch05-provenance-licences
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validator dependency
        run: python -m pip install --disable-pip-version-check --quiet PyYAML

      - name: Apply idempotent closure
        shell: python
        run: |
          from __future__ import annotations

          import json
          import re
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          import yaml

          proof_path = Path('Livre-III/QA/VALIDATION-FINALE-CHAPITRE-05.yaml')
          continuity_path = Path('CONTINUITE-PROJET.md')
          result_path = Path('.qa/ch05-context-result.json')
          proof = yaml.safe_load(proof_path.read_text(encoding='utf-8'))
          continuity = continuity_path.read_text(encoding='utf-8')

          already_closed = (
              proof.get('status') == 'complete'
              and proof.get('evidence-closure', {}).get('conclusion') == 'success'
              and 'version: "3.35.1"' in continuity
          )
          if already_closed:
              print('La preuve est déjà entièrement fermée.')
              if result_path.exists():
                  result_path.unlink()
              raise SystemExit(0)

          if proof.get('status') != 'complete':
              if not result_path.exists():
                  raise RuntimeError('Le résultat temporaire des contextes est absent.')
              result = json.loads(result_path.read_text(encoding='utf-8'))
              if result.get('conclusion') != 'success':
                  raise RuntimeError('La validation des contextes n’est pas réussie.')

              proof['status'] = 'complete'
              proof['validated-head-commit'] = result['document_head']
              proof['results'].update({
                  'blocking-errors': 0,
                  'warnings': 1,
                  'significant-code-and-data-blocks': 26,
                  'duplicate-headings': 0,
                  'duplicate-blocks': 0,
                  'duplicate-paragraphs': 0,
              })
              proof['integrity']['chapter-sha256'] = result['chapter_sha256']
              proof['integrity']['audit-sha256'] = result['audit_sha256']
              proof['ci']['validate-chapters-without-pdf'] = {
                  'run-id': 29960812166,
                  'conclusion': 'success',
              }
              proof['ci']['validate-usage-contexts'] = {
                  'run-id': result['context_run_id'],
                  'conclusion': 'success',
              }
              proof['ci']['artifact'] = {
                  'id': 8545871720,
                  'name': 'chapter-validation-without-pdf',
                  'digest': 'b4ae05177e0fc97a7d79cac93c7610046a84db483b0bd8a134032dad9c13083f',
              }
              proof['ci']['context-artifact'] = {
                  'id': result['context_artifact_id'],
                  'name': 'usage-context-audit',
                  'digest': result['context_artifact_digest'],
              }
              proof['evidence-closure'] = {'commit': None, 'conclusion': 'pending'}

              timestamp = datetime.now(ZoneInfo('Europe/Paris')).isoformat(timespec='seconds')
              if 'version: "3.35.0"' in continuity:
                  continuity = continuity.replace('version: "3.35.0"', 'version: "3.35.1"', 1)
                  continuity = re.sub(
                      r'last-updated: "[^"]+"',
                      f'last-updated: "{timestamp}"',
                      continuity,
                      count=1,
                  )
                  journal = f'''### {timestamp} — version 3.35.1

- preuve finale `Livre-III/QA/VALIDATION-FINALE-CHAPITRE-05.yaml` fermée avec zéro erreur bloquante et un avertissement documentaire ;
- validation documentaire réussie au run `29960812166` sur la tête `{result['document_head']}` ;
- artefact `chapter-validation-without-pdf` enregistré sous l’identifiant `8545871720`, digest `b4ae05177e0fc97a7d79cac93c7610046a84db483b0bd8a134032dad9c13083f` ;
- validation des contextes réussie au run `{result['context_run_id']}` sur la même tête documentaire ;
- artefact `usage-context-audit` enregistré sous l’identifiant `{result['context_artifact_id']}`, digest `{result['context_artifact_digest']}` ;
- empreinte SHA-256 du chapitre : `{result['chapter_sha256']}` ;
- empreinte SHA-256 de l’audit : `{result['audit_sha256']}` ;
- métriques finales : 1 555 lignes, 63 titres, 26 blocs significatifs et aucun doublon ;
- prochaine action maintenue au chapitre 6 — Création des humains, niveau Élevée ;
- aucun registre réel, contrat, consentement, runtime ou PDF du Livre III produits.

'''
                  marker = '## 27. Journal\n\n'
                  if continuity.count(marker) != 1:
                      raise RuntimeError('Le journal de continuité est introuvable.')
                  continuity = continuity.replace(marker, marker + journal, 1)
              elif 'version: "3.35.1"' not in continuity:
                  raise RuntimeError('Version de continuité inattendue.')

              proof_path.write_text(
                  yaml.safe_dump(proof, sort_keys=False, allow_unicode=True, width=120),
                  encoding='utf-8',
              )
              continuity_path.write_text(continuity, encoding='utf-8')

          if result_path.exists():
              result_path.unlink()
          qa_dir = result_path.parent
          if qa_dir.exists() and not any(qa_dir.iterdir()):
              qa_dir.rmdir()

      - name: Validate closed documentary state
        run: |
          mkdir -p dist
          python tools/validate_chapters.py --root . --report dist/QA-CHAPTERS.md
          python tools/check_code_explanation_structure.py --check
          python tools/check_context_markers.py --check
          python tools/audit_contextes_semantiques.py --check
          python tools/report_contextes_utilisation.py > dist/QA-CONTEXTES-COUVERTURE.md

      - name: Commit closure state when needed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo "CLOSURE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          else
            git commit -m 'docs(qa): fermer la preuve du chapitre 5'
            echo "CLOSURE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
            git push origin HEAD:docs/livre-iii-ch05-provenance-licences
          fi

      - name: Record closure commit when needed
        shell: python
        run: |
          import os
          from pathlib import Path
          import yaml

          path = Path('Livre-III/QA/VALIDATION-FINALE-CHAPITRE-05.yaml')
          proof = yaml.safe_load(path.read_text(encoding='utf-8'))
          closure = proof.get('evidence-closure', {})
          if closure.get('conclusion') != 'success':
              proof['evidence-closure'] = {
                  'commit': os.environ['CLOSURE_SHA'],
                  'conclusion': 'success',
              }
              path.write_text(
                  yaml.safe_dump(proof, sort_keys=False, allow_unicode=True, width=120),
                  encoding='utf-8',
              )

      - name: Commit closure coordinates when needed
        shell: bash
        run: |
          set -euo pipefail
          git add Livre-III/QA/VALIDATION-FINALE-CHAPITRE-05.yaml
          if git diff --cached --quiet; then
            echo 'Coordonnées de clôture déjà présentes.'
          else
            git commit -m 'docs(qa): enregistrer le commit de clôture du chapitre 5'
            git push origin HEAD:docs/livre-iii-ch05-provenance-licences
          fi
