name: Temporary Finalize Chapter 16

on:
  push:
    branches:
      - docs/livre-ii-ch16-famille-generations

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch16-famille-generations
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply audited chapter
        run: python tools/qa/tmp_finalize_ch16.py
      - name: Remove temporary machinery
        run: |
          rm tools/qa/tmp_finalize_ch16.py
          rm .github/workflows/tmp-finalize-ch16.yml
      - name: Commit audited chapter
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Livre-II/CHAPITRE-16-Famille-et-generations.md tools/qa/tmp_finalize_ch16.py .github/workflows/tmp-finalize-ch16.yml
          git commit -m "docs(livre-ii): apply chapter 16 audit corrections"
          git push origin HEAD:docs/livre-ii-ch16-famille-generations
