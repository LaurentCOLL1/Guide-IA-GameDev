name: Temporary Livre II Reader Manual

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  build-reader-manual:
    if: github.head_ref == 'release/livre-ii-reader-manual'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout reader branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply permanent reader cleanup when present
        run: |
          if [ -f .qa/finalize-reader-manual.py ]; then
            python3 .qa/finalize-reader-manual.py
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CONTINUITE-PROJET.md Livre-II contents.txt metadata.yaml filters .qa
          if ! git diff --cached --quiet; then
            git commit -m "fix(pdf): séparer le manuel lecteur des preuves QA"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Install Pandoc XeLaTeX and PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc texlive-xetex texlive-latex-extra texlive-fonts-recommended \
            lmodern librsvg2-bin fonts-dejavu-core poppler-utils qpdf python3-pil

      - name: Validate reader-only compilation order
        run: |
          mkdir -p dist/qa-livre-ii-reader
          python3 tools/validate_chapters.py --report dist/qa-livre-ii-reader/QA-CHAPTERS.md
          python3 tools/check_context_markers.py --check
          python3 tools/audit_contextes_semantiques.py --check
          python3 - <<'PY' | tee dist/qa-livre-ii-reader/reader-order-check.txt
          from pathlib import Path
          import re
          lines = [line.strip() for line in Path('contents.txt').read_text(encoding='utf-8').splitlines() if line.strip() and not line.lstrip().startswith('#')]
          forbidden = [line for line in lines if '/QA/' in line or re.search(r'(^|/)(AUDIT|PROTOCOLE|VALIDATION|RAPPORT)-', line)]
          chapters = [line for line in lines if line.startswith('Livre-II/CHAPITRE-')]
          visible_process = []
          for path in sorted(Path('Livre-II').glob('CHAPITRE-*.md')):
              text = path.read_text(encoding='utf-8')
              if re.search(r'^>.*(?:Audit post-création|Explications de code).*$', text, re.M):
                  visible_process.append(path.as_posix())
          print(f'Livre II chapters in reader order: {len(chapters)}')
          print(f'Forbidden QA sources in reader order: {len(forbidden)}')
          print(f'Visible process notices in chapters: {len(visible_process)}')
          for item in forbidden + visible_process:
              print(f'- {item}')
          raise SystemExit(1 if len(chapters) != 30 or forbidden or visible_process else 0)
          PY

      - name: Build reader PDF with Pandoc and XeLaTeX
        run: |
          chmod +x build.sh
          set -o pipefail
          ./build.sh 2>&1 | tee dist/qa-livre-ii-reader/pandoc-xelatex.log

      - name: Preflight reader PDF
        run: |
          PDF=dist/Guide-IA-GameDev.pdf
          pdfinfo "$PDF" | tee dist/qa-livre-ii-reader/PDF-INFO.txt
          pdffonts "$PDF" | tee dist/qa-livre-ii-reader/PDF-FONTS.txt
          qpdf --check "$PDF" 2>&1 | tee dist/qa-livre-ii-reader/PDF-QPDF.txt
          pdftotext -layout "$PDF" dist/qa-livre-ii-reader/Guide-IA-GameDev.txt
          test -s dist/qa-livre-ii-reader/Guide-IA-GameDev.txt
          if grep -Eiq 'Protocole d.audit post-création|Audit du chapitre|Validation transversale et publication du Livre II|AUDIT-CHAPITRE' dist/qa-livre-ii-reader/Guide-IA-GameDev.txt; then
            echo 'Le PDF contient encore du contenu QA interdit.' >&2
            grep -Ein 'Protocole d.audit post-création|Audit du chapitre|Validation transversale et publication du Livre II|AUDIT-CHAPITRE' dist/qa-livre-ii-reader/Guide-IA-GameDev.txt | head -50 >&2
            exit 1
          fi
          sha256sum "$PDF" | tee dist/qa-livre-ii-reader/PDF-SHA256.txt

      - name: Render representative pages and Livre II openings
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import subprocess
          info = Path('dist/qa-livre-ii-reader/PDF-INFO.txt').read_text(encoding='utf-8', errors='replace')
          pages = int(re.search(r'^Pages:\s+(\d+)', info, re.M).group(1))
          page_texts = Path('dist/qa-livre-ii-reader/Guide-IA-GameDev.txt').read_text(encoding='utf-8', errors='replace').split('\f')
          sample = {1, 2, 3, 4, 5, 10, 20, pages // 4, pages // 2, (3 * pages) // 4, pages - 4, pages - 3, pages - 2, pages - 1, pages}
          openings = []
          cursor = 200
          for chapter_number in range(36, 66):
              pattern = re.compile(rf'\bchapitre\s+{chapter_number}\b', re.I)
              found = None
              for page_number in range(cursor, min(pages, len(page_texts)) + 1):
                  if pattern.search(page_texts[page_number - 1][:1800]):
                      found = page_number
                      break
              if found is None:
                  raise SystemExit(f'Ouverture introuvable pour le chapitre global {chapter_number}')
              openings.append(found)
              cursor = found + 1
          selected = sorted(page for page in sample.union(openings) if 1 <= page <= pages)
          out = Path('dist/qa-livre-ii-reader/rendered')
          out.mkdir(parents=True, exist_ok=True)
          for page in selected:
              subprocess.run(['pdftoppm', '-f', str(page), '-l', str(page), '-r', '150', '-png', '-singlefile', 'dist/Guide-IA-GameDev.pdf', str(out / f'page-{page:04d}')], check=True)
          Path('dist/qa-livre-ii-reader/rendered-pages.txt').write_text('\n'.join(map(str, selected)) + '\n', encoding='utf-8')
          Path('dist/qa-livre-ii-reader/livre-ii-opening-pages.txt').write_text('\n'.join(map(str, openings)) + '\n', encoding='utf-8')
          print(f'Pages rendered: {len(selected)}')
          print(f'Livre II openings: {len(openings)}')
          PY

      - name: Upload reader publication candidate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: livre-ii-reader-manual
          retention-days: 14
          if-no-files-found: warn
          path: |
            dist/Guide-IA-GameDev.pdf
            dist/qa-livre-ii-reader/**
