name: Temporary Record Restart Entry

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  update-continuity:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'docs/reprise-nouvelle-conversation'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: docs/reprise-nouvelle-conversation
          fetch-depth: 0

      - name: Update continuity
        shell: python
        run: |
          from pathlib import Path

          path = Path("CONTINUITE-PROJET.md")
          text = path.read_text(encoding="utf-8")

          old_version = 'version: "3.9.0"'
          if old_version not in text:
              raise SystemExit("Version 3.9.0 introuvable dans CONTINUITE-PROJET.md")
          text = text.replace(old_version, 'version: "3.10.0"', 1)

          rule = "> **Règle obligatoire :** toute modification documentaire, technique, structurelle ou QA doit mettre à jour ce fichier dans le même lot."
          entry = (
              rule
              + "\n\n> **Point d’entrée recommandé :** `REPRISE-NOUVELLE-CONVERSATION.md` fournit le prompt stable à copier dans une nouvelle conversation. Il pointe vers le présent document sans recopier l’état courant ; `CONTINUITE-PROJET.md` reste l’unique source de vérité de la reprise."
          )
          if rule not in text:
              raise SystemExit("Règle obligatoire de continuité introuvable")
          text = text.replace(rule, entry, 1)

          journal_anchor = "### 2026-07-19 — version 3.9.0"
          journal_entry = """### 2026-07-19 — version 3.10.0

- ajout de `REPRISE-NOUVELLE-CONVERSATION.md` comme point d’entrée stable pour une nouvelle conversation ;
- rappel que le dépôt puis `CONTINUITE-PROJET.md` prévalent sur les anciens résumés ;
- interdiction de recopier la progression et la prochaine action dans le fichier de reprise ;
- procédure de confirmation obligatoire avant toute nouvelle rédaction ;
- aucun PDF construit.

"""
          if journal_anchor not in text:
              raise SystemExit("Ancre du journal 3.9.0 introuvable")
          text = text.replace(journal_anchor, journal_entry + journal_anchor, 1)

          path.write_text(text, encoding="utf-8")

      - name: Remove temporary workflow
        run: rm .github/workflows/temporary-record-restart-entry.yml

      - name: Commit continuity update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CONTINUITE-PROJET.md .github/workflows/temporary-record-restart-entry.yml
          git commit -m "docs(project): record restart entry point [skip ci]"
          git push origin HEAD:docs/reprise-nouvelle-conversation
