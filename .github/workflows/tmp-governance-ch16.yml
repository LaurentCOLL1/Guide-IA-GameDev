name: Temporary Chapter 16 Governance

on:
  push:
    branches:
      - docs/livre-ii-ch16-famille-generations
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose-governance:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch16-famille-generations
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Capture governance error
        run: |
          python tools/qa/tmp_update_ch16_governance.py > tmp_ch16_governance_error.txt 2>&1 || true
      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tmp_ch16_governance_error.txt
          git commit -m "chore(qa): capture chapter 16 governance diagnostic"
          git push origin HEAD:docs/livre-ii-ch16-famille-generations
