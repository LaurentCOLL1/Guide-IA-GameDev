name: Chapter 30 Generator Runner

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: read

jobs:
  generate-and-validate:
    if: github.event.pull_request.head.ref == 'docs/livre-ii-ch30-architecture-solo-studio'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout chapter branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install validator dependency
        run: python3 -m pip install --disable-pip-version-check pyyaml

      - name: Generate chapter 30 when needed
        shell: bash
        run: |
          set -euxo pipefail
          python3 .qa/ch30/launcher.py

      - name: Validate chapter and governance
        shell: bash
        run: |
          set -euxo pipefail
          python3 tools/validate_chapters.py --report /tmp/ch30-QA.md
          python3 tools/check_context_markers.py --check
          python3 tools/audit_contextes_semantiques.py --check
          python3 tools/check_code_explanation_structure.py

      - name: Push generated documentation when needed
        shell: bash
        run: |
          set -euxo pipefail
          if git diff --quiet && git diff --cached --quiet; then
            echo "No generated change to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(livre-ii): add chapter 30 Solo and Studio architecture"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
