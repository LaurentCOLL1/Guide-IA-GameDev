name: Patch Chapter 4 Audit Proof

on:
  push:
    branches:
      - docs/livre-ii-ch04-architecture-modulaire
    paths:
      - .github/workflows/patch-ch04-audit-proof.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch04-architecture-modulaire
          fetch-depth: 0

      - name: Remove self-referential metrics
        shell: python
        run: |
          from pathlib import Path
          path = Path("Livre-II/QA/AUDIT-CHAPITRE-04.md")
          text = path.read_text(encoding="utf-8")
          old = '''Campagne finale :

          - `Validate Usage Contexts` : exécution `29661521005`, réussite ;
          - `Validate Documentation` : exécution `29661521014`, réussite ;
          - 47 sources déclarées ;
          - 10 chapitres du Livre I ;
          - 4 chapitres du Livre II ;
          - 46 identifiants uniques ;
          - 0 erreur bloquante ;
          - 1 avertissement : licence globale à définir ;
          - PDF A4 1.5 de 580 pages et 1 533 828 octets ;
          - texte extractible ;
          - aucun chiffrement, JavaScript ou page tournée.'''
          new = '''La campagne finale a validé :

          - les contextes d’utilisation ;
          - la structure et les liens ;
          - 47 sources déclarées ;
          - 10 chapitres du Livre I ;
          - 4 chapitres du Livre II ;
          - 46 identifiants uniques ;
          - 0 erreur bloquante ;
          - 1 avertissement : licence globale à définir ;
          - un PDF A4 1.5 de 580 pages ;
          - un texte extractible ;
          - aucun chiffrement, JavaScript ou page tournée.

          Les identifiants des exécutions, l’empreinte de l’artefact et la taille
          exacte du PDF sont conservés uniquement dans la preuve YAML externe,
          afin d’éviter que le rapport compilé modifie ses propres mesures.'''
          if old not in text:
              raise RuntimeError("Section de preuve source introuvable")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")

      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          rm .github/workflows/patch-ch04-audit-proof.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Livre-II/QA/AUDIT-CHAPITRE-04.md .github/workflows/patch-ch04-audit-proof.yml
          git commit -m "docs(qa): externalize chapter 4 final metrics"
          git push origin HEAD:docs/livre-ii-ch04-architecture-modulaire
