name: Temporary Apply Code Explanation Rule

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-rule:
    if: github.head_ref == 'docs/governance-code-explanations' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/governance-code-explanations
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply permanent governance rule
        run: python tools/qa/tmp_apply_code_explanation_rule.py
      - name: Commit governance updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CONTINUITE-PROJET.md ROADMAP.md Livre-II/QA/PROTOCOLE-AUDIT-POST-CREATION.md
          git commit -m "docs(qa): require detailed code explanations"
          git push origin HEAD:docs/governance-code-explanations
