name: Temporary Apply Code Explanation Rule

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose-rule:
    if: github.head_ref == 'docs/governance-code-explanations' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/governance-code-explanations
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Capture assertion
        run: |
          python tools/qa/tmp_apply_code_explanation_rule.py > tmp_code_explanation_rule_error.txt 2>&1 || true
          git checkout -- CONTINUITE-PROJET.md ROADMAP.md Livre-II/QA/PROTOCOLE-AUDIT-POST-CREATION.md
      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tmp_code_explanation_rule_error.txt
          git commit -m "chore(qa): capture code explanation rule assertion"
          git push origin HEAD:docs/governance-code-explanations
