name: Refine Chapter 8

on:
  push:
    branches:
      - docs/livre-ii-ch08-sqlite-migrations
    paths:
      - tools/refine_chapter08.py
      - .github/workflows/refine-chapter08.yml

permissions:
  contents: write

jobs:
  refine:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch08-sqlite-migrations
          fetch-depth: 0

      - name: Apply technical refinements
        run: python tools/refine_chapter08.py

      - name: Remove temporary refinement files
        run: |
          rm tools/refine_chapter08.py
          rm .github/workflows/refine-chapter08.yml

      - name: Commit refined chapter
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(livre-ii): harden chapter 8 persistence examples"
          git push origin HEAD:docs/livre-ii-ch08-sqlite-migrations
