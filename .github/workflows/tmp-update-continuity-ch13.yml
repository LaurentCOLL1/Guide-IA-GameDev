name: Temporary Update Chapter 13 Continuity

on:
  push:
    branches:
      - docs/livre-ii-ch13-security-runtime-separation

permissions:
  contents: write

jobs:
  update-continuity:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch13-security-runtime-separation
      - name: Apply precise continuity changes
        run: python tools/tmp_update_continuity_ch13.py
      - name: Commit continuity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CONTINUITE-PROJET.md
          git diff --cached --quiet && exit 0
          git commit -m "docs(project): update continuity for chapter 13"
          git push origin HEAD:docs/livre-ii-ch13-security-runtime-separation
