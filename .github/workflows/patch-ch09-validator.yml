name: Patch Chapter 9 Validator

on:
  push:
    branches:
      - docs/livre-ii-ch09-saves-versioning
    paths:
      - .github/workflows/patch-ch09-validator.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch09-saves-versioning
          fetch-depth: 0

      - name: Extend semantic validator
        run: python tools/patch_ch09_validator.py

      - name: Commit validator and remove temporary tooling
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "qa: recognize additional corrected-example labels [skip ci]"
          git push origin HEAD:docs/livre-ii-ch09-saves-versioning
