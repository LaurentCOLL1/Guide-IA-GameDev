name: Diagnose Livre II Audit Patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-audit:
    name: Apply and diagnose Livre II audit corrections
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Extract correction script
        run: |
          python3 - <<'PATCHPY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-l2-audit-patch.yml').read_text(encoding='utf-8')
          marker_start = "          python3 - <<'PY'\n"
          marker_end = "\n          PY\n"
          start = workflow.index(marker_start) + len(marker_start)
          end = workflow.index(marker_end, start)
          block = workflow[start:end]
          lines = [line[10:] if line.startswith('          ') else line for line in block.splitlines()]
          Path('/tmp/apply_l2_audit_patch.py').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PATCHPY

      - name: Apply corrections and preserve diagnostics
        shell: bash
        run: |
          set +e
          python3 /tmp/apply_l2_audit_patch.py > /tmp/audit-patch.log 2>&1
          status=$?
          set -e

          mkdir -p Livre-II/QA
          if [ "$status" -ne 0 ]; then
            cp /tmp/audit-patch.log Livre-II/QA/PATCH-ERROR.log
          else
            rm -f Livre-II/QA/PATCH-ERROR.log
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            if [ "$status" -eq 0 ]; then
              git commit -m "docs(livre-ii): audit and correct chapters 1 and 2"
            else
              git commit -m "ci(debug): record Livre II audit patch failure"
            fi
            git push origin "HEAD:${{ github.head_ref }}"
          fi

          cat /tmp/audit-patch.log
          exit 0
