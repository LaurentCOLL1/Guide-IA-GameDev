name: Validate Documentation PDF

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-pdf:
    name: Validate and compile publication PDF
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install documentation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            lmodern \
            librsvg2-bin \
            fonts-dejavu-core \
            poppler-utils \
            python3-yaml

      - name: Run lightweight QA before publication build
        run: |
          mkdir -p dist
          set -o pipefail
          python3 tools/validate_chapters.py --report dist/QA-CHAPTERS.md \
            | tee dist/QA-CHAPTERS.log
          python3 tools/check_context_markers.py --check \
            | tee dist/QA-CONTEXTES.log
          python3 tools/audit_contextes_semantiques.py --check \
            | tee dist/QA-CONTEXTES-SEMANTIQUES.log

      - name: Compile PDF with Pandoc
        run: |
          chmod +x build.sh
          set -o pipefail
          ./build.sh 2>&1 | tee dist/PANDOC-BUILD.log

      - name: Inspect generated PDF
        run: |
          test -s dist/Guide-IA-GameDev.pdf
          pdfinfo dist/Guide-IA-GameDev.pdf | tee dist/PDF-INFO.txt
          pages="$(pdfinfo dist/Guide-IA-GameDev.pdf | awk '/^Pages:/ {print $2}')"
          test -n "$pages"
          test "$pages" -gt 0
          pdftotext dist/Guide-IA-GameDev.pdf dist/Guide-IA-GameDev.txt
          test -s dist/Guide-IA-GameDev.txt

      - name: Upload publication validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: documentation-pdf-validation
          if-no-files-found: warn
          retention-days: 30
          path: |
            dist/Guide-IA-GameDev.pdf
            dist/Guide-IA-GameDev.txt
            dist/PDF-INFO.txt
            dist/PANDOC-BUILD.log
            dist/QA-CHAPTERS.md
            dist/QA-CHAPTERS.log
            dist/QA-CONTEXTES.log
            dist/QA-CONTEXTES-SEMANTIQUES.log
