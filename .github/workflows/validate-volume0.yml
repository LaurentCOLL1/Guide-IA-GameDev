name: Apply Final Livre II Audit Fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply final fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              "Livre-II/CHAPITRE-01-Decouvrir-Godot-et-creer-le-projet-fil-rouge.md": [
                  (
                      "git add .gitignore README.md project.godot icon.svg src docs data localization tests tools",
                      "git add .gitattributes .gitignore README.md project.godot icon.svg src docs data localization tests tools",
                  ),
              ],
              "Livre-II/CHAPITRE-02-Fondamentaux-de-GDScript.md": [
                  (
                      "var metrics: Dictionary = {}",
                      "var metrics: Dictionary[StringName, float] = {}",
                  ),
                  (
                      "for key: Variant in metrics:",
                      "for key: StringName in metrics:",
                  ),
              ],
          }

          for path_string, pairs in replacements.items():
              path = Path(path_string)
              text = path.read_text(encoding="utf-8")
              for old, new in pairs:
                  count = text.count(old)
                  if count != 1:
                      raise RuntimeError(f"{path}: remplacement {old!r}, occurrence {count}")
                  text = text.replace(old, new, 1)
              path.write_text(text, encoding="utf-8", newline="\n")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Livre-II/CHAPITRE-01-Decouvrir-Godot-et-creer-le-projet-fil-rouge.md \
                  Livre-II/CHAPITRE-02-Fondamentaux-de-GDScript.md
          git commit -m "docs(livre-ii): complete chapter audit corrections"
          git push origin "HEAD:${{ github.head_ref }}"
