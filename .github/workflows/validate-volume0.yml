name: Validate Documentation

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/*.md"
      - "tools/**"
      - ".github/workflows/validate-volume0.yml"

permissions:
  contents: write

jobs:
  patch-and-restore:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply chapter 2 patch when still present
        shell: bash
        run: |
          if test -f tools/patch_gdscript_ch02_audit.py; then
            python3 tools/patch_gdscript_ch02_audit.py
          else
            echo "Patch already applied."
          fi

      - name: Restore and extend permanent workflow
        shell: bash
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/validate-volume0.yml > .github/workflows/validate-volume0.yml
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/validate-volume0.yml')
          text = path.read_text(encoding='utf-8')
          if '"tools/audit_gdscript_ch02.py"' not in text:
              text = text.replace(
                  '      - ".github/workflows/validate-volume0.yml"\n',
                  '      - ".github/workflows/validate-volume0.yml"\n      - "tools/audit_gdscript_ch02.py"\n',
                  1,
              )
          if 'Audit GDScript chapter 2 pedagogy' not in text:
              text = text.replace(
                  '      - name: Compile PDF with Pandoc\n',
                  '      - name: Audit GDScript chapter 2 pedagogy\n        run: python3 tools/audit_gdscript_ch02.py\n\n      - name: Compile PDF with Pandoc\n',
                  1,
              )
          if 'dist/AUDIT-GDSCRIPT-CH02.md' not in text:
              text = text.replace(
                  '            dist/QA-DOCUMENTATION.md\n',
                  '            dist/QA-DOCUMENTATION.md\n            dist/AUDIT-GDSCRIPT-CH02.md\n',
                  1,
              )
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git commit -m "ci(docs): enable permanent GDScript pedagogy audit"
          git push origin HEAD:${{ github.head_ref }}
