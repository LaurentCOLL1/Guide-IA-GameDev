name: Run Livre II Audit Patch

on:
  push:
    branches:
      - docs/audit-l2-ch01-ch02
    paths:
      - ".github/workflows/run-l2-audit-patch.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/audit-l2-ch01-ch02
          fetch-depth: 0

      - name: Extract and run correction script
        run: |
          python3 - <<'PATCHPY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-l2-audit-patch.yml').read_text(encoding='utf-8')
          marker_start = "          python3 - <<'PY'\n"
          marker_end = "\n          PY\n"
          start = workflow.index(marker_start) + len(marker_start)
          end = workflow.index(marker_end, start)
          block = workflow[start:end]
          lines = []
          for line in block.splitlines():
              if line.startswith('          '):
                  line = line[10:]
              lines.append(line)
          Path('/tmp/apply_l2_audit_patch.py').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PATCHPY

          python3 /tmp/apply_l2_audit_patch.py

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "Aucune correction restante."
            exit 0
          fi
          git commit -m "docs(livre-ii): audit and correct chapters 1 and 2"
          git push origin HEAD:docs/audit-l2-ch01-ch02
