name: Temporary Livre II Publication Finalizer

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'release/livre-ii-publication'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout publication branch
        uses: actions/checkout@v4
        with:
          ref: release/livre-ii-publication
          fetch-depth: 0

      - name: Apply publication governance
        run: |
          if [ ! -f .qa/livre-ii-publication-finalize.py ]; then
            echo "Finalizer already removed; nothing to do."
            exit 0
          fi
          python3 .qa/livre-ii-publication-finalize.py
          rm -f .qa/livre-ii-publication-finalize.py .publication-placeholder

      - name: Commit permanent publication files
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(livre-ii): préparer la clôture de publication"
          git push origin HEAD:release/livre-ii-publication
