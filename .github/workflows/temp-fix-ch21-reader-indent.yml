name: Temporary Fix Chapter 21 Reader Indentation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'docs/livre-ii-ch21-economie'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/livre-ii-ch21-economie
          fetch-depth: 1
          show-progress: false

      - name: Correct reader indentation and self-remove
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('Livre-II/CHAPITRE-21-Economie.md')
          text = path.read_text(encoding='utf-8')
          old = '\n\tvar _commit_port: EconomyTransactionCommitPort\n'
          new = '\nvar _commit_port: EconomyTransactionCommitPort\n'
          if old not in text:
              raise SystemExit('reader indentation anchor not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          rm -f .github/workflows/temp-fix-ch21-reader-indent.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(livre-ii): correct chapter 21 reader indentation"
          git push origin HEAD:docs/livre-ii-ch21-economie
