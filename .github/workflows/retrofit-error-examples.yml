name: Retrofit Error Examples

on:
  pull_request:
    branches:
      - main
    paths:
      - tools/retrofit_error_examples.py
      - .github/workflows/retrofit-error-examples.yml
  push:
    branches:
      - qa/retrofit-error-examples-ch01-ch06
    paths:
      - tools/retrofit_error_examples.py
      - .github/workflows/retrofit-error-examples.yml

permissions:
  contents: write

jobs:
  retrofit:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: qa/retrofit-error-examples-ch01-ch06
          fetch-depth: 0

      - name: Patch retrofit script for current repository state
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/retrofit_error_examples.py')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'updated, count = pattern.subn(replacement + "\\n", text, count=1)':
                  'updated, count = pattern.subn(lambda _match: replacement + "\\n", text, count=1)',
              '("version: \\"1.3.0\\"", "version: \\"1.4.0\\"")':
                  '("version: \\"1.4.0\\"", "version: \\"1.5.0\\"")',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'patch target not found: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Apply retroactive pedagogical audit
        run: |
          set +e
          python tools/retrofit_error_examples.py > retrofit.log 2>&1
          echo $? > retrofit.status
          exit 0

      - name: Upload retrofit diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrofit-error-diagnostic
          path: |
            retrofit.log
            retrofit.status
          if-no-files-found: error

      - name: Stop after retrofit failure
        run: |
          status=$(cat retrofit.status)
          if [ "$status" -ne 0 ]; then
            cat retrofit.log
            exit "$status"
          fi

      - name: Commit corrected chapters and governance
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(livre-ii): retrofit error and correction examples" || exit 0
          git push origin HEAD:qa/retrofit-error-examples-ch01-ch06
