name: Apply Volume 0 and Livre I Audit v2

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'docs/audit-volume0-livre1-contextes' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply context markers and audit metadata
        run: |
          python3 tools/audit_contextes_utilisation.py --apply | tee /tmp/context-migration.log

      - name: Update normative documents and indexes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str, label: str) -> None:
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if new in text:
                  return
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{label}: occurrence attendue 1, reçue {count}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')

          style = Path('STYLE_GUIDE.md')
          text = style.read_text(encoding='utf-8')
          text = text.replace(
              '(../Volume-0/annexes/CONVENTION-OUTILS-ET-CONTEXTES.md)',
              '(Volume-0/annexes/CONVENTION-OUTILS-ET-CONTEXTES.md)',
          )
          section = '''## Contextes d’utilisation\n\nChaque commande, contenu de fichier ou lien procédural indique le programme à utiliser. La convention normative est définie par `DOC-V0-ANN-CONTEXTES`.\n\nRepères principaux :\n\n- **[PS]** : exécuter dans PowerShell 7 sur l’hôte Windows ;\n- **[VSC]** : créer ou modifier le fichier dans Visual Studio Code, avec son chemin ;\n- **[WEB]** : ouvrir la page dans un navigateur internet ;\n- **[DCK]** : effectuer l’action dans l’interface Docker Desktop ;\n- **[DCT]** : exécuter dans le terminal d’un conteneur ;\n- **[WSL]** : exécuter dans un terminal WSL/Bash ;\n- **[APP]** : effectuer l’action dans l’application nommée ;\n- **[SORTIE]** : résultat à lire, jamais à saisir ;\n- **[LECTURE]** : exemple ou structure non directement exécutable.\n\nLe repère se place immédiatement avant le bloc ou le lien. Un contenu JSON, YAML, Python, GDScript ou autre destiné à un fichier doit indiquer **Visual Studio Code** et le chemin cible.\n\n'''
          if '## Contextes d’utilisation' not in text:
              text = text.replace('## Noms et chemins\n', section + '## Noms et chemins\n', 1)
          style.write_text(text, encoding='utf-8', newline='\n')

          replace_once(
              'Volume-0/CHAPITRE-05-Conventions-Markdown-et-Pandoc.md',
              '''- éviter les commandes destructrices sans avertissement explicite.\n\n---\n\n## 13. Liens internes''',
              '''- éviter les commandes destructrices sans avertissement explicite.\n\n### 12.1 Repères obligatoires d’utilisation\n\nTout bloc procédural reçoit immédiatement un repère défini par `DOC-V0-ANN-CONTEXTES`.\n\n> **[LECTURE] Légende abrégée - Ne pas saisir.**\n\n```text\n[PS] PowerShell 7\n[VSC] Visual Studio Code\n[WEB] Navigateur internet\n[DCK] Interface Docker Desktop\n[DCT] Terminal dans un conteneur\n[WSL] Terminal WSL/Bash\n[APP] Interface de l’application nommée\n[SORTIE] Résultat attendu\n[LECTURE] Exemple non exécutable\n```\n\nExemple de commande :\n\n> **[PS] PowerShell 7 - Exécuter :** utiliser PowerShell sur l’hôte Windows.\n\n```powershell\npandoc --version\n```\n\nExemple de fichier :\n\n> **[VSC] Visual Studio Code - Créer :** `.vscode/settings.json` à la racine du projet.\n\n```json\n{\n  "files.encoding": "utf8"\n}\n```\n\nUne adresse de téléchargement utilisée dans une procédure reçoit **[WEB]**. Une sortie de commande reçoit **[SORTIE]**. Un schéma ou une valeur illustrative reçoit **[LECTURE]**.\n\nLa convention complète est disponible dans [Convention des outils et contextes d’utilisation](annexes/CONVENTION-OUTILS-ET-CONTEXTES.md).\n\n---\n\n## 13. Liens internes''',
              'Volume 0 chapitre 5 - section 12.1',
          )

          contents = Path('contents.txt')
          text = contents.read_text(encoding='utf-8')
          if 'Volume-0/annexes/CONVENTION-OUTILS-ET-CONTEXTES.md\n' not in text:
              text = text.replace(
                  'Volume-0/annexes/INDEX-LICENCES.md\n',
                  'Volume-0/annexes/INDEX-LICENCES.md\nVolume-0/annexes/CONVENTION-OUTILS-ET-CONTEXTES.md\n',
                  1,
              )
          if 'Volume-0/QA/AUDIT-VOLUME-0-LIVRE-I.md\n' not in text:
              text = text.replace(
                  'Livre-I/CHAPITRE-10-Securite-sauvegarde-et-validation-de-la-plateforme.md\n',
                  'Livre-I/CHAPITRE-10-Securite-sauvegarde-et-validation-de-la-plateforme.md\nVolume-0/QA/AUDIT-VOLUME-0-LIVRE-I.md\n',
                  1,
              )
          contents.write_text(text, encoding='utf-8', newline='\n')

          p = Path('Volume-0/index.md')
          text = p.read_text(encoding='utf-8')
          text = text.replace('version: "1.0.0"', 'version: "1.1.0"', 1)
          text = text.replace('— **rédigé**', '— **rédigé et audité**')
          if 'AUDIT-VOLUME-0-LIVRE-I.md' not in text:
              text = text.replace(
                  '- [Rapport QA final](RAPPORT-QA-FINAL.md) — **validation réussie**\n',
                  '- [Rapport QA final](RAPPORT-QA-FINAL.md) — **validation réussie**\n- [Audit du Volume 0 et du Livre I](QA/AUDIT-VOLUME-0-LIVRE-I.md) — **audit transversal en cours de clôture**\n',
                  1,
              )
          if 'CONVENTION-OUTILS-ET-CONTEXTES.md' not in text:
              text = text.replace(
                  '- [Index des licences](annexes/INDEX-LICENCES.md) — **créé**\n',
                  '- [Index des licences](annexes/INDEX-LICENCES.md) — **créé**\n- [Convention des outils et contextes d’utilisation](annexes/CONVENTION-OUTILS-ET-CONTEXTES.md) — **créée et appliquée**\n',
                  1,
              )
          text = text.replace('les sept annexes initiales', 'les huit annexes normatives')
          p.write_text(text, encoding='utf-8', newline='\n')

          p = Path('Livre-I/index.md')
          text = p.read_text(encoding='utf-8')
          text = text.replace('version: "1.2.0"', 'version: "1.3.0"', 1)
          text = text.replace('— **rédigé et validé**', '— **rédigé, validé et audité**')
          audit_section = '''\n## Audit transversal des contextes d’utilisation\n\nLes dix chapitres appliquent désormais la convention `DOC-V0-ANN-CONTEXTES`. Chaque commande précise son terminal, chaque contenu de fichier précise l’éditeur et le chemin cible, les liens procéduraux utilisent **[WEB]**, et les sorties utilisent **[SORTIE]**.\n\nLe rapport est disponible dans [`Volume-0/QA/AUDIT-VOLUME-0-LIVRE-I.md`](../Volume-0/QA/AUDIT-VOLUME-0-LIVRE-I.md). La validation est statique : les procédures nécessitant le matériel ou les services réels conservent une réserve runtime.\n'''
          if '## Audit transversal des contextes d’utilisation' not in text:
              text = text.replace('\n## Stabilité des identifiants\n', audit_section + '\n## Stabilité des identifiants\n', 1)
          p.write_text(text, encoding='utf-8', newline='\n')

          p = Path('ROADMAP.md')
          text = p.read_text(encoding='utf-8')
          if 'Convention des outils et contextes d’utilisation' not in text:
              text = text.replace(
                  '- [x] Validation de la compilation complète.\n',
                  '- [x] Validation de la compilation complète.\n- [x] Convention des outils et contextes d’utilisation.\n- [x] Audit transversal du Volume 0 et du Livre I.\n',
                  1,
              )
          if 'Repères d’utilisation appliqués' not in text:
              text = text.replace(
                  '- [x] Nouvelle validation technique, documentaire et compilation du Livre I à dix chapitres.\n',
                  '- [x] Nouvelle validation technique, documentaire et compilation du Livre I à dix chapitres.\n- [x] Repères d’utilisation appliqués à toutes les commandes, fichiers et procédures web.\n',
                  1,
              )
          p.write_text(text, encoding='utf-8', newline='\n')
          PY

      - name: Commit document migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md STYLE_GUIDE.md ROADMAP.md contents.txt Volume-0 Livre-I tools
          if ! git diff --cached --quiet; then
            git commit -m "docs(qa): apply usage contexts to Volume 0 and Livre I"
            git push origin "HEAD:${{ github.head_ref }}"
          fi
