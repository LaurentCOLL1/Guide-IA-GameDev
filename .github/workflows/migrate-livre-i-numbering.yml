name: Migrate Livre I numbering

on:
  push:
    branches:
      - docs/reopen-livre-i-foundations
    paths:
      - ".github/scripts/migrate-livre-i-numbering.py"
      - ".github/workflows/migrate-livre-i-numbering.yml"

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: docs/reopen-livre-i-foundations
          fetch-depth: 0

      - name: Apply Livre I renumbering
        run: python3 .github/scripts/migrate-livre-i-numbering.py

      - name: Commit migrated files
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Aucune migration supplémentaire nécessaire."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(livre-i): renumber existing chapters while preserving ids"
          git push origin HEAD:docs/reopen-livre-i-foundations
