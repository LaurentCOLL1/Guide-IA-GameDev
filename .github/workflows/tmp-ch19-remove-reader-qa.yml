name: Temporary Chapter 19 Reader QA Cleanup

on:
  push:
    branches:
      - fix/livre-ii-ch19-remove-reader-qa

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/livre-ii-ch19-remove-reader-qa
          fetch-depth: 0
      - name: Remove QA procedure from reader chapter
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          timestamp = "2026-07-20T16:52:26+02:00"

          chapter_path = Path("Livre-II/CHAPITRE-19-Competences-et-pouvoirs.md")
          chapter = chapter_path.read_text(encoding="utf-8")
          start = chapter.index("## 34. Validation légère sans PDF\n")
          end = chapter.index("## 35. Réserves runtime\n")
          chapter = chapter[:start] + chapter[end:]
          replacements = {
              'version: "1.0.0"': 'version: "1.0.1"',
              'last-verified: "2026-07-20T15:27:31+02:00"': f'last-verified: "{timestamp}"',
              'audit-date: "2026-07-20T15:27:31+02:00"': f'audit-date: "{timestamp}"',
              '## 35. Réserves runtime': '## 34. Réserves runtime',
              '## 36. Sources techniques': '## 35. Sources techniques',
              '## 37. Synthèse opérationnelle pour Project Asteria': '## 36. Synthèse opérationnelle pour Project Asteria',
          }
          for old, new in replacements.items():
              if old not in chapter:
                  raise SystemExit(f"chapter replacement missing: {old}")
              chapter = chapter.replace(old, new, 1)
          chapter_path.write_text(chapter, encoding="utf-8")

          audit_path = Path("Livre-II/QA/AUDIT-CHAPITRE-19.md")
          audit = audit_path.read_text(encoding="utf-8")
          replacements = {
              'version: "1.0.0"': 'version: "1.0.1"',
              'chapter-version: "1.0.0"': 'chapter-version: "1.0.1"',
              'audit-date: "2026-07-20T15:27:31+02:00"': f'audit-date: "{timestamp}"',
              'last-verified: "2026-07-20T15:27:31+02:00"': f'last-verified: "{timestamp}"',
              '- lignes finales : **2 419** ;': '- lignes finales : **2 386** ;',
              '- titres Markdown : **56** ;': '- titres Markdown : **55** ;',
              '- blocs de code ou de données : **58** ;': '- blocs de code ou de données : **56** ;',
              '- marqueurs d’explication : **58** ;': '- marqueurs d’explication : **56** ;',
              'Les **58** blocs possèdent chacun': 'Les **56** blocs possèdent chacun',
          }
          for old, new in replacements.items():
              if old not in audit:
                  raise SystemExit(f"audit replacement missing: {old}")
              audit = audit.replace(old, new, 1)
          marker = "## 5. Revue statique du code\n"
          note = (
              "11. retiré du chapitre lecteur la procédure interne `Validation légère sans PDF`, "
              "qui appartient au rapport QA, à la preuve et aux workflows.\n\n"
          )
          if marker not in audit:
              raise SystemExit("audit insertion marker missing")
          audit = audit.replace(marker, note + marker, 1)
          audit_path.write_text(audit, encoding="utf-8")

          proof_path = Path("Livre-II/QA/VALIDATION-FINALE-CHAPITRE-19.yaml")
          proof = proof_path.read_text(encoding="utf-8")
          proof = proof.replace("status: complete", "status: pending", 1)
          proof = proof.replace("validated-head-commit: 27396b59c056bd64741b67fbc6b440178f0483b6", "validated-head-commit: pending", 1)
          proof = proof.replace("  blocking-errors: 0", "  blocking-errors: pending", 1)
          proof = proof.replace("  warnings: 0", "  warnings: pending", 1)
          proof = proof.replace("  chapter-lines: 2419", "  chapter-lines: 2386", 1)
          proof = proof.replace("  chapter-headings: 56", "  chapter-headings: 55", 1)
          proof = proof.replace("  chapter-code-and-data-blocks: 58", "  chapter-code-and-data-blocks: 56", 1)
          proof = proof.replace("  code-explanation-markers: 58", "  code-explanation-markers: 56", 1)
          ci_start = proof.index("ci:\n")
          reservations_start = proof.index("reservations:\n")
          ci = """ci:
  validate-chapters-without-pdf:
    run-id: pending
    conclusion: pending
  validate-usage-contexts:
    run-id: pending
    conclusion: pending
"""
          proof = proof[:ci_start] + ci + proof[reservations_start:]
          proof_path.write_text(proof, encoding="utf-8")

          continuity_path = Path("CONTINUITE-PROJET.md")
          continuity = continuity_path.read_text(encoding="utf-8")
          replacements = {
              'version: "3.19.0"': 'version: "3.19.1"',
              'last-updated: "2026-07-20T15:27:31+02:00"': f'last-updated: "{timestamp}"',
              '- chapitre 19 : version `1.0.0` ;': '- chapitre 19 : version `1.0.1` ;',
          }
          for old, new in replacements.items():
              if old not in continuity:
                  raise SystemExit(f"continuity replacement missing: {old}")
              continuity = continuity.replace(old, new, 1)
          error_anchor = "- ne pas placer la prochaine étape, le chemin ou le niveau du chapitre suivant dans le chapitre publié ;\n"
          error_rule = "- ne pas placer les commandes de validation documentaire ou la procédure QA dans un chapitre destiné au lecteur ;\n"
          if error_anchor not in continuity:
              raise SystemExit("continuity error anchor missing")
          continuity = continuity.replace(error_anchor, error_rule + error_anchor, 1)
          journal_anchor = "## 27. Journal\n\n"
          journal = f"""### {timestamp} — version 3.19.1

- retrait de la section interne `Validation légère sans PDF` du chapitre 19 destiné au lecteur ;
- conservation de cette procédure dans le protocole, le rapport d’audit, la preuve QA et les workflows ;
- chapitre 19 et audit portés en version `1.0.1` ;
- règle ajoutée aux erreurs à ne pas reproduire ;
- aucune exécution runtime et aucun PDF construit.

"""
          if journal_anchor not in continuity:
              raise SystemExit("continuity journal anchor missing")
          continuity = continuity.replace(journal_anchor, journal_anchor + journal, 1)
          continuity_path.write_text(continuity, encoding="utf-8")
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add CONTINUITE-PROJET.md Livre-II/CHAPITRE-19-Competences-et-pouvoirs.md Livre-II/QA/AUDIT-CHAPITRE-19.md Livre-II/QA/VALIDATION-FINALE-CHAPITRE-19.yaml
          git commit -m "fix(livre-ii): keep chapter 19 reader-focused"
          git push origin HEAD:fix/livre-ii-ch19-remove-reader-qa
