name: Chapter 3 Usage Context Audit

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout chapter branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-iii-ch03-references-concept-art-comfyui
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install lightweight dependencies
        run: python3 -m pip install --disable-pip-version-check --quiet PyYAML

      - name: Run permanent usage-context validators
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/context
          python3 tools/check_context_markers.py --check | tee dist/context/QA-CONTEXTES.log
          python3 tools/audit_contextes_semantiques.py --check | tee dist/context/QA-CONTEXTES-SEMANTIQUES.log
          python3 tools/report_contextes_utilisation.py | tee dist/context/QA-CONTEXTES-COUVERTURE.md

      - name: Upload usage-context evidence
        id: context_artifact
        uses: actions/upload-artifact@v4
        with:
          name: usage-context-audit
          if-no-files-found: error
          retention-days: 30
          path: dist/context/

      - name: Record audit result on chapter branch
        shell: bash
        env:
          CONTEXT_ARTIFACT_ID: ${{ steps.context_artifact.outputs.artifact-id }}
          CONTEXT_ARTIFACT_DIGEST: ${{ steps.context_artifact.outputs.artifact-digest }}
        run: |
          set -euo pipefail
          result='Livre-III/QA/CH03-USAGE-AUDIT-RESULT.txt'
          {
            printf 'run_id: %s\n' "$GITHUB_RUN_ID"
            printf 'head_sha: %s\n' "$(git rev-parse HEAD)"
            printf 'artifact_id: %s\n' "$CONTEXT_ARTIFACT_ID"
            printf 'artifact_digest: %s\n' "$CONTEXT_ARTIFACT_DIGEST"
            printf 'conclusion: success\n'
          } > "$result"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$result"
          git commit -m 'chore(qa): publier le résultat des contextes du chapitre 3'
          git push origin HEAD:docs/livre-iii-ch03-references-concept-art-comfyui
