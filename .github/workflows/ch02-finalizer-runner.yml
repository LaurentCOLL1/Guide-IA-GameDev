name: Chapter 2 Finalizer Runner

on:
  push:
    branches: [main]
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: read

jobs:
  finalize:
    if: github.event_name == 'push' || github.event.pull_request.head.ref == 'docs/livre-iii-ch02-direction-artistique'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout chapter branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-iii-ch02-direction-artistique
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip when already finalized
        id: guard
        shell: bash
        run: |
          if [ -f .qa/ch02/finalize.py ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Materialize or publish diagnostic
        if: steps.guard.outputs.run == 'true'
        shell: bash
        run: |
          set +e
          python .qa/ch02/finalize.py > /tmp/ch02-finalizer.log 2>&1
          status=$?
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            python - <<'PY' >> /tmp/ch02-finalizer.log 2>&1
          from concurrent.futures import ProcessPoolExecutor
          from pathlib import Path
          import base64
          import hashlib
          import io
          import multiprocessing
          import os
          import zipfile

          ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/'
          EXPECTED_NAMES = [
              'Livre-III/CHAPITRE-02-Direction-artistique-et-bible-visuelle.md',
              'Livre-III/QA/AUDIT-CHAPITRE-02.md',
              'Livre-III/QA/VALIDATION-FINALE-CHAPITRE-02.yaml',
          ]

          def scan_range(body, padding, start, stop):
              matches = []
              for position in range(start, stop):
                  prefix = body[:position]
                  suffix = body[position:]
                  for char in ALPHABET:
                      payload = base64.b64decode(prefix + char + suffix + padding, validate=True)
                      try:
                          with zipfile.ZipFile(io.BytesIO(payload)) as archive:
                              if archive.namelist() != EXPECTED_NAMES:
                                  continue
                              if archive.testzip() is not None:
                                  continue
                              infos = [
                                  {
                                      'name': info.filename,
                                      'crc': f'{info.CRC:08x}',
                                      'size': info.file_size,
                                      'compressed': info.compress_size,
                                  }
                                  for info in archive.infolist()
                              ]
                      except Exception:
                          continue
                      matches.append(
                          {
                              'position': position,
                              'char': char,
                              'sha256': hashlib.sha256(payload).hexdigest(),
                              'bytes': len(payload),
                              'entries': infos,
                          }
                      )
              return matches

          root = Path('.qa/ch02')
          parts = sorted(root.glob('package-*.b64'))
          texts = [''.join(c for c in part.read_text(encoding='utf-8') if not c.isspace()) for part in parts]
          encoded = ''.join(texts)
          body = encoded.rstrip('=')
          padding = encoded[len(body):]
          print('\n--- exhaustive ZIP CRC recovery ---')
          print(f'parts={[(part.name, len(text)) for part, text in zip(parts, texts)]}')
          print(f'body_length={len(body)} padding={padding!r} body_mod4={len(body) % 4}')

          suspect_indexes = [
              index
              for index, (part, text) in enumerate(zip(parts, texts))
              if part.name == 'package-01.b64' and len(text) == 11999
          ]
          if len(suspect_indexes) != 1 or len(body) % 4 != 1 or padding != '==':
              print(f'recovery_precondition_failed suspect_indexes={suspect_indexes}')
          else:
              suspect_index = suspect_indexes[0]
              global_start = sum(len(text) for text in texts[:suspect_index])
              position_count = len(texts[suspect_index]) + 1
              workers = min(4, os.cpu_count() or 1, position_count)
              chunk = (position_count + workers - 1) // workers
              ranges = []
              for worker_index in range(workers):
                  start = global_start + worker_index * chunk
                  stop = min(global_start + position_count, start + chunk)
                  if start < stop:
                      ranges.append((start, stop))
              print(f'global_start={global_start} position_count={position_count} ranges={ranges}')
              context = multiprocessing.get_context('fork')
              recoveries = []
              with ProcessPoolExecutor(max_workers=len(ranges), mp_context=context) as executor:
                  futures = [
                      executor.submit(scan_range, body, padding, start, stop)
                      for start, stop in ranges
                  ]
                  for future in futures:
                      recoveries.extend(future.result())
              for recovery in recoveries:
                  recovery['local_position'] = recovery['position'] - global_start
              print(f'zip_crc_recoveries={recoveries}')
          PY
            {
              printf 'run_id: %s\n' "$GITHUB_RUN_ID"
              printf 'exit_code: %s\n\n' "$status"
              cat /tmp/ch02-finalizer.log
            } > .qa/ch02/finalizer-error.txt
            git add .qa/ch02/finalizer-error.txt
            git commit -m "chore(qa): publier la récupération CRC du paquet chapitre 2"
          else
            rm -f .github/workflows/ch02-branch-finalizer.yml
            git add -A
            git reset -- QA-CHAPTERS.md QA-CONTEXTES.md 2>/dev/null || true
            git commit -m "docs(livre-iii): matérialiser le chapitre 2"
          fi

          git push origin HEAD:docs/livre-iii-ch02-direction-artistique
