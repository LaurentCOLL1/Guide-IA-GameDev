name: Chapter 27 Terminology Runner

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: read

jobs:
  correct:
    if: github.event.pull_request.head.ref == 'fix/ch27-terminologie-duree-reelle'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install validator dependency
        run: python3 -m pip install --disable-pip-version-check pyyaml

      - name: Apply terminology correction
        shell: bash
        run: |
          set -o pipefail
          python3 .qa/ch27-terminology/fix.py 2>&1 | tee /tmp/ch27-terminology-fix.log
          python3 tools/validate_chapters.py --report /tmp/ch27-terminology-QA.md 2>&1 | tee -a /tmp/ch27-terminology-fix.log
          python3 tools/check_context_markers.py --check 2>&1 | tee -a /tmp/ch27-terminology-fix.log
          python3 tools/audit_contextes_semantiques.py --check 2>&1 | tee -a /tmp/ch27-terminology-fix.log
          python3 tools/check_code_explanation_structure.py 2>&1 | tee -a /tmp/ch27-terminology-fix.log

      - name: Upload diagnostic on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ch27-terminology-diagnostic
          path: /tmp/ch27-terminology-fix.log
          if-no-files-found: error

      - name: Push permanent correction
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf .qa/ch27-terminology
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(livre-ii): correct wall-clock terminology"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
