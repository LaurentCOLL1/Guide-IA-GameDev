name: Chapter 2 Recovery Correction

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  correct:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout chapter branch
        uses: actions/checkout@v4
        with:
          ref: docs/livre-iii-ch02-direction-artistique
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore verified front matter byte
        shell: bash
        run: |
          set -euo pipefail
          branch='docs/livre-iii-ch02-direction-artistique'
          git fetch origin "$branch"
          git reset --hard "origin/$branch"

          python - <<'PY'
          from pathlib import Path
          import hashlib
          import zlib

          chapter = Path('Livre-III/CHAPITRE-02-Direction-artistique-et-bible-visuelle.md')
          proof = Path('Livre-III/QA/VALIDATION-FINALE-CHAPITRE-02.yaml')
          malformed = 'usage-context-standard: "DOC-V0-ANN-CONTEXTES"----\n'
          restored = 'usage-context-standard: "DOC-V0-ANN-CONTEXTES"\n---\n'
          expected_sha = 'cffc01cb1880b55dae3a536c8f6bf99a96b016dff65c91dc19c1bc0ed38a0c2d'
          expected_crc = '604d0434'

          text = chapter.read_text(encoding='utf-8')
          if text.count(malformed) == 1:
              text = text.replace(malformed, restored, 1)
              chapter.write_text(text, encoding='utf-8', newline='\n')
          elif text.count(restored) != 1:
              raise SystemExit('front matter recovery pattern is neither malformed nor restored exactly once')

          payload = chapter.read_bytes()
          actual_sha = hashlib.sha256(payload).hexdigest()
          actual_crc = f'{zlib.crc32(payload) & 0xffffffff:08x}'
          if actual_sha != expected_sha or actual_crc != expected_crc:
              raise SystemExit(
                  f'restored chapter integrity mismatch: sha256={actual_sha}, crc={actual_crc}'
              )

          proof_text = proof.read_text(encoding='utf-8')
          replacements = [
              (
                  '  chapter-sha256: d5c1d7be7d472d6fec3541ae2b0c6306070d374d281defd71e139b660bcfba23',
                  f'  chapter-sha256: {expected_sha}',
                  'chapter recovery sha',
              ),
              (
                  "  chapter-recovered-crc: '01de0909'",
                  f"  chapter-recovered-crc: '{expected_crc}'",
                  'chapter recovery crc',
              ),
              (
                  '  original-proof-regenerated-after-validation: true',
                  '  original-proof-regenerated-as-pending-evidence: true',
                  'proof recovery status',
              ),
          ]
          for old, new, label in replacements:
              if old in proof_text:
                  proof_text = proof_text.replace(old, new, 1)
              elif new not in proof_text:
                  raise SystemExit(f'{label} line not found')
          proof.write_text(proof_text, encoding='utf-8', newline='\n')
          print(f'chapter02_front_matter_restored sha256={actual_sha} crc={actual_crc}')
          PY

          if git diff --quiet; then
            echo 'No recovery correction required.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            Livre-III/CHAPITRE-02-Direction-artistique-et-bible-visuelle.md \
            Livre-III/QA/VALIDATION-FINALE-CHAPITRE-02.yaml
          git commit -m 'fix(livre-iii): restaurer le front matter vérifié du chapitre 2'
          git push origin "HEAD:$branch"
